<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balloon Lift</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap');

        :root {
            --primary: #ff4757;
            --primary-dark: #ff6b81;
            --ui-bg: rgba(20, 25, 45, 0.85);
            --text-glow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0c10;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Overlays */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .screen.active {
            pointer-events: auto;
            opacity: 1;
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Glassmorphism Panels */
        .panel {
            background: var(--ui-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
            max-width: 90%;
            width: 400px;
            color: white;
        }

        h1, h2 {
            font-family: 'Fredoka One', cursive;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 42px;
            background: linear-gradient(to bottom, #fff, #a4b0be);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 18px;
            color: #dfe4ea;
            margin-bottom: 25px;
        }

        /* Buttons */
        .btn {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Fredoka One', cursive;
            font-size: 20px;
            padding: 15px 30px;
            margin: 10px;
            cursor: pointer;
            box-shadow: 0 6px 0 #c0392b, 0 10px 20px rgba(255, 71, 87, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
            text-transform: uppercase;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 #c0392b, 0 5px 10px rgba(255, 71, 87, 0.4);
        }

        .btn.secondary {
            background: linear-gradient(135deg, #1e90ff, #70a1ff);
            box-shadow: 0 6px 0 #3742fa, 0 10px 20px rgba(30, 144, 255, 0.4);
        }
        
        .btn.secondary:active {
            box-shadow: 0 0px 0 #3742fa, 0 5px 10px rgba(30, 144, 255, 0.4);
        }

        /* Shop UI */
        #shopScreen .panel {
            width: 500px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        .shop-content {
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 20px;
            padding-right: 10px;
        }
        
        .shop-content::-webkit-scrollbar {
            width: 8px;
        }
        .shop-content::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }
        .shop-content::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        .shop-category {
            text-align: left;
            margin-bottom: 20px;
        }

        .shop-category h3 {
            font-family: 'Fredoka One', cursive;
            color: #ffda79;
            margin: 0 0 10px 0;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .item-info {
            text-align: left;
        }

        .item-name {
            font-weight: bold;
            font-size: 16px;
            color: white;
        }

        .item-desc {
            font-size: 12px;
            color: #a4b0be;
            margin-top: 4px;
        }

        .buy-btn {
            background: #2ed573;
            border: none;
            border-radius: 8px;
            color: white;
            font-family: 'Fredoka One', cursive;
            padding: 8px 15px;
            cursor: pointer;
            box-shadow: 0 4px 0 #20bf6b;
            transition: all 0.1s;
        }

        .buy-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #20bf6b;
        }

        .buy-btn.equipped {
            background: #ffa502;
            box-shadow: 0 4px 0 #eccc68;
        }

        .buy-btn.locked {
            background: #57606f;
            box-shadow: 0 4px 0 #2f3542;
        }

        .buy-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
            color: white;
            font-family: 'Fredoka One', cursive;
            font-size: 24px;
            text-shadow: 0 3px 6px rgba(0,0,0,0.8);
        }

        /* Notifications */
        #notification-container {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 20;
        }

        .toast {
            background: rgba(46, 213, 115, 0.9);
            color: white;
            font-family: 'Fredoka One', cursive;
            padding: 10px 20px;
            border-radius: 20px;
            margin-bottom: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: slideDown 0.3s ease-out, fadeOut 0.5s ease-in 2.5s forwards;
            border: 2px solid #7bed9f;
        }

        .toast.error {
            background: rgba(255, 71, 87, 0.9);
            border-color: #ff6b81;
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        .stat-badge {
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 18px;
        }

        /* Help Text */
        .tutorial {
            position: absolute;
            bottom: 20%;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: 22px;
            font-weight: bold;
            pointer-events: none;
            animation: pulse 2s infinite;
            text-shadow: 0 4px 6px rgba(0,0,0,0.8);
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.5; transform: scale(0.95); }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="hud" class="hidden">
        <div class="stat-badge" id="scoreDisplay">0m</div>
        <div class="stat-badge" id="highScoreDisplay">Best: 0m</div>
    </div>

    <div id="notification-container"></div>

    <!-- Main Menu -->
    <div id="menuScreen" class="screen active">
        <div class="panel">
            <h1>Balloon Lift</h1>
            <p>Tap to float up.<br>Follows your finger/mouse.<br>Weave through the obstacles!</p>
            <button class="btn" id="playBtn">Play Now</button>
            <button class="btn secondary" id="shopBtn">Shop</button>
        </div>
    </div>

    <!-- Game Over -->
    <div id="gameOverScreen" class="screen hidden">
        <div class="panel">
            <h2>Game Over!</h2>
            <p id="finalScoreText">Altitude: 0m</p>
            <button class="btn" id="retryBtn">Try Again</button>
            <button class="btn secondary" id="menuBtn">Menu</button>
        </div>
    </div>

    <!-- Shop -->
    <div id="shopScreen" class="screen hidden">
        <div class="panel">
            <h2>Shop</h2>
            <div class="shop-content" id="shopContent">
                <!-- Injected via JS -->
            </div>
            <button class="btn secondary" id="closeShopBtn">Back to Menu</button>
        </div>
    </div>

    <div id="tutorialText" class="tutorial hidden">Tap to Flap! Balloon follows your finger!</div>

<script>
/**
 * BALLOON LIFT
 * Core Engine & Platform Integration
 */
const GAME_ID = "balloon";

// ==========================================
// GAME STATE & CONFIGURATION
// ==========================================
const state = {
    screen: 'menu', 
    score: 0,
    saveData: {
        highScore: 0,
        skins: ['classic'],
        trails: ['none'],
        equippedSkin: 'classic',
        equippedTrail: 'none',
        repellentLevel: 0,
        ascentLevel: 0
    },
    pendingPurchase: null,
    nextRewardAt: 50,
    rewardStep: 0,
    isFirstInteraction: true
};

// ==========================================
// PLATFORM INTEGRATION
// ==========================================
const Platform = {
    addSimgaBucks: (amount) => {
        window.parent.postMessage({ type: "addSimgaBucks", amount: amount }, "*");
        UI.showToast(`+${amount} SimgaBucks!`);
    },
    spendSimgaBucks: (amount, itemId) => {
        const msgId = Math.random().toString(36);
        state.pendingPurchase = { id: itemId, msgId: msgId };
        window.parent.postMessage({ type: "spendSimgaBucks", amount: amount, msgId: msgId }, "*");
    },
    saveData: () => {
        window.parent.postMessage({ type: "saveData", gameId: GAME_ID, data: state.saveData }, "*");
    },
    loadData: () => {
        const loadMsgId = "load_" + Date.now();
        window.parent.postMessage({ type: "loadData", gameId: GAME_ID, msgId: loadMsgId }, "*");
        
        const loadHandler = (event) => {
            const data = event.data;
            if (data.type === "loadResponse" && data.msgId === loadMsgId) {
                if (data.data) {
                    state.saveData = { ...state.saveData, ...data.data };
                    if (!state.saveData.skins) state.saveData.skins = ['classic'];
                    if (!state.saveData.trails) state.saveData.trails = ['none'];
                    Shop.render();
                }
                window.removeEventListener("message", loadHandler);
            }
        };
        window.addEventListener("message", loadHandler);
    }
};

window.addEventListener("message", (event) => {
    const data = event.data;
    if (data.type === "spendResponse" && state.pendingPurchase && state.pendingPurchase.msgId === data.msgId) {
        if (data.success) {
            Shop.unlockItem(state.pendingPurchase.id);
            UI.showToast("Purchase Successful!");
        } else {
            UI.showToast("Not enough SimgaBucks!", true);
        }
        state.pendingPurchase = null;
        Shop.render();
    }
});

// ==========================================
// SHOP CONFIGURATION
// ==========================================
const SHOP_ITEMS = [
    { category: 'Skins', id: 'classic', name: 'Classic Balloon', desc: 'Default red balloon.', cost: 0, type: 'skin' },
    { category: 'Skins', id: 'neon', name: 'Neon Glow', desc: 'Sleek dark look with glowing edges.', cost: 25, type: 'skin' },
    { category: 'Skins', id: 'gold', name: 'Royal Gold', desc: 'Shiny golden balloon.', cost: 60, type: 'skin' },
    { category: 'Trails', id: 'none', name: 'No Trail', desc: 'Standard airflow.', cost: 0, type: 'trail' },
    { category: 'Trails', id: 'sparkle', name: 'Sparkles', desc: 'Leaves a shiny particle trail.', cost: 15, type: 'trail' },
    { category: 'Trails', id: 'fire', name: 'Fire Trail', desc: 'Leaves a trail of hot flames.', cost: 40, type: 'trail' },
    { category: 'Upgrades', id: 'repellent', name: 'Bird Repellent', desc: 'Reduces bird spawn rate.', cost: [30, 60, 100], type: 'upgrade_repellent' },
    { category: 'Upgrades', id: 'ascent', name: 'Heavy Duty', desc: 'Adds slightly more gravity control.', cost: [20, 50, 90], type: 'upgrade_ascent' }
];

const Shop = {
    render: () => {
        const container = document.getElementById('shopContent');
        container.innerHTML = '';
        
        let currentCategory = '';
        
        SHOP_ITEMS.forEach(item => {
            if (item.category !== currentCategory) {
                currentCategory = item.category;
                const catHeader = document.createElement('div');
                catHeader.className = 'shop-category';
                catHeader.innerHTML = `<h3>${currentCategory}</h3>`;
                container.appendChild(catHeader);
            }

            const isOwned = Shop.checkOwnership(item);
            const isEquipped = Shop.checkEquipped(item);
            const cost = Shop.getCost(item);
            const isMaxed = item.type.startsWith('upgrade_') && state.saveData[item.id + 'Level'] >= item.cost.length;

            let btnClass = 'buy-btn';
            let btnText = cost > 0 ? `Buy (${cost} SB)` : 'Equip';
            let btnDisabled = false;

            if (isEquipped) {
                btnClass += ' equipped';
                btnText = 'Equipped';
                btnDisabled = true;
            } else if (isOwned && !item.type.startsWith('upgrade_')) {
                btnClass += ' equipped';
                btnText = 'Equip';
                btnDisabled = false;
            } else if (isMaxed) {
                btnClass += ' locked';
                btnText = 'MAXED';
                btnDisabled = true;
            } else if (state.pendingPurchase && state.pendingPurchase.id === item.id) {
                btnText = '...';
                btnDisabled = true;
            }

            const itemDiv = document.createElement('div');
            itemDiv.className = 'shop-item';
            
            let levelStars = '';
            if (item.type.startsWith('upgrade_')) {
                const lvl = state.saveData[item.id + 'Level'] || 0;
                const max = item.cost.length;
                levelStars = ` <span style="color:#ffda79">[${lvl}/${max}]</span>`;
            }

            itemDiv.innerHTML = `
                <div class="item-info">
                    <div class="item-name">${item.name}${levelStars}</div>
                    <div class="item-desc">${item.desc}</div>
                </div>
                <button class="${btnClass}" ${btnDisabled ? 'disabled' : ''} onclick="Shop.action('${item.id}')">${btnText}</button>
            `;
            container.appendChild(itemDiv);
        });
    },
    
    checkOwnership: (item) => {
        if (item.type === 'skin') return state.saveData.skins.includes(item.id);
        if (item.type === 'trail') return state.saveData.trails.includes(item.id);
        return false;
    },
    
    checkEquipped: (item) => {
        if (item.type === 'skin') return state.saveData.equippedSkin === item.id;
        if (item.type === 'trail') return state.saveData.equippedTrail === item.id;
        return false;
    },

    getCost: (item) => {
        if (item.type.startsWith('upgrade_')) {
            const level = state.saveData[item.id + 'Level'] || 0;
            return level < item.cost.length ? item.cost[level] : 0;
        }
        return item.cost;
    },

    action: (id) => {
        if (state.pendingPurchase) return;
        
        const item = SHOP_ITEMS.find(i => i.id === id);
        
        if (item.type === 'skin' || item.type === 'trail') {
            if (Shop.checkOwnership(item)) {
                if (item.type === 'skin') state.saveData.equippedSkin = item.id;
                if (item.type === 'trail') state.saveData.equippedTrail = item.id;
                Platform.saveData();
                Shop.render();
            } else {
                Platform.spendSimgaBucks(item.cost, id);
                Shop.render();
            }
        } else if (item.type.startsWith('upgrade_')) {
            const cost = Shop.getCost(item);
            if (cost > 0) {
                Platform.spendSimgaBucks(cost, id);
                Shop.render();
            }
        }
    },

    unlockItem: (id) => {
        const item = SHOP_ITEMS.find(i => i.id === id);
        if (item.type === 'skin') {
            state.saveData.skins.push(id);
            state.saveData.equippedSkin = id;
        } else if (item.type === 'trail') {
            state.saveData.trails.push(id);
            state.saveData.equippedTrail = id;
        } else if (item.type.startsWith('upgrade_')) {
            const lvlKey = item.id + 'Level';
            state.saveData[lvlKey] = (state.saveData[lvlKey] || 0) + 1;
        }
        Platform.saveData();
    }
};

// ==========================================
// UI MANAGEMENT
// ==========================================
const UI = {
    setScreen: (screenId) => {
        document.querySelectorAll('.screen').forEach(s => {
            s.classList.remove('active');
            s.classList.add('hidden');
        });
        if (screenId !== 'game') {
            document.getElementById(screenId).classList.remove('hidden');
            document.getElementById(screenId).classList.add('active');
            document.getElementById('hud').classList.add('hidden');
        } else {
            document.getElementById('hud').classList.remove('hidden');
        }
        state.screen = screenId;
    },
    
    showToast: (msg, isError = false) => {
        const container = document.getElementById('notification-container');
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : ''}`;
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    },

    updateHUD: () => {
        document.getElementById('scoreDisplay').innerText = `${Math.floor(state.score)}m`;
        document.getElementById('highScoreDisplay').innerText = `Best: ${Math.floor(state.saveData.highScore)}m`;
    }
};

// Attach Listeners
document.getElementById('playBtn').addEventListener('click', () => Game.start());
document.getElementById('retryBtn').addEventListener('click', () => Game.start());
document.getElementById('menuBtn').addEventListener('click', () => UI.setScreen('menuScreen'));
document.getElementById('shopBtn').addEventListener('click', () => {
    Shop.render();
    UI.setScreen('shopScreen');
});
document.getElementById('closeShopBtn').addEventListener('click', () => UI.setScreen('menuScreen'));

// ==========================================
// GAME ENGINE (CANVAS, GRAPHICS, PHYSICS)
// ==========================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let cw, ch;
function resize() {
    cw = window.innerWidth;
    ch = window.innerHeight;
    canvas.width = cw;
    canvas.height = ch;
    Input.x = cw / 2; // Reset target X on resize
}
window.addEventListener('resize', resize);

// Input Tracking (Horizontal tracking + Tapping)
const Input = { tap: false, lastDown: 0, x: 0 };

const updatePointer = (e) => {
    if (e.touches && e.touches.length > 0) {
        Input.x = e.touches[0].clientX;
    } else if (e.clientX !== undefined) {
        Input.x = e.clientX;
    }
};

window.addEventListener('mousemove', updatePointer);
window.addEventListener('touchmove', updatePointer, { passive: false });

const handleInputDown = (e) => { 
    const now = Date.now();
    if (now - Input.lastDown < 30) return; // Prevent double-fire
    Input.lastDown = now;
    
    updatePointer(e);

    if(state.screen === 'game') {
        Input.tap = true; 
        if (Game.balloon) {
            Game.balloon.flap();
        }
        state.isFirstInteraction = false;
        document.getElementById('tutorialText').classList.add('hidden');
    }
};
const handleInputUp = () => { Input.tap = false; };

window.addEventListener('mousedown', handleInputDown);
window.addEventListener('mouseup', handleInputUp);
window.addEventListener('touchstart', handleInputDown, { passive: false });
window.addEventListener('touchend', handleInputUp);

// Utility Math
const MathUtil = {
    rand: (min, max) => Math.random() * (max - min) + min,
    distance: (x1,y1,x2,y2) => Math.hypot(x2-x1, y2-y1)
};

const Draw = {
    circle: (x, y, r, color) => {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.closePath();
    }
};

// ==========================================
// ENTITIES
// ==========================================
class Balloon {
    constructor() {
        this.r = 25;
        this.x = cw / 2;
        this.y = Game.cameraY + (ch * 0.7); // World Coordinates
        this.vy = 0;
        
        // Physics constants based on upgrades
        const ascentLvl = state.saveData.ascentLevel || 0;
        this.gravity = 0.2 - (ascentLvl * 0.015);
        this.boost = -4 + (ascentLvl * 0.3); // Instant flap power
        this.maxRise = -8; 
        this.maxFall = 7;
        
        this.wobble = 0;
        Input.x = this.x; // Set initial target to center
    }

    flap() {
        this.vy = this.boost; // Instant lift impulse
        
        // Spawn trail particles immediately on tap
        const trailType = state.saveData.equippedTrail;
        if (trailType !== 'none') {
            for(let i=0; i<3; i++) {
                Game.particles.push(new Particle(
                    this.x + MathUtil.rand(-10, 10), 
                    this.y + this.r + 5,
                    MathUtil.rand(-1, 1),
                    MathUtil.rand(1, 3),
                    trailType === 'fire' ? ['#ff4757', '#ffa502', '#ffda79'] : ['#ffffff', '#70a1ff'],
                    trailType === 'fire' ? 1.5 : 1
                ));
            }
        }
    }

    update() {
        if (Input.tap) {
            this.vy -= 0.15; // Small continuous boost while holding
        }

        // Vertical Physics
        this.vy += this.gravity;
        this.vy = Math.max(this.maxRise, Math.min(this.maxFall, this.vy));
        this.y += this.vy; 

        // Horizontal Pointer Tracking
        this.x += (Input.x - this.x) * 0.08;
        
        // Clamp Horizontal Position to Screen
        this.x = Math.max(this.r, Math.min(cw - this.r, this.x));

        this.wobble += 0.1;
    }

    draw(camY) {
        ctx.save();
        ctx.translate(this.x, this.y - camY);
        
        // Slight rotation wobble
        ctx.rotate(Math.sin(this.wobble) * 0.05);

        const skin = state.saveData.equippedSkin;
        
        // Draw String
        ctx.beginPath();
        ctx.moveTo(0, this.r);
        ctx.lineTo(0, this.r + 20);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Draw Knot
        ctx.beginPath();
        ctx.moveTo(-4, this.r + 2);
        ctx.lineTo(4, this.r + 2);
        ctx.lineTo(0, this.r + 6);
        ctx.fillStyle = skin === 'neon' ? '#111' : (skin === 'gold' ? '#d4af37' : '#c0392b');
        ctx.fill();

        // Draw Balloon Body
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        
        let grad = ctx.createRadialGradient(-8, -8, 2, 0, 0, this.r);
        if (skin === 'classic') {
            grad.addColorStop(0, '#ff7979');
            grad.addColorStop(0.5, '#eb4d4b');
            grad.addColorStop(1, '#95a5a6');
        } else if (skin === 'neon') {
            ctx.shadowColor = '#00f8d1';
            ctx.shadowBlur = 20;
            grad.addColorStop(0, '#2f3542');
            grad.addColorStop(1, '#000000');
            ctx.strokeStyle = '#00f8d1';
            ctx.lineWidth = 3;
        } else if (skin === 'gold') {
            grad.addColorStop(0, '#fff200');
            grad.addColorStop(0.4, '#ffb8b8');
            grad.addColorStop(0.8, '#d1ccc0');
            grad.addColorStop(1, '#b33939');
        }
        
        ctx.fillStyle = grad;
        ctx.fill();
        if (skin === 'neon') ctx.stroke();

        // Shiny reflection highlight
        if (skin !== 'neon') {
            ctx.beginPath();
            ctx.ellipse(-8, -8, 8, 4, Math.PI / 4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fill();
        }

        ctx.restore();
    }
}

// Protruding Side Obstacles
class WallObstacle {
    constructor(y, isLeft) {
        this.y = y; // Center Y in world
        this.isLeft = isLeft;
        
        // These ledges reach much further into the screen to force horizontal dodging
        this.width = MathUtil.rand(cw * 0.25, cw * 0.55); 
        this.height = MathUtil.rand(30, 60);
    }

    draw(camY) {
        const renderY = this.y - camY;
        if (renderY > ch + 100 || renderY < -100) return;

        const startX = this.isLeft ? 0 : cw - this.width;

        // Base metallic block
        ctx.fillStyle = '#2f3542';
        ctx.fillRect(startX, renderY - this.height/2, this.width, this.height);

        // Glowing Danger Edge
        ctx.shadowColor = '#ff4757';
        ctx.shadowBlur = 15;
        ctx.fillStyle = '#ff4757';
        
        const edgeWidth = 8;
        if (this.isLeft) {
            ctx.fillRect(this.width - edgeWidth, renderY - this.height/2, edgeWidth, this.height);
        } else {
            ctx.fillRect(startX, renderY - this.height/2, edgeWidth, this.height);
        }
        
        ctx.shadowBlur = 0;
    }
}

class Bird {
    constructor(y) {
        this.y = y;
        this.isLeft = Math.random() > 0.5;
        this.x = this.isLeft ? -50 : cw + 50;
        this.vx = (MathUtil.rand(2, 4)) * (this.isLeft ? 1 : -1);
        this.flapTime = Math.random() * 10;
        this.r = 15; // Hitbox radius approximation
    }

    update() {
        this.x += this.vx;
        this.flapTime += 0.15;
    }

    draw(camY) {
        const renderY = this.y - camY;
        if (renderY > ch + 100 || renderY < -100) return;

        ctx.save();
        ctx.translate(this.x, renderY);
        if (!this.isLeft) ctx.scale(-1, 1);

        // Simple stylized bird drawing
        ctx.fillStyle = '#f1f2f6';
        ctx.beginPath();
        // Body
        ctx.ellipse(0, 0, 15, 8, 0, 0, Math.PI*2);
        ctx.fill();
        
        // Wing
        const wingY = Math.sin(this.flapTime) * 12;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(5, wingY, -10, wingY - 5);
        ctx.lineTo(-5, 0);
        ctx.fillStyle = '#ced6e0';
        ctx.fill();
        
        // Eye
        ctx.fillStyle = '#2f3542';
        ctx.beginPath();
        ctx.arc(8, -2, 2, 0, Math.PI*2);
        ctx.fill();

        ctx.restore();
    }
}

class Particle {
    constructor(x, y, vx, vy, colors, lifeScale = 1) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = colors[Math.floor(Math.random() * colors.length)];
        this.life = 1.0;
        this.decay = MathUtil.rand(0.02, 0.05) / lifeScale;
        this.r = MathUtil.rand(2, 6);
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
    }

    draw(camY) {
        if(this.life <= 0) return;
        ctx.globalAlpha = this.life;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 10;
        Draw.circle(this.x, this.y - camY, this.r, this.color);
        ctx.globalAlpha = 1.0;
        ctx.shadowBlur = 0;
    }
}

class BackgroundLayer {
    constructor(speedMult) {
        this.speedMult = speedMult;
        this.stars = Array.from({length: 40}, () => ({
            x: Math.random() * cw,
            y: Math.random() * ch,
            r: Math.random() * 1.5,
            alpha: Math.random()
        }));
    }

    draw(camY) {
        const offset = (camY * this.speedMult) % ch;
        ctx.fillStyle = '#fff';
        
        // Draw twice for seamless wrapping
        this.stars.forEach(s => {
            const y = (s.y - offset + ch) % ch;
            // Only show stars high up
            let starVisibility = Math.min(1, Math.max(0, (state.score - 500) / 1000));
            if(starVisibility > 0) {
                ctx.globalAlpha = s.alpha * starVisibility;
                Draw.circle(s.x, y, s.r, '#fff');
            }
        });
        ctx.globalAlpha = 1.0;
    }
}

// ==========================================
// GAME MANAGER
// ==========================================
const Game = {
    loopId: null,
    lastTime: 0,
    frameCount: 0,
    
    // Game Entities
    balloon: null,
    obstacles: [],
    birds: [],
    particles: [],
    bgLayers: [],
    
    // Camera / World
    cameraY: 0,
    baseScrollSpeed: -2, 
    
    // Effects
    shakeAmount: 0,

    start: () => {
        if(document.activeElement) document.activeElement.blur(); // Remove focus from buttons

        Game.cameraY = 0;
        Game.balloon = new Balloon();
        Game.obstacles = [];
        Game.birds = [];
        Game.particles = [];
        Game.bgLayers = [new BackgroundLayer(0.2), new BackgroundLayer(0.5)];
        
        state.score = 0;
        state.rewardStep = 0;
        state.nextRewardAt = 50; 
        Game.baseScrollSpeed = -1.5;
        Game.shakeAmount = 0;
        Game.frameCount = 0;
        state.isFirstInteraction = true;

        UI.setScreen('game');
        document.getElementById('tutorialText').classList.remove('hidden');
        UI.updateHUD();
        
        if (Game.loopId) cancelAnimationFrame(Game.loopId);
        Game.loopId = requestAnimationFrame(Game.loop);
    },

    spawnEffects: (x, y, amount) => {
        for(let i=0; i<amount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = MathUtil.rand(2, 8);
            Game.particles.push(new Particle(
                x, y,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed,
                ['#ff4757', '#ffa502', '#ffffff'],
                1.5
            ));
        }
    },

    die: () => {
        Game.spawnEffects(Game.balloon.x, Game.balloon.y, 40); 
        Game.shakeAmount = 20;
        
        setTimeout(() => {
            UI.setScreen('gameOverScreen');
            document.getElementById('finalScoreText').innerText = `Altitude: ${Math.floor(state.score)}m`;
            
            // Save if Highscore
            if(state.score > state.saveData.highScore) {
                state.saveData.highScore = state.score;
            }
            Platform.saveData();
        }, 1000); // 1 sec delay before UI
        
        Game.balloon = null; // Mark dead
    },

    update: (dt) => {
        if (!Game.balloon) {
            Game.particles.forEach(p => p.update());
            Game.particles = Game.particles.filter(p => p.life > 0);
            return;
        }

        // Wait for first tap before scrolling
        if (state.isFirstInteraction) return;

        Game.frameCount++;

        // Balloon Physics
        Game.balloon.update();
        
        // Auto scroll pushes up slightly over time (forces player to keep up)
        Game.baseScrollSpeed = -1.5 - (state.score / 500); 
        Game.cameraY += Game.baseScrollSpeed;
        
        // Smooth camera follow upwards if balloon gets too high on screen
        if (Game.balloon.y < Game.cameraY + ch * 0.3) {
            Game.cameraY = Game.balloon.y - ch * 0.3;
        }
        
        // Score calculation (negative Y is up)
        let newScore = Math.max(0, -Game.cameraY / 10);
        if(newScore > state.score) {
            state.score = newScore;
            UI.updateHUD();
            
            // Economy check
            if (state.score >= state.nextRewardAt) {
                if (state.rewardStep === 0) {
                    Platform.addSimgaBucks(1); // Small reward (first 20-30s approx)
                    state.nextRewardAt = 150; // Next around 1m
                    state.rewardStep++;
                } else if (state.rewardStep === 1) {
                    Platform.addSimgaBucks(2); // Medium reward
                    state.nextRewardAt = 300;
                    state.rewardStep++;
                } else {
                    Platform.addSimgaBucks(3); // Ongoing medium rewards
                    state.nextRewardAt += 250;
                }
            }
        }

        // Check if balloon fell off bottom of screen
        if (Game.balloon.y > Game.cameraY + ch + Game.balloon.r) {
            Game.die();
            return;
        }

        // Keep balloon from flying out the top completely
        if (Game.balloon.y < Game.cameraY) {
            Game.balloon.y = Game.cameraY;
            Game.balloon.vy = 0;
        }

        // Generators
        const worldY = Game.cameraY - ch; // Spawning ahead (above screen)
        
        // Generate Wall Ledges (alternating to create paths)
        if (Game.frameCount % 80 === 0) {
            Game.obstacles.push(new WallObstacle(worldY, Math.random() > 0.5));
        }
        
        // Generate Birds
        const repLvl = state.saveData.repellentLevel || 0;
        const birdFreq = 120 + (repLvl * 30); 
        if (Game.frameCount % birdFreq === 0 && state.score > 50) {
            Game.birds.push(new Bird(worldY + MathUtil.rand(-50, 50)));
        }

        // Entity Updates & Collisions
        for (let i = Game.obstacles.length - 1; i >= 0; i--) {
            let obs = Game.obstacles[i];
            if (obs.y > Game.cameraY + ch * 2) {
                Game.obstacles.splice(i, 1);
                continue;
            }
            
            // Box collision logic against the balloon circle
            if (Game.balloon.y + Game.balloon.r > obs.y - obs.height/2 && 
                Game.balloon.y - Game.balloon.r < obs.y + obs.height/2) {
                
                if (obs.isLeft && Game.balloon.x - Game.balloon.r < obs.width) Game.die();
                if (!obs.isLeft && Game.balloon.x + Game.balloon.r > cw - obs.width) Game.die();
            }
        }

        for (let i = Game.birds.length - 1; i >= 0; i--) {
            let b = Game.birds[i];
            b.update();
            if ((b.isLeft && b.x > cw + 100) || (!b.isLeft && b.x < -100)) {
                Game.birds.splice(i, 1);
                continue;
            }
            
            // Collision (World coordinates)
            if (MathUtil.distance(Game.balloon.x, Game.balloon.y, b.x, b.y) < Game.balloon.r + b.r) {
                Game.die();
            }
        }

        // Update particles
        Game.particles.forEach(p => p.update());
        Game.particles = Game.particles.filter(p => p.life > 0);
    },

    draw: () => {
        // Draw Dynamic Background based on score (altitude)
        let gradient = ctx.createLinearGradient(0, 0, 0, ch);
        
        if (state.score < 200) {
            gradient.addColorStop(0, '#74b9ff');
            gradient.addColorStop(1, '#dfe6e9');
        } else if (state.score < 600) {
            let p = (state.score - 200) / 400;
            gradient.addColorStop(0, interpolateColor('#74b9ff', '#6c5ce7', p));
            gradient.addColorStop(1, interpolateColor('#dfe6e9', '#fdcb6e', p));
        } else if (state.score < 1000) {
            let p = (state.score - 600) / 400;
            gradient.addColorStop(0, interpolateColor('#6c5ce7', '#090a0f', p));
            gradient.addColorStop(1, interpolateColor('#fdcb6e', '#2d3436', p));
        } else {
            gradient.addColorStop(0, '#090a0f');
            gradient.addColorStop(1, '#2d3436');
        }

        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, cw, ch);

        Game.bgLayers.forEach(l => l.draw(Game.cameraY));

        ctx.save();
        
        // Screen Shake Apply
        if (Game.shakeAmount > 0) {
            ctx.translate(MathUtil.rand(-Game.shakeAmount, Game.shakeAmount), MathUtil.rand(-Game.shakeAmount, Game.shakeAmount));
            Game.shakeAmount *= 0.9;
            if(Game.shakeAmount < 0.5) Game.shakeAmount = 0;
        }

        Game.obstacles.forEach(obs => obs.draw(Game.cameraY));
        Game.birds.forEach(b => b.draw(Game.cameraY));
        
        // Particles
        ctx.globalCompositeOperation = 'screen';
        Game.particles.forEach(p => p.draw(Game.cameraY));
        ctx.globalCompositeOperation = 'source-over';

        // Balloon is drawn last
        if (Game.balloon) {
            Game.balloon.draw(Game.cameraY);
        }

        ctx.restore();
    },

    loop: (timestamp) => {
        let dt = timestamp - Game.lastTime;
        Game.lastTime = timestamp;
        
        Game.update(dt);
        Game.draw();
        
        Game.loopId = requestAnimationFrame(Game.loop);
    }
};

// Helper color interpolator for sky transitions
function interpolateColor(c1, c2, factor) {
    let hex1 = c1.substring(1), hex2 = c2.substring(1);
    let r1 = parseInt(hex1.substring(0, 2), 16), g1 = parseInt(hex1.substring(2, 4), 16), b1 = parseInt(hex1.substring(4, 6), 16);
    let r2 = parseInt(hex2.substring(0, 2), 16), g2 = parseInt(hex2.substring(2, 4), 16), b2 = parseInt(hex2.substring(4, 6), 16);
    
    let r = Math.round(r1 + factor * (r2 - r1)), g = Math.round(g1 + factor * (g2 - g1)), b = Math.round(b1 + factor * (b2 - b1));
    return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, '0')}`;
}

// ==========================================
// INITIALIZATION
// ==========================================
const initGame = () => {
    resize();
    Platform.loadData();
    Shop.render();
    
    // Kickoff background animation only for menu
    Game.bgLayers = [new BackgroundLayer(0.2), new BackgroundLayer(0.5)];
    const menuLoop = () => {
        if(state.screen === 'menu' || state.screen === 'shopScreen') {
            let gradient = ctx.createLinearGradient(0, 0, 0, ch);
            gradient.addColorStop(0, '#74b9ff');
            gradient.addColorStop(1, '#dfe6e9');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, cw, ch);
            Game.cameraY -= 1; // Pan background in menu
            Game.bgLayers.forEach(l => l.draw(Game.cameraY));
        }
        requestAnimationFrame(menuLoop);
    };
    menuLoop();
};

if (document.readyState === 'complete' || document.readyState === 'interactive') {
    initGame();
} else {
    window.addEventListener('DOMContentLoaded', initGame);
}
</script>
