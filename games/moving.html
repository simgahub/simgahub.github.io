<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moving Target Range</title>
    <style>
        :root {
            --primary: #0ff;
            --secondary: #f0f;
            --bg: #050510;
            --text: #fff;
            --panel-bg: rgba(10, 10, 25, 0.9);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: none; /* Custom crosshair rendered in canvas */
        }

        /* UI Overlays */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 16, 0.7);
            backdrop-filter: blur(5px);
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        .panel {
            background: var(--panel-bg);
            border: 2px solid var(--primary);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), inset 0 0 15px rgba(0, 255, 255, 0.1);
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
        }

        h1 {
            margin: 0 0 20px 0;
            font-size: 3rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
        }

        h2 {
            color: var(--secondary);
            text-shadow: 0 0 10px var(--secondary);
            margin-top: 0;
        }

        button {
            background: transparent;
            color: var(--text);
            border: 2px solid var(--primary);
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            text-transform: uppercase;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        button:hover {
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 0 20px var(--primary);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            border-color: var(--secondary);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2);
        }

        .btn-secondary:hover {
            background: var(--secondary);
            box-shadow: 0 0 20px var(--secondary);
        }

        .btn-disabled {
            border-color: #555;
            color: #777;
            box-shadow: none;
            cursor: not-allowed;
        }
        .btn-disabled:hover {
            background: transparent;
            color: #777;
            box-shadow: none;
            transform: none;
        }

        /* Shop Grid */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
            width: 100%;
            max-width: 800px;
        }

        .shop-item {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: border-color 0.3s;
        }

        .shop-item.unlocked {
            border-color: #0f0;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }

        .item-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .item-desc {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .item-price {
            color: gold;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
            margin-bottom: 10px;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
        }

        .hud-box {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--primary);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 5px var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        #timer { color: #fff; border-color: #fff; text-shadow: 0 0 5px #fff; }
        .time-low { color: #f00 !important; border-color: #f00 !important; text-shadow: 0 0 10px #f00 !important; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Notifications */
        #notification-container {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            z-index: 100;
        }

        .notification {
            background: rgba(20, 20, 20, 0.9);
            border-left: 4px solid var(--primary);
            padding: 12px 24px;
            margin-bottom: 10px;
            border-radius: 4px;
            color: #fff;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            animation: slideDown 0.3s ease-out forwards, fadeOut 0.5s ease-in 2.5s forwards;
        }

        .notif-error { border-left-color: #f00; }
        .notif-success { border-left-color: #0f0; }
        .notif-currency { border-left-color: gold; color: gold; text-shadow: 0 0 5px rgba(255,215,0,0.5); }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="hud" class="hidden">
        <div class="hud-box" id="score-display">Score: 0</div>
        <div class="hud-box" id="timer">60.0s</div>
    </div>

    <!-- Main Menu -->
    <div id="menu-screen" class="screen">
        <div class="panel">
            <h1>Moving Target</h1>
            <p>Test your reflexes. Earn SimgaBucks.</p>
            <div style="margin: 30px 0;">
                <p>High Score: <span id="menu-highscore" style="color: var(--primary); font-weight: bold;">0</span></p>
            </div>
            <button onclick="startGame()">Play Game</button>
            <button class="btn-secondary" onclick="showShop()">Upgrades</button>
        </div>
    </div>

    <!-- Shop Screen -->
    <div id="shop-screen" class="screen hidden">
        <div class="panel" style="width: 800px;">
            <h2>Upgrades & Customization</h2>
            <div class="shop-grid" id="shop-grid">
                <!-- Populated by JS -->
            </div>
            <div style="margin-top: 30px;">
                <button onclick="showMenu()">Back to Menu</button>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="screen hidden">
        <div class="panel">
            <h1 style="color: var(--secondary); text-shadow: 0 0 10px var(--secondary);">Time's Up</h1>
            <h2 style="font-size: 2.5rem; margin: 20px 0;">Score: <span id="final-score">0</span></h2>
            <p id="new-highscore-msg" class="hidden" style="color: #0f0; font-weight: bold; text-shadow: 0 0 5px #0f0; margin-bottom: 20px;">NEW HIGH SCORE!</p>
            <div style="display: flex; justify-content: center; gap: 10px;">
                <button onclick="startGame()">Play Again</button>
                <button class="btn-secondary" onclick="showMenu()">Menu</button>
            </div>
        </div>
    </div>

    <!-- Notifications -->
    <div id="notification-container"></div>
</div>

<script>
    /* ========================================================================
       PLATFORM INTEGRATION & STATE
       ======================================================================== */
    const GAME_ID = "moving";
    
    // Save Data Structure
    let saveData = {
        highScore: 0,
        upgrades: {
            hitboxLevel: 0, // 0 to 3
            timeLevel: 0,   // 0 to 3
        },
        unlockedItems: {
            skin_circle: false,
            skin_x: false,
            theme_alien: false
        },
        equippedSkin: 'default', // default, circle, x
        equippedTheme: 'default' // default, alien
    };

    let pendingPurchase = null;

    function saveGame() {
        window.parent.postMessage({
            type: "saveData",
            gameId: GAME_ID,
            data: saveData
        }, "*");
    }

    function loadGame() {
        const loadMsgId = "load_" + Date.now();
        window.parent.postMessage({
            type: "loadData",
            gameId: GAME_ID,
            msgId: loadMsgId
        }, "*");
        return loadMsgId;
    }

    const currentLoadMsgId = loadGame();

    function rewardSimgaBucks(amount, reason = "") {
        window.parent.postMessage({
            type: "addSimgaBucks",
            amount: amount
        }, "*");
        showNotification(`+${amount} SimgaBucks! ${reason}`, 'currency');
    }

    function requestPurchase(itemId, cost, onSuccessCallback) {
        const msgId = Math.random().toString(36).substring(2);
        pendingPurchase = { id: msgId, itemId: itemId, callback: onSuccessCallback };
        
        window.parent.postMessage({
            type: "spendSimgaBucks",
            amount: cost,
            msgId: msgId
        }, "*");
    }

    window.addEventListener("message", (event) => {
        const data = event.data;
        if (!data) return;

        if (data.type === "loadResponse" && data.msgId === currentLoadMsgId) {
            if (data.data) {
                // Merge loaded data with defaults to avoid missing keys
                saveData = {
                    ...saveData,
                    ...data.data,
                    upgrades: { ...saveData.upgrades, ...(data.data.upgrades || {}) },
                    unlockedItems: { ...saveData.unlockedItems, ...(data.data.unlockedItems || {}) }
                };
                document.getElementById('menu-highscore').innerText = saveData.highScore;
                renderShop(); // Re-render to reflect loaded state
            }
        }

        if (data.type === "spendResponse" && pendingPurchase && data.msgId === pendingPurchase.id) {
            if (data.success) {
                showNotification("Purchase Successful!", "success");
                if (pendingPurchase.callback) pendingPurchase.callback();
                saveGame();
                renderShop();
            } else {
                showNotification("Not enough SimgaBucks", "error");
            }
            pendingPurchase = null;
        }
    });

    /* ========================================================================
       SHOP DEFINITIONS
       ======================================================================== */
    const SHOP_ITEMS = [
        {
            id: 'hitbox_up',
            name: "Sensor Array (Hitbox)",
            desc: "Increases hit detection radius slightly. Max Level 3.",
            getCost: () => 15 + (saveData.upgrades.hitboxLevel * 10),
            isMaxed: () => saveData.upgrades.hitboxLevel >= 3,
            isUnlocked: () => false, // Upgrade, not an unlockable item
            action: () => { saveData.upgrades.hitboxLevel++; }
        },
        {
            id: 'time_up',
            name: "Overclock (Time)",
            desc: "Adds +5 seconds to starting time. Max Level 3.",
            getCost: () => 20 + (saveData.upgrades.timeLevel * 15),
            isMaxed: () => saveData.upgrades.timeLevel >= 3,
            isUnlocked: () => false,
            action: () => { saveData.upgrades.timeLevel++; }
        },
        {
            id: 'skin_circle',
            name: "Crosshair: Ring",
            desc: "A sleek, glowing ring crosshair.",
            getCost: () => 25,
            isMaxed: () => false,
            isUnlocked: () => saveData.unlockedItems.skin_circle,
            action: () => { saveData.unlockedItems.skin_circle = true; equipSkin('circle'); }
        },
        {
            id: 'skin_x',
            name: "Crosshair: Hunter",
            desc: "An aggressive X-style targeting reticle.",
            getCost: () => 35,
            isMaxed: () => false,
            isUnlocked: () => saveData.unlockedItems.skin_x,
            action: () => { saveData.unlockedItems.skin_x = true; equipSkin('x'); }
        },
        {
            id: 'theme_alien',
            name: "Theme: Xenotech",
            desc: "Changes target visuals to alien technology.",
            getCost: () => 50,
            isMaxed: () => false,
            isUnlocked: () => saveData.unlockedItems.theme_alien,
            action: () => { saveData.unlockedItems.theme_alien = true; equipTheme('alien'); }
        }
    ];

    function equipSkin(skinId) {
        saveData.equippedSkin = skinId;
        saveGame();
        renderShop();
    }

    function equipTheme(themeId) {
        saveData.equippedTheme = themeId;
        saveGame();
        renderShop();
    }

    /* ========================================================================
       UI FLOW & NOTIFICATIONS
       ======================================================================== */
    function showNotification(msg, type = "normal") {
        const container = document.getElementById('notification-container');
        const notif = document.createElement('div');
        notif.className = `notification notif-${type}`;
        notif.innerText = msg;
        container.appendChild(notif);
        setTimeout(() => { if(notif.parentNode) notif.remove(); }, 3000);
    }

    function hideAllScreens() {
        document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
    }

    function showMenu() {
        hideAllScreens();
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('menu-highscore').innerText = saveData.highScore;
        gameState = STATE_MENU;
    }

    function showShop() {
        hideAllScreens();
        renderShop();
        document.getElementById('shop-screen').classList.remove('hidden');
    }

    function renderShop() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = '';
        
        SHOP_ITEMS.forEach(item => {
            const el = document.createElement('div');
            el.className = 'shop-item';
            
            let btnHtml = '';
            
            if (item.id.startsWith('skin_') || item.id.startsWith('theme_')) {
                // Cosmetic Items
                if (item.isUnlocked()) {
                    el.classList.add('unlocked');
                    const isEquipped = (item.id.startsWith('skin_') && saveData.equippedSkin === item.id.split('_')[1]) ||
                                       (item.id.startsWith('theme_') && saveData.equippedTheme === item.id.split('_')[1]);
                    
                    if (isEquipped) {
                        btnHtml = `<button class="btn-disabled" disabled>Equipped</button>`;
                    } else {
                        const equipType = item.id.startsWith('skin_') ? `equipSkin('${item.id.split('_')[1]}')` : `equipTheme('${item.id.split('_')[1]}')`;
                        btnHtml = `<button class="btn-secondary" onclick="${equipType}">Equip</button>`;
                    }
                } else {
                    btnHtml = `<div class="item-price">${item.getCost()} SB</div>
                               <button onclick="handlePurchase('${item.id}')">Buy</button>`;
                }
            } else {
                // Upgrade Items
                if (item.isMaxed()) {
                    el.classList.add('unlocked');
                    btnHtml = `<button class="btn-disabled" disabled>Max Level</button>`;
                } else {
                    let levelInfo = "";
                    if (item.id === 'hitbox_up') levelInfo = `(Lvl ${saveData.upgrades.hitboxLevel}/3)`;
                    if (item.id === 'time_up') levelInfo = `(Lvl ${saveData.upgrades.timeLevel}/3)`;
                    
                    btnHtml = `<div class="item-price">${item.getCost()} SB ${levelInfo}</div>
                               <button onclick="handlePurchase('${item.id}')">Upgrade</button>`;
                }
            }

            el.innerHTML = `
                <div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-desc">${item.desc}</div>
                </div>
                <div>${btnHtml}</div>
            `;
            grid.appendChild(el);
        });
    }

    function handlePurchase(itemId) {
        const item = SHOP_ITEMS.find(i => i.id === itemId);
        if (item) {
            requestPurchase(itemId, item.getCost(), item.action);
        }
    }

    /* ========================================================================
       ENGINE & RENDERER SETUP
       ======================================================================== */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resize);
    resize();

    // Input tracking
    const mouse = { x: width/2, y: height/2, isDown: false, clicked: false };
    
    // Support touch and mouse equivalently
    function updatePointer(e) {
        let clientX = e.clientX;
        let clientY = e.clientY;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }
        const rect = canvas.getBoundingClientRect();
        mouse.x = clientX - rect.left;
        mouse.y = clientY - rect.top;
    }

    window.addEventListener('mousemove', updatePointer);
    window.addEventListener('touchmove', updatePointer, {passive: false});

    window.addEventListener('mousedown', (e) => { updatePointer(e); mouse.isDown = true; mouse.clicked = true; });
    window.addEventListener('touchstart', (e) => { updatePointer(e); mouse.isDown = true; mouse.clicked = true; }, {passive: false});
    
    window.addEventListener('mouseup', () => { mouse.isDown = false; });
    window.addEventListener('touchend', () => { mouse.isDown = false; });

    /* ========================================================================
       GAMEPLAY VARIABLES & ENTITIES
       ======================================================================== */
    const STATE_MENU = 0;
    const STATE_PLAYING = 1;
    const STATE_GAMEOVER = 2;
    let gameState = STATE_MENU;

    let score = 0;
    let timeLeft = 0;
    let lastTime = 0;
    
    // Screenshake
    let shakeAmount = 0;

    let targets = [];
    let particles = [];
    let floatingTexts = [];
    let nextSpawnTime = 0;
    let sessionTargetsHit = 0; // For economy pacing
    let difficultyMultiplier = 1;

    // Visual background data
    let gridOffset = 0;

    // Classes
    class Target {
        constructor() {
            this.radius = 25 + Math.random() * 15;
            this.y = 100 + Math.random() * (height - 300); // Keep away from extreme top/bottom
            
            // Random direction
            this.dir = Math.random() > 0.5 ? 1 : -1;
            this.x = this.dir === 1 ? -this.radius * 2 : width + this.radius * 2;
            
            // Stats based on difficulty
            this.baseSpeed = (2 + Math.random() * 3) * difficultyMultiplier;
            this.vx = this.baseSpeed * this.dir;
            
            // Type generation (20% chance for tough target if difficulty is high enough)
            this.isTough = Math.random() < (0.1 + (difficultyMultiplier * 0.05)) && difficultyMultiplier > 1.2;
            
            if (this.isTough) {
                this.hp = 3;
                this.maxHp = 3;
                this.radius *= 1.3;
                this.vx *= 0.6; // slower
                this.points = 3;
            } else {
                this.hp = 1;
                this.maxHp = 1;
                this.points = 1;
            }
            
            // Visuals
            this.wobblePhase = Math.random() * Math.PI * 2;
            this.wobbleSpeed = 0.02 + Math.random() * 0.03;
            this.baseY = this.y;
            this.color = this.isTough ? '#ff3366' : '#00ffff';
            
            // Theme override
            if (saveData.equippedTheme === 'alien') {
                this.color = this.isTough ? '#ff9900' : '#00ff66';
            }
        }

        update(dt) {
            this.x += this.vx * (dt * 60);
            this.wobblePhase += this.wobbleSpeed * (dt * 60);
            this.y = this.baseY + Math.sin(this.wobblePhase) * 30; // vertical wobble
            
            return (this.dir === 1 && this.x > width + this.radius * 2) || 
                   (this.dir === -1 && this.x < -this.radius * 2);
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            
            if (saveData.equippedTheme === 'alien') {
                // Alien Theme: Diamond / Hexagon shapes
                ctx.beginPath();
                ctx.moveTo(0, -this.radius);
                ctx.lineTo(this.radius, 0);
                ctx.lineTo(0, this.radius);
                ctx.lineTo(-this.radius, 0);
                ctx.closePath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.stroke();
                
                ctx.fillStyle = `rgba(${this.isTough ? '255,150,0' : '0,255,100'}, 0.3)`;
                ctx.fill();
                
                // Core
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                
            } else {
                // Default Theme: Sci-fi Drone (Circles & Arcs)
                // Outer ring
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // Inner core
                ctx.beginPath();
                ctx.arc(0, 0, this.radius * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                
                // Orbiting bits
                ctx.rotate(performance.now() * 0.002 * (this.dir));
                ctx.beginPath();
                ctx.arc(this.radius * 0.7, 0, 4, 0, Math.PI*2);
                ctx.arc(-this.radius * 0.7, 0, 4, 0, Math.PI*2);
                ctx.fillStyle = '#fff';
                ctx.fill();
            }
            
            // Shield indicator for tough targets
            if (this.isTough) {
                ctx.restore(); // reset rotation for health bar
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Draw segmented shield
                const segmentArc = (Math.PI * 2) / this.maxHp;
                for (let i = 0; i < this.hp; i++) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius + 8, i * segmentArc + 0.1, (i+1) * segmentArc - 0.1);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }
            
            ctx.restore();
        }
    }

    class Particle {
        constructor(x, y, color, isExplosion = false) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.isExplosion = isExplosion;
            
            const speed = isExplosion ? (2 + Math.random() * 6) : (1 + Math.random() * 3);
            const angle = Math.random() * Math.PI * 2;
            
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            
            this.life = 1.0;
            this.decay = isExplosion ? 0.02 + Math.random() * 0.03 : 0.04 + Math.random() * 0.05;
            this.size = isExplosion ? 3 + Math.random() * 4 : 2 + Math.random() * 2;
        }

        update(dt) {
            this.x += this.vx * (dt * 60);
            this.y += this.vy * (dt * 60);
            this.life -= this.decay * (dt * 60);
            return this.life <= 0;
        }

        draw(ctx) {
            ctx.globalAlpha = this.life;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            
            ctx.beginPath();
            if (this.isExplosion) {
                // draw little squares or lines
                ctx.rect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
            } else {
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
            }
            ctx.fill();
            
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;
        }
    }

    class FloatingText {
        constructor(x, y, text, color, scale = 1) {
            this.x = x;
            this.y = y;
            this.text = text;
            this.color = color;
            this.life = 1.0;
            this.vy = -1.5;
            this.scale = scale;
        }
        
        update(dt) {
            this.y += this.vy * (dt * 60);
            this.life -= 0.02 * (dt * 60);
            return this.life <= 0;
        }
        
        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.font = `bold ${20 * this.scale}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.shadowBlur = 5;
            ctx.shadowColor = this.color;
            ctx.fillText(this.text, this.x, this.y);
            ctx.restore();
        }
    }

    /* ========================================================================
       GAME LOGIC
       ======================================================================== */
    function startGame() {
        hideAllScreens();
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('new-highscore-msg').classList.add('hidden');
        
        // Reset state
        score = 0;
        sessionTargetsHit = 0;
        difficultyMultiplier = 1.0;
        
        // Apply Upgrades
        const baseTime = 30;
        timeLeft = baseTime + (saveData.upgrades.timeLevel * 5); 
        
        targets = [];
        particles = [];
        floatingTexts = [];
        nextSpawnTime = 0;
        lastTime = performance.now();
        shakeAmount = 0;
        
        updateHUD();
        gameState = STATE_PLAYING;
    }

    function endGame() {
        gameState = STATE_GAMEOVER;
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('gameover-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        
        // Economy: End of round bonus
        if (score >= 10) {
            let bonus = Math.floor(score / 10);
            if (bonus > 5) bonus = 5; // Cap bonus
            rewardSimgaBucks(bonus, "Round Complete Bonus!");
        }
        
        if (score > saveData.highScore) {
            saveData.highScore = score;
            document.getElementById('new-highscore-msg').classList.remove('hidden');
            saveGame();
        }
    }

    function spawnExplosion(x, y, color, count) {
        for(let i=0; i<count; i++) {
            particles.push(new Particle(x, y, color, true));
        }
    }
    
    function spawnSparks(x, y, color) {
        for(let i=0; i<5; i++) {
            particles.push(new Particle(x, y, color, false));
        }
    }

    function checkHit() {
        if (!mouse.clicked) return;
        mouse.clicked = false;
        
        // Shoot visual feedback (small recoil on screen)
        shakeAmount = 2;
        
        // Calculate effective hitbox
        const baseHitboxBonus = saveData.upgrades.hitboxLevel * 10;
        
        let hitSomething = false;
        
        // Check targets (reverse order to hit top z-index first)
        for (let i = targets.length - 1; i >= 0; i--) {
            let t = targets[i];
            let dist = Math.hypot(t.x - mouse.x, t.y - mouse.y);
            
            if (dist < t.radius + baseHitboxBonus) {
                // HIT!
                t.hp--;
                hitSomething = true;
                
                if (t.hp <= 0) {
                    // Destroyed
                    score += t.points;
                    sessionTargetsHit++;
                    
                    spawnExplosion(t.x, t.y, t.color, 30);
                    floatingTexts.push(new FloatingText(t.x, t.y, `+${t.points}`, '#fff', 1.5));
                    shakeAmount = t.isTough ? 8 : 4;
                    targets.splice(i, 1);
                    
                    // Economy pacing
                    // Goal: First reward quickly, then steady modest rewards
                    if (sessionTargetsHit === 3) {
                        rewardSimgaBucks(1, "First Hits!");
                    } else if (sessionTargetsHit % 8 === 0) {
                        // Regular reward
                        rewardSimgaBucks(1, "Accuracy Bonus");
                    }
                    if (t.isTough && Math.random() < 0.3) {
                        rewardSimgaBucks(2, "Elite Target Destroyed");
                    }
                    
                } else {
                    // Damaged
                    spawnSparks(t.x, t.y, '#fff');
                    shakeAmount = 3;
                }
                
                break; // Only hit one target per click
            }
        }
        
        if (!hitSomething) {
            // Miss particle at mouse
            spawnSparks(mouse.x, mouse.y, '#555');
        }
        
        updateHUD();
    }

    function updateHUD() {
        document.getElementById('score-display').innerText = `Score: ${score}`;
        const tEl = document.getElementById('timer');
        tEl.innerText = `${Math.max(0, timeLeft).toFixed(1)}s`;
        if (timeLeft <= 5) {
            tEl.classList.add('time-low');
        } else {
            tEl.classList.remove('time-low');
        }
    }

    /* ========================================================================
       MAIN LOOP & DRAWING
       ======================================================================== */
    function update(dt) {
        if (gameState !== STATE_PLAYING) return;

        timeLeft -= dt;
        if (timeLeft <= 0) {
            endGame();
            return;
        }

        difficultyMultiplier = 1.0 + ((60 - timeLeft) / 20); // Increases over time

        // Spawning logic
        nextSpawnTime -= dt;
        if (nextSpawnTime <= 0) {
            targets.push(new Target());
            // Spawn faster as difficulty goes up
            let baseRate = 1.5 - (difficultyMultiplier * 0.2);
            nextSpawnTime = Math.max(0.4, baseRate + Math.random() * 0.5);
        }

        // Update entities
        targets = targets.filter(t => !t.update(dt));
        particles = particles.filter(p => !p.update(dt));
        floatingTexts = floatingTexts.filter(ft => !ft.update(dt));

        checkHit();
        updateHUD();
        
        // Screen shake decay
        if (shakeAmount > 0) shakeAmount *= 0.9;
        if (shakeAmount < 0.5) shakeAmount = 0;
        
        // Grid animation
        gridOffset = (gridOffset + dt * 100) % 50;
    }

    function drawGrid(ctx) {
        ctx.save();
        ctx.strokeStyle = 'rgba(255, 0, 255, 0.2)';
        ctx.lineWidth = 2;
        
        // Perspective grid math
        const horizon = height * 0.6;
        const fov = 300;
        
        ctx.beginPath();
        // Horizontal lines (moving forward)
        for (let z = 50 - gridOffset; z < 500; z += 50) {
            if (z < 10) continue;
            let pY = horizon + (fov / z) * 100;
            if (pY > height) continue;
            
            ctx.moveTo(0, pY);
            ctx.lineTo(width, pY);
        }
        
        // Vertical lines (converging)
        for (let x = -width; x < width * 2; x += 100) {
            ctx.moveTo(width/2, horizon);
            let screenX = width/2 + ((x - width/2) * fov) / 50; // simple projection at z=50
            ctx.lineTo(screenX, height);
        }
        
        ctx.stroke();
        
        // Horizon glow
        const grad = ctx.createLinearGradient(0, horizon - 50, 0, horizon + 50);
        grad.addColorStop(0, 'rgba(0, 0, 0, 0)');
        grad.addColorStop(0.5, 'rgba(0, 255, 255, 0.1)');
        grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, horizon - 50, width, 100);
        
        ctx.restore();
    }

    function drawCrosshair(ctx) {
        if (!mouse.x || !mouse.y) return;
        
        ctx.save();
        ctx.translate(mouse.x, mouse.y);
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#fff';
        
        const skin = saveData.equippedSkin;
        
        if (skin === 'circle') {
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill();
        } 
        else if (skin === 'x') {
            ctx.strokeStyle = '#f0f';
            ctx.lineWidth = 3;
            ctx.beginPath();
            const s = 10;
            ctx.moveTo(-s, -s); ctx.lineTo(s, s);
            ctx.moveTo(s, -s); ctx.lineTo(-s, s);
            ctx.stroke();
        }
        else {
            // Default
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-15, 0); ctx.lineTo(15, 0);
            ctx.moveTo(0, -15); ctx.lineTo(0, 15);
            ctx.stroke();
        }
        
        ctx.restore();
    }

    function draw(ctx) {
        // Clear background
        ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
        ctx.fillRect(0, 0, width, height);
        
        // Apply screen shake
        ctx.save();
        if (shakeAmount > 0) {
            const dx = (Math.random() - 0.5) * shakeAmount;
            const dy = (Math.random() - 0.5) * shakeAmount;
            ctx.translate(dx, dy);
        }

        drawGrid(ctx);

        // Sort targets to draw larger ones (closer) last, or just sequence
        targets.forEach(t => t.draw(ctx));
        particles.forEach(p => p.draw(ctx));
        floatingTexts.forEach(ft => ft.draw(ctx));

        ctx.restore(); // remove screenshake transform for UI/crosshair

        // Draw crosshair on top of everything
        if (gameState === STATE_PLAYING) {
            drawCrosshair(ctx);
        }
    }

    function gameLoop(timestamp) {
        let dt = (timestamp - lastTime) / 1000;
        if (dt > 0.1) dt = 0.1; // Cap delta time to prevent huge jumps
        lastTime = timestamp;

        update(dt);
        draw(ctx);

        requestAnimationFrame(gameLoop);
    }

    // Start Engine
    requestAnimationFrame(gameLoop);

</script>
