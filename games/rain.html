<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rain Barrel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #0f172a;
            color: #fff;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            touch-action: none; /* Prevent scroll on touch */
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlays */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Let canvas handle touches when UI is hidden */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .hud.active { opacity: 1; }

        .hud-text {
            font-family: 'Fredoka One', cursive;
            font-size: 28px;
            text-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        .hud-lives {
            display: flex;
            gap: 8px;
        }

        .life-drop {
            width: 20px;
            height: 30px;
            background: linear-gradient(to bottom, #38bdf8, #0284c7);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.3), 0 2px 5px rgba(0,0,0,0.4);
            transition: transform 0.2s, opacity 0.2s;
        }
        .life-drop.lost {
            opacity: 0.2;
            transform: scale(0.5);
            filter: grayscale(100%);
        }

        /* Typography & Components */
        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 4rem;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #7dd3fc, #0284c7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.6));
        }

        h2 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #e2e8f0;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 40px;
            text-align: center;
            max-width: 400px;
        }

        .panel {
            background: rgba(30, 41, 59, 0.85);
            border: 2px solid #334155;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 90%;
            width: 450px;
        }

        .btn {
            background: linear-gradient(to bottom, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-size: 1.2rem;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
            box-shadow: 0 4px 0 #1d4ed8, 0 8px 16px rgba(0,0,0,0.3);
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            margin-bottom: 16px;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #1d4ed8, 0 4px 8px rgba(0,0,0,0.3);
        }

        .btn-shop {
            background: linear-gradient(to bottom, #8b5cf6, #6d28d9);
            box-shadow: 0 4px 0 #5b21b6, 0 8px 16px rgba(0,0,0,0.3);
        }
        .btn-shop:active { box-shadow: 0 0 0 #5b21b6, 0 4px 8px rgba(0,0,0,0.3); }

        .btn-outline {
            background: transparent;
            border: 2px solid #64748b;
            box-shadow: none;
            color: #cbd5e1;
            margin-top: 10px;
        }
        .btn-outline:active { transform: scale(0.98); box-shadow: none; }

        /* Shop Styles */
        .shop-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-height: 50vh;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 20px;
        }
        
        /* Custom Scrollbar */
        .shop-grid::-webkit-scrollbar { width: 8px; }
        .shop-grid::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        .shop-grid::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

        .shop-item {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
        }
        .shop-item:hover { border-color: #6366f1; }

        .item-info {
            display: flex;
            flex-direction: column;
        }
        .item-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #f1f5f9;
        }
        .item-desc {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 4px;
        }

        .buy-btn {
            background: linear-gradient(to bottom, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 #047857;
            font-size: 0.9rem;
            min-width: 90px;
            text-align: center;
        }
        .buy-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }
        .buy-btn.disabled {
            background: #475569;
            box-shadow: 0 3px 0 #334155;
            color: #94a3b8;
            cursor: not-allowed;
        }

        /* Loading / Block Overlay */
        #loading-overlay {
            z-index: 100;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Floating text for score */
        .floating-text {
            position: absolute;
            font-family: 'Fredoka One', cursive;
            color: #fff;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            z-index: 20;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.5); }
        }

        /* Mobile specific adjustments */
        @media (max-width: 500px) {
            h1 { font-size: 3rem; }
            .panel { padding: 24px; }
            .btn { padding: 12px 24px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        
        <!-- HUD -->
        <div id="hud" class="hud">
            <div>
                <div class="hud-text" style="color: #fcd34d;">Score: <span id="scoreVal">0</span></div>
                <div class="hud-text" style="font-size: 18px; color: #94a3b8; margin-top: 4px;">Best: <span id="highScoreVal">0</span></div>
            </div>
            <div id="livesContainer" class="hud-lives">
                <!-- Hearts/Drops injected here -->
            </div>
        </div>

        <!-- Menu Screen -->
        <div id="screen-menu" class="screen">
            <div class="panel">
                <h1>Rain Barrel</h1>
                <p class="subtitle">Catch the drops. Survive the storm. Upgrade your barrel.</p>
                <button class="btn" onclick="startGame()">Play Game</button>
                <button class="btn btn-shop" onclick="showScreen('screen-shop')">Upgrades & Skins</button>
            </div>
        </div>

        <!-- Shop Screen -->
        <div id="screen-shop" class="screen">
            <div class="panel">
                <h2>Shop</h2>
                <div class="shop-grid" id="shopGrid">
                    <!-- Shop items injected via JS -->
                </div>
                <button class="btn btn-outline" onclick="showScreen('screen-menu')">Back to Menu</button>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="screen-gameover" class="screen">
            <div class="panel">
                <h1 style="font-size: 3rem; color: #ef4444; -webkit-text-fill-color: #ef4444; text-shadow: 0 4px 0 #991b1b;">Game Over</h1>
                <div style="font-size: 1.5rem; margin-bottom: 10px;">Final Score: <span id="endScore" style="font-weight:bold; color:#fcd34d">0</span></div>
                <p class="subtitle" style="margin-bottom: 30px;" id="endMessage">The barrel overflowed...</p>
                <button class="btn" onclick="startGame()">Play Again</button>
                <button class="btn btn-shop" onclick="showScreen('screen-shop')">Visit Shop</button>
                <button class="btn btn-outline" onclick="showScreen('screen-menu')">Main Menu</button>
            </div>
        </div>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="screen active">
            <div class="spinner"></div>
            <h2 id="loadingText">Loading Data...</h2>
        </div>

    </div>
</div>

<script>
/**
 * RAIN BARREL
 * A visually polished HTML5 Canvas Game.
 */

// --- Constants & Platform Integration ---
const GAME_ID = "rain";

const CONFIG = {
    lives: 5,
    baseBarrelWidth: 80,
    baseBarrelHeight: 100,
    baseBonusChance: 0.05,
    stormInterval: 30000, // ms
    stormDuration: 8000,
    simgaRewardInterval: 50 // Score points per reward
};

// Shop Data Configuration
const SHOP_ITEMS = {
    upgrade_width: { 
        id: 'upgrade_width', type: 'upgrade', name: "Wider Barrel", 
        desc: "Increases barrel catching area.", baseCost: 10, maxLevel: 5 
    },
    upgrade_bonus: { 
        id: 'upgrade_bonus', type: 'upgrade', name: "Golden Rain", 
        desc: "Increases chance of bonus drops.", baseCost: 15, maxLevel: 5 
    },
    skin_wood: { 
        id: 'skin_wood', type: 'skin', name: "Classic Wood", 
        desc: "The reliable oak barrel.", cost: 0, default: true 
    },
    skin_metal: { 
        id: 'skin_metal', type: 'skin', name: "Steel Drum", 
        desc: "Industrial grade catching.", cost: 40 
    },
    skin_neon: { 
        id: 'skin_neon', type: 'skin', name: "Neon Cyber", 
        desc: "Glows in the dark.", cost: 80 
    }
};

// Player Save State
let saveState = {
    upgrades: { width: 0, bonus: 0 },
    unlockedSkins: ['skin_wood'],
    equippedSkin: 'skin_wood',
    highScore: 0
};

// --- Platform API Functions ---
function saveGame() {
    window.parent.postMessage({
        type: "saveData",
        gameId: GAME_ID,
        data: saveState
    }, "*");
}

function loadGame() {
    const loadMsgId = "load_" + Date.now();
    window.parent.postMessage({
        type: "loadData",
        gameId: GAME_ID,
        msgId: loadMsgId
    }, "*");
    return loadMsgId;
}

function rewardSimgaBucks(amount, reason) {
    // Create floating text to show player they earned something
    showFloatingText(`+${amount} SimgaBucks!`, canvas.width/2, 100, '#10b981');
    window.parent.postMessage({
        type: "addSimgaBucks",
        amount: amount
    }, "*");
}

let pendingPurchase = null; // Store item info while waiting for response

function requestPurchase(itemId, cost) {
    const msgId = "buy_" + Math.random().toString(36).substr(2, 9);
    pendingPurchase = { id: itemId, msgId: msgId, cost: cost };
    
    showLoading("Purchasing...");
    
    window.parent.postMessage({
        type: "spendSimgaBucks",
        amount: cost,
        msgId: msgId
    }, "*");
}

// --- Message Listener ---
let loadRequestId = null;
let dataLoaded = false;

window.addEventListener("message", (event) => {
    const data = event.data;

    // Load Response
    if (data.type === "loadResponse" && data.msgId === loadRequestId) {
        if (data.data) {
            // Restore saved values, fallback to defaults
            saveState.upgrades = data.data.upgrades || { width: 0, bonus: 0 };
            saveState.unlockedSkins = data.data.unlockedSkins || ['skin_wood'];
            saveState.equippedSkin = data.data.equippedSkin || 'skin_wood';
            saveState.highScore = data.data.highScore || 0;
        }
        dataLoaded = true;
        hideLoading();
        showScreen('screen-menu');
        updateHUD();
    }

    // Purchase Response
    if (data.type === "spendResponse" && pendingPurchase && data.msgId === pendingPurchase.msgId) {
        hideLoading();
        if (data.success) {
            handleSuccessfulPurchase(pendingPurchase.id);
        } else {
            alert("Not enough SimgaBucks to purchase this item.");
        }
        pendingPurchase = null;
    }
});

// Init Load
window.onload = () => {
    loadRequestId = loadGame();
    // Fallback if platform doesn't respond in 2 seconds
    setTimeout(() => {
        if (!dataLoaded) {
            dataLoaded = true;
            hideLoading();
            showScreen('screen-menu');
            updateHUD();
        }
    }, 2000);
    initCanvas();
    renderShop();
};


// --- Game Engine Variables ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false }); // Optimize for no transparency on base
let width, height;

// Game State
let gameState = 'MENU'; // MENU, PLAYING, GAMEOVER
let score = 0;
let lives = CONFIG.lives;
let gameTime = 0;
let lastTime = 0;
let animationId;
let simgaPointsCounter = 0;

// Entities
let barrel = { x: 0, y: 0, targetX: 0, w: CONFIG.baseBarrelWidth, h: CONFIG.baseBarrelHeight, catchRadius: 0, fillLevel: 0 };
let drops = [];
let particles = [];
let clouds = [];
let isStorm = false;
let stormTimer = 0;
let lightningFlash = 0;

// Input
let mouseX = 0;

// --- Setup & Resize ---
function initCanvas() {
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    // Input Listeners
    canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX; });
    canvas.addEventListener('touchmove', (e) => { 
        mouseX = e.touches[0].clientX; 
        e.preventDefault(); // Prevent scrolling
    }, { passive: false });
    
    // Start background loop
    requestAnimationFrame(gameLoop);
}

function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    
    barrel.y = height - CONFIG.baseBarrelHeight - 20;
    if(barrel.x === 0) barrel.x = width/2;
    barrel.targetX = barrel.x;
    mouseX = width/2;
    
    // Init clouds
    if (clouds.length === 0) {
        for(let i=0; i<6; i++) {
            clouds.push({
                x: Math.random() * width,
                y: Math.random() * (height/3),
                speed: 0.1 + Math.random() * 0.3,
                scale: 0.5 + Math.random(),
                opacity: 0.1 + Math.random() * 0.15
            });
        }
    }
}

// --- UI & Shop Logic ---
function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    if (screenId) {
        document.getElementById(screenId).classList.add('active');
    }
    
    if (screenId === 'screen-shop') renderShop();
}

function showLoading(text) {
    document.getElementById('loadingText').innerText = text;
    document.getElementById('loading-overlay').classList.add('active');
}
function hideLoading() {
    document.getElementById('loading-overlay').classList.remove('active');
}

function startGame() {
    showScreen(null);
    document.getElementById('hud').classList.add('active');
    
    // Apply upgrades to barrel stats
    const wLevel = saveState.upgrades.width;
    barrel.w = CONFIG.baseBarrelWidth + (wLevel * 15);
    barrel.h = CONFIG.baseBarrelHeight;
    barrel.catchRadius = barrel.w / 2;
    barrel.fillLevel = 0;
    
    score = 0;
    lives = CONFIG.lives;
    gameTime = 0;
    stormTimer = 0;
    isStorm = false;
    simgaPointsCounter = 0;
    drops = [];
    particles = [];
    updateHUD();
    
    gameState = 'PLAYING';
}

function gameOver() {
    gameState = 'GAMEOVER';
    document.getElementById('hud').classList.remove('active');
    document.getElementById('endScore').innerText = score;
    
    if (score > saveState.highScore) {
        saveState.highScore = score;
        document.getElementById('endMessage').innerText = "New High Score!";
    } else {
        document.getElementById('endMessage').innerText = "The barrel overflowed...";
    }
    
    saveGame();
    showScreen('screen-gameover');
}

function renderShop() {
    const grid = document.getElementById('shopGrid');
    grid.innerHTML = '';
    
    for (const key in SHOP_ITEMS) {
        const item = SHOP_ITEMS[key];
        const div = document.createElement('div');
        div.className = 'shop-item';
        
        let costInfo = 0;
        let btnHtml = '';
        let statusText = '';
        
        if (item.type === 'upgrade') {
            const currentLevel = saveState.upgrades[key.replace('upgrade_','')] || 0;
            if (currentLevel >= item.maxLevel) {
                statusText = `<span style="color:#10b981; font-weight:bold;">MAX LEVEL</span>`;
                btnHtml = `<button class="buy-btn disabled">MAXED</button>`;
            } else {
                costInfo = item.baseCost + (currentLevel * 10);
                statusText = `Level ${currentLevel}/${item.maxLevel}`;
                btnHtml = `<button class="buy-btn" onclick="requestPurchase('${item.id}', ${costInfo})">${costInfo} SB</button>`;
            }
        } else if (item.type === 'skin') {
            const unlocked = saveState.unlockedSkins.includes(item.id);
            const equipped = saveState.equippedSkin === item.id;
            
            if (equipped) {
                statusText = `<span style="color:#3b82f6; font-weight:bold;">EQUIPPED</span>`;
                btnHtml = `<button class="buy-btn disabled">EQUIPPED</button>`;
            } else if (unlocked) {
                statusText = `<span style="color:#10b981; font-weight:bold;">UNLOCKED</span>`;
                btnHtml = `<button class="buy-btn" style="background:#3b82f6; box-shadow:0 3px 0 #1d4ed8;" onclick="equipSkin('${item.id}')">EQUIP</button>`;
            } else {
                costInfo = item.cost;
                statusText = `Skin`;
                btnHtml = `<button class="buy-btn" onclick="requestPurchase('${item.id}', ${costInfo})">${costInfo} SB</button>`;
            }
        }
        
        div.innerHTML = `
            <div class="item-info">
                <span class="item-name">${item.name}</span>
                <span class="item-desc">${item.desc}</span>
                <span style="font-size: 0.8rem; color:#64748b; margin-top:4px;">${statusText}</span>
            </div>
            ${btnHtml}
        `;
        grid.appendChild(div);
    }
}

function handleSuccessfulPurchase(itemId) {
    const item = SHOP_ITEMS[itemId];
    if (item.type === 'upgrade') {
        const uKey = itemId.replace('upgrade_', '');
        saveState.upgrades[uKey] = (saveState.upgrades[uKey] || 0) + 1;
    } else if (item.type === 'skin') {
        saveState.unlockedSkins.push(itemId);
        saveState.equippedSkin = itemId;
    }
    saveGame();
    renderShop();
    createPurchaseParticles();
}

function equipSkin(skinId) {
    saveState.equippedSkin = skinId;
    saveGame();
    renderShop();
}

function updateHUD() {
    document.getElementById('scoreVal').innerText = score;
    document.getElementById('highScoreVal').innerText = saveState.highScore;
    
    const livesDiv = document.getElementById('livesContainer');
    livesDiv.innerHTML = '';
    for(let i=0; i<CONFIG.lives; i++) {
        const life = document.createElement('div');
        life.className = 'life-drop ' + (i >= lives ? 'lost' : '');
        livesDiv.appendChild(life);
    }
}

function showFloatingText(text, x, y, color = '#fff') {
    const el = document.createElement('div');
    el.className = 'floating-text';
    el.innerText = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.color = color;
    document.getElementById('game-container').appendChild(el);
    setTimeout(() => {
        if(el.parentNode) el.parentNode.removeChild(el);
    }, 1000);
}

function createPurchaseParticles() {
    // Generate confetti effect in UI center
    for(let i=0; i<30; i++) {
        const el = document.createElement('div');
        el.style.position = 'absolute';
        el.style.left = '50%';
        el.style.top = '50%';
        el.style.width = '10px';
        el.style.height = '10px';
        el.style.backgroundColor = ['#fcd34d', '#3b82f6', '#10b981', '#ef4444'][Math.floor(Math.random()*4)];
        el.style.borderRadius = '50%';
        el.style.pointerEvents = 'none';
        el.style.zIndex = '100';
        document.getElementById('ui-layer').appendChild(el);
        
        const angle = Math.random() * Math.PI * 2;
        const velocity = 2 + Math.random() * 5;
        const vx = Math.cos(angle) * velocity * 20;
        const vy = Math.sin(angle) * velocity * 20;
        
        el.animate([
            { transform: 'translate(0, 0) scale(1)', opacity: 1 },
            { transform: `translate(${vx}px, ${vy}px) scale(0)`, opacity: 0 }
        ], {
            duration: 800 + Math.random() * 400,
            easing: 'cubic-bezier(.17,.67,.83,.67)'
        }).onfinish = () => el.remove();
    }
}


// --- Game Engine Logic ---

function spawnDrop() {
    const isBonus = Math.random() < (CONFIG.baseBonusChance + (saveState.upgrades.bonus * 0.03));
    let baseSpeed = isStorm ? (5 + Math.random() * 3) : (3 + Math.random() * 2);
    // Increase speed slowly over time
    baseSpeed += (gameTime / 60000); 

    drops.push({
        x: Math.random() * (width - 40) + 20,
        y: -20,
        speed: baseSpeed,
        type: isBonus ? 'bonus' : 'normal',
        length: isStorm ? 30 : 20,
        wobble: Math.random() * Math.PI * 2
    });
}

function spawnParticle(x, y, color, count, type='splash') {
    for(let i=0; i<count; i++) {
        let vx = (Math.random() - 0.5) * 4;
        let vy = -Math.random() * 3 - 1;
        if(type==='rain') vy = -Math.random() * 2;
        
        particles.push({
            x: x, y: y,
            vx: vx, vy: vy,
            life: 1,
            decay: 0.02 + Math.random() * 0.03,
            color: color,
            size: Math.random() * 3 + 1
        });
    }
}

function updateState(dt) {
    if (gameState !== 'PLAYING') return;

    gameTime += dt;
    stormTimer += dt;
    
    // Smooth movement
    barrel.targetX = mouseX;
    // Clamp to screen
    barrel.targetX = Math.max(barrel.w/2, Math.min(width - barrel.w/2, barrel.targetX));
    barrel.x += (barrel.targetX - barrel.x) * 0.2;

    // Storm Logic
    if (!isStorm && stormTimer > CONFIG.stormInterval) {
        isStorm = true;
        stormTimer = 0;
        lightningFlash = 1.0;
        showFloatingText("STORM SURGE!", width/2 - 80, height/3, '#38bdf8');
    } else if (isStorm && stormTimer > CONFIG.stormDuration) {
        isStorm = false;
        stormTimer = 0;
        // Reward survival
        rewardSimgaBucks(3, "Storm Survived");
    }

    // Spawning logic
    let spawnRate = isStorm ? 100 : Math.max(300, 800 - (gameTime / 100));
    if (Math.random() < dt / spawnRate) {
        spawnDrop();
    }

    // Update Drops
    for (let i = drops.length - 1; i >= 0; i--) {
        let d = drops[i];
        d.y += d.speed;
        d.wobble += 0.1;
        d.x += Math.sin(d.wobble) * 0.5;

        // Collision with barrel top opening
        const catchY = barrel.y - barrel.h/2;
        if (d.y + d.length > catchY && d.y < catchY + 10) {
            if (Math.abs(d.x - barrel.x) < barrel.catchRadius) {
                // Caught!
                let pts = d.type === 'bonus' ? 5 : 1;
                score += pts;
                simgaPointsCounter += pts;
                
                // Visuals
                barrel.fillLevel = Math.min(1, barrel.fillLevel + 0.05);
                spawnParticle(d.x, catchY, d.type==='bonus' ? '#fcd34d' : '#38bdf8', 5);
                
                if (d.type === 'bonus') {
                    showFloatingText("+5", d.x, catchY - 20, '#fcd34d');
                    if (lives < CONFIG.lives) {
                        lives++;
                        showFloatingText("+1 Life", barrel.x, barrel.y - 60, '#ef4444');
                    }
                }
                
                // Economy check
                if (simgaPointsCounter >= CONFIG.simgaRewardInterval) {
                    simgaPointsCounter -= CONFIG.simgaRewardInterval;
                    rewardSimgaBucks(1, "Points Milestone");
                }
                
                updateHUD();
                drops.splice(i, 1);
                continue;
            }
        }

        // Missed (hit ground)
        if (d.y > height) {
            spawnParticle(d.x, height - 5, d.type==='bonus' ? '#fcd34d' : '#94a3b8', 3, 'rain');
            if (d.type === 'normal') {
                lives--;
                updateHUD();
                
                // Visual feedback for hurt
                const ui = document.getElementById('game-container');
                ui.style.boxShadow = "inset 0 0 50px rgba(239, 68, 68, 0.5)";
                setTimeout(() => ui.style.boxShadow = "none", 200);

                if (lives <= 0) {
                    gameOver();
                }
            }
            drops.splice(i, 1);
        }
    }

    // Update Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2; // Gravity
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
    }
    
    // Barrel water slosh
    if (barrel.fillLevel > 0) barrel.fillLevel -= 0.001; // slowly drains or settles

    // Environment updates
    if (lightningFlash > 0) lightningFlash -= 0.02;
    clouds.forEach(c => {
        c.x -= c.speed;
        if (c.x < -200) c.x = width + 200;
    });
}

// --- Rendering Logic ---

function drawBackground() {
    // Deep dynamic gradient
    let grd = ctx.createLinearGradient(0, 0, 0, height);
    if (isStorm) {
        grd.addColorStop(0, '#020617');
        grd.addColorStop(1, '#1e293b');
    } else {
        grd.addColorStop(0, '#0f172a');
        grd.addColorStop(1, '#334155');
    }
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, width, height);

    // Stars / Rain streaks far background
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    for(let i=0; i<20; i++) {
        let sx = (Date.now() * 0.01 * (i%3+1) + i*100) % width;
        let sy = (Date.now() * 0.05 * (i%2+1) + i*50) % height;
        ctx.fillRect(sx, sy, 1, 10);
    }

    // Clouds
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    clouds.forEach(c => {
        ctx.beginPath();
        ctx.arc(c.x, c.y, 100 * c.scale, 0, Math.PI*2);
        ctx.arc(c.x + 60*c.scale, c.y + 20*c.scale, 80 * c.scale, 0, Math.PI*2);
        ctx.arc(c.x - 60*c.scale, c.y + 10*c.scale, 70 * c.scale, 0, Math.PI*2);
        ctx.fill();
    });

    // Lightning Flash
    if (lightningFlash > 0) {
        ctx.fillStyle = `rgba(255, 255, 255, ${lightningFlash * 0.5})`;
        ctx.fillRect(0, 0, width, height);
    }
}

function drawBarrel() {
    const skin = saveState.equippedSkin;
    const {x, y, w, h} = barrel;
    
    ctx.save();
    ctx.translate(x, y);
    
    // Tilt slightly based on movement speed
    const tilt = (barrel.targetX - x) * 0.005;
    ctx.rotate(tilt);

    // Drop Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.ellipse(0, h/2 + 5, w/2, 10, 0, 0, Math.PI*2);
    ctx.fill();

    if (skin === 'skin_neon') {
        // NEON CYBER SKIN
        ctx.fillStyle = '#09090b';
        // Base shape
        ctx.beginPath();
        ctx.ellipse(0, -h/2, w/2, 15, 0, Math.PI, 0); // Top
        ctx.lineTo(w/2, h/2);
        ctx.ellipse(0, h/2, w/2, 15, 0, 0, Math.PI); // Bottom
        ctx.lineTo(-w/2, -h/2);
        ctx.fill();
        
        // Neon grid lines
        ctx.strokeStyle = '#ec4899'; // Pink
        ctx.lineWidth = 2;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ec4899';
        for(let i=1; i<4; i++) {
            let py = -h/2 + (h/4)*i;
            ctx.beginPath();
            ctx.ellipse(0, py, Math.max(0, w/2-2), 15, 0, 0, Math.PI);
            ctx.stroke();
        }
        // Vertical lines
        ctx.strokeStyle = '#06b6d4'; // Cyan
        ctx.shadowColor = '#06b6d4';
        for(let i=1; i<4; i++) {
            let px = -w/2 + (w/4)*i;
            ctx.beginPath();
            ctx.moveTo(px, -h/2 + 5);
            ctx.lineTo(px, h/2 + 5);
            ctx.stroke();
        }
        ctx.shadowBlur = 0; // reset

    } else if (skin === 'skin_metal') {
        // STEEL DRUM
        let grd = ctx.createLinearGradient(-w/2, 0, w/2, 0);
        grd.addColorStop(0, '#475569');
        grd.addColorStop(0.2, '#94a3b8');
        grd.addColorStop(0.5, '#cbd5e1');
        grd.addColorStop(0.8, '#64748b');
        grd.addColorStop(1, '#334155');
        
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.ellipse(0, -h/2, w/2, 15, 0, Math.PI, 0); 
        ctx.lineTo(w/2, h/2);
        ctx.ellipse(0, h/2, w/2, 15, 0, 0, Math.PI);
        ctx.lineTo(-w/2, -h/2);
        ctx.fill();

        // Ribs
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.lineWidth = 4;
        for(let i=1; i<4; i++) {
            let py = -h/2 + (h/4)*i;
            ctx.beginPath();
            ctx.ellipse(0, py, w/2, 15, 0, 0, Math.PI);
            ctx.stroke();
            
            // Highlight
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.ellipse(0, py-2, w/2, 15, 0, 0, Math.PI);
            ctx.stroke();
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 4;
        }

    } else {
        // CLASSIC WOOD (Default)
        // Main body Gradient
        let grd = ctx.createLinearGradient(-w/2, 0, w/2, 0);
        grd.addColorStop(0, '#5c4033'); // Dark brown
        grd.addColorStop(0.5, '#a0522d'); // Sienna
        grd.addColorStop(1, '#3e2723'); // Very dark
        
        ctx.fillStyle = grd;
        
        // Curved barrel sides using Bezier curves
        ctx.beginPath();
        ctx.ellipse(0, -h/2, w/2, 12, 0, Math.PI, 0); // Top half of ellipse
        // Right curve outward
        ctx.bezierCurveTo(w/2 + 10, -h/4, w/2 + 10, h/4, w/2, h/2);
        ctx.ellipse(0, h/2, w/2, 12, 0, 0, Math.PI); // Bottom ellipse
        // Left curve outward
        ctx.bezierCurveTo(-w/2 - 10, h/4, -w/2 - 10, -h/4, -w/2, -h/2);
        ctx.fill();

        // Planks (vertical lines curving with shape)
        ctx.strokeStyle = 'rgba(0,0,0,0.6)';
        ctx.lineWidth = 2;
        const numPlanks = 6;
        for(let i=1; i<numPlanks; i++) {
            let px = -w/2 + (w/numPlanks)*i;
            // Simulate 3D curve for planks
            let bow = Math.sin((i/numPlanks)*Math.PI) * 10; 
            ctx.beginPath();
            ctx.moveTo(px, -h/2 + 5);
            ctx.quadraticCurveTo(px + bow * (px<0?-1:1), 0, px, h/2 + 5);
            ctx.stroke();
        }

        // Metal Hoops
        ctx.fillStyle = '#64748b'; // Gray metal
        // Top hoop
        ctx.beginPath();
        ctx.ellipse(0, -h/4, w/2 + 8, 14, 0, 0, Math.PI);
        ctx.lineTo(-w/2 - 8, -h/4 - 6);
        ctx.ellipse(0, -h/4 - 6, w/2 + 8, 14, 0, Math.PI, 0);
        ctx.fill();
        
        // Bottom hoop
        ctx.beginPath();
        ctx.ellipse(0, h/4, w/2 + 8, 14, 0, 0, Math.PI);
        ctx.lineTo(-w/2 - 8, h/4 - 6);
        ctx.ellipse(0, h/4 - 6, w/2 + 8, 14, 0, Math.PI, 0);
        ctx.fill();
        
        // Rivets on hoops
        ctx.fillStyle = '#334155';
        for(let i=0; i<5; i++) {
            let rx = -w/2 + (w/4)*i;
            ctx.beginPath(); ctx.arc(rx, -h/4 - 3, 2, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(rx, h/4 - 3, 2, 0, Math.PI*2); ctx.fill();
        }
    }

    // Water level inside
    if (barrel.fillLevel > 0) {
        ctx.fillStyle = 'rgba(56, 189, 248, 0.8)';
        if(skin === 'skin_neon') ctx.fillStyle = 'rgba(236, 72, 153, 0.8)';
        
        let waterY = -h/2 + 5; // Top opening Y
        // Clip to interior of top ellipse
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(0, waterY, Math.max(0.1, w/2 - 4), 10, 0, 0, Math.PI*2);
        ctx.clip();
        
        // Draw water rect rising
        ctx.fillRect(-w/2, waterY + 10 - (10 * barrel.fillLevel), w, 20);
        ctx.restore();
    } else {
        // Empty interior depth
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.beginPath();
        ctx.ellipse(0, -h/2, Math.max(0.1, w/2 - 4), 10, 0, 0, Math.PI*2);
        ctx.fill();
    }

    ctx.restore();
}

function drawDrops() {
    ctx.lineCap = 'round';
    
    for (let d of drops) {
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x, d.y - d.length);
        
        if (d.type === 'bonus') {
            // Golden glow
            ctx.strokeStyle = '#fcd34d';
            ctx.lineWidth = 4;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#fbbf24';
            ctx.stroke();
            ctx.shadowBlur = 0; // reset
            
            // White core
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        } else {
            // Normal water drop
            let grd = ctx.createLinearGradient(0, d.y, 0, d.y - d.length);
            grd.addColorStop(0, 'rgba(125, 211, 252, 1)');
            grd.addColorStop(1, 'rgba(125, 211, 252, 0)');
            ctx.strokeStyle = grd;
            ctx.lineWidth = 3;
            ctx.stroke();
        }
    }
}

function drawParticles() {
    for (let p of particles) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1.0;
}

// --- Main Loop ---
function gameLoop(timestamp) {
    let dt = timestamp - lastTime;
    lastTime = timestamp;
    
    // Cap dt to prevent huge jumps on tab switch
    if (dt > 100) dt = 16; 

    // Always draw background for menu/shop too
    drawBackground();

    if (gameState === 'PLAYING' || gameState === 'GAMEOVER') {
        updateState(dt);
        drawDrops();
        drawBarrel();
        drawParticles();
    } else {
        // Just ambient effects for Menu
        clouds.forEach(c => {
            c.x -= c.speed;
            if (c.x < -200) c.x = width + 200;
        });
        // Idle barrel drawing in background
        if (width) {
            barrel.x = width/2;
            barrel.targetX = width/2;
            drawBarrel();
        }
    }

    animationId = requestAnimationFrame(gameLoop);
}

</script>
