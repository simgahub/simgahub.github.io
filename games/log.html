<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Log Splitter</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & Setup */
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a0f00; font-family: 'Nunito', sans-serif; }
        
        #game-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #1a0f00; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* UI Layer */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: transparent; pointer-events: auto; opacity: 0; transition: opacity 0.3s; z-index: -1; }
        #shop-screen, #gameover-screen { background: rgba(0,0,0,0.75); }
        .screen.active { opacity: 1; z-index: 10; }
        
        /* Typography */
        h1 { font-family: 'Lilita One', cursive; font-size: 5rem; margin: 0 0 20px 0; color: #fff; text-shadow: 0 6px 0 #8b4513, 0 10px 15px rgba(0,0,0,0.8); text-align: center; line-height: 1.1; letter-spacing: 2px;}
        h2 { font-family: 'Lilita One', cursive; font-size: 3rem; margin: 0 0 15px 0; color: #ffd700; text-shadow: 0 4px 0 #b8860b; }
        p { font-size: 1.2rem; color: #ddd; margin-bottom: 20px; text-align: center; }
        
        /* Buttons */
        .btn { font-family: 'Lilita One', cursive; font-size: 1.8rem; padding: 15px 40px; margin: 10px; border: none; border-radius: 15px; background: linear-gradient(to bottom, #4CAF50, #2E7D32); color: white; cursor: pointer; text-shadow: 0 3px 0 #1b5e20; box-shadow: 0 6px 0 #1b5e20, 0 10px 10px rgba(0,0,0,0.5); transition: transform 0.1s, box-shadow 0.1s; text-transform: uppercase; }
        .btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #1b5e20, 0 2px 5px rgba(0,0,0,0.5); }
        .btn-blue { background: linear-gradient(to bottom, #2196F3, #1565C0); text-shadow: 0 3px 0 #0d47a1; box-shadow: 0 6px 0 #0d47a1, 0 10px 10px rgba(0,0,0,0.5); }
        .btn-blue:active { box-shadow: 0 0px 0 #0d47a1; }
        .btn-red { background: linear-gradient(to bottom, #f44336, #c62828); text-shadow: 0 3px 0 #b71c1c; box-shadow: 0 6px 0 #b71c1c, 0 10px 10px rgba(0,0,0,0.5); }
        .btn-red:active { box-shadow: 0 0px 0 #b71c1c; }
        
        /* HUD */
        #hud { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.3s; }
        #hud.active { opacity: 1; }
        .hud-stat { font-family: 'Lilita One', cursive; font-size: 2.5rem; color: white; text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 0 5px 10px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 10px; }
        .hud-stat img { height: 40px; }
        .lives-container { display: flex; gap: 5px; }
        .life { font-size: 2rem; color: #ff3333; text-shadow: 0 2px 0 #880000; }
        .life.lost { color: #555; text-shadow: none; opacity: 0.5; }

        /* Shop Grid */
        .shop-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 900px; max-height: 60vh; overflow-y: auto; padding: 20px; background: rgba(0,0,0,0.7); border-radius: 20px; border: 4px solid #553311; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .shop-container::-webkit-scrollbar { width: 10px; }
        .shop-container::-webkit-scrollbar-thumb { background: #8b4513; border-radius: 5px; }
        .shop-item { background: linear-gradient(to bottom, #3e2723, #212121); border: 3px solid #795548; border-radius: 15px; padding: 15px; width: 220px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.2s; box-shadow: 0 8px 15px rgba(0,0,0,0.5); }
        .shop-item:hover { transform: scale(1.05); }
        .shop-item h3 { font-family: 'Lilita One', cursive; color: #ffeb3b; margin: 0 0 10px 0; font-size: 1.5rem; text-shadow: 0 2px 0 #000; }
        .shop-item p { font-size: 0.9rem; margin: 0 0 15px 0; color: #ccc; }
        .shop-item .cost { font-weight: 900; color: #4caf50; font-size: 1.2rem; margin-bottom: 10px; text-shadow: 0 1px 0 #000; }
        .btn-buy { width: 100%; padding: 10px; font-size: 1.2rem; border-radius: 8px; margin: 0; box-shadow: 0 4px 0 #1b5e20; }
        .btn-buy:active { transform: translateY(4px); box-shadow: 0 0px 0 #1b5e20; }
        .btn-buy:disabled { background: #555; box-shadow: 0 4px 0 #222; color: #888; cursor: not-allowed; }
        
        /* Message Box */
        #msg-box { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 30px; border-radius: 30px; font-weight: bold; border: 2px solid #fff; opacity: 0; transition: opacity 0.3s; z-index: 100; pointer-events: none; font-family: 'Lilita One', cursive; letter-spacing: 1px;}
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="game-canvas"></canvas>
    
    <div id="ui-layer">
        <!-- HUD -->
        <div id="hud">
            <div class="hud-stat">Score: <span id="score-display">0</span></div>
            <div class="hud-stat lives-container" id="lives-display">
                <span class="life">❤️</span><span class="life">❤️</span><span class="life">❤️</span>
            </div>
        </div>

        <!-- Main Menu -->
        <div id="menu-screen" class="screen active">
            <h1>LOG<br>SPLITTER</h1>
            <p>Chop the logs before they slide past!</p>
            <button class="btn" onclick="startGame()">Play Game</button>
            <button class="btn btn-blue" onclick="showScreen('shop-screen')">Upgrades & Skins</button>
        </div>

        <!-- Shop Screen -->
        <div id="shop-screen" class="screen">
            <h2>LUMBER SHOP</h2>
            <div class="shop-container" id="shop-content">
                <!-- Shop items injected here via JS -->
            </div>
            <button class="btn btn-red" style="margin-top:20px;" onclick="showScreen('menu-screen')">Back to Menu</button>
        </div>

        <!-- Game Over Screen -->
        <div id="gameover-screen" class="screen">
            <h1>GAME OVER</h1>
            <h2 id="go-score">Score: 0</h2>
            <p id="go-high">High Score: 0</p>
            <button class="btn" onclick="startGame()">Play Again</button>
            <button class="btn btn-blue" onclick="showScreen('menu-screen')">Main Menu</button>
        </div>
    </div>
    
    <div id="msg-box">Message</div>
</div>

<script>
    /** ==========================================
     * PLATFORM INTEGRATION & ECONOMY
     * ========================================== */
    const GAME_ID = "log";
    let pendingPurchase = null; // Stores info about an ongoing purchase request

    // Save Data Structure
    let saveData = {
        highScore: 0,
        upgrades: {
            hitWindow: 0, // 0 to 3
            chopPower: 0  // 0 to 3
        },
        skins: {
            iron: true,
            golden: false,
            neon: false
        },
        backgrounds: {
            pine: true,
            mystic: false
        },
        equippedSkin: 'iron',
        equippedBg: 'pine'
    };

    // Platform PostMessage Handlers
    window.addEventListener("message", (event) => {
        const data = event.data;
        
        if (data.type === "loadResponse" && data.msgId.startsWith("load_")) {
            if (data.data) {
                // Merge loaded data with defaults
                saveData = { ...saveData, ...data.data };
                // Deep merge for nested objects if necessary
                if(data.data.upgrades) saveData.upgrades = { ...saveData.upgrades, ...data.data.upgrades };
                if(data.data.skins) saveData.skins = { ...saveData.skins, ...data.data.skins };
                if(data.data.backgrounds) saveData.backgrounds = { ...saveData.backgrounds, ...data.data.backgrounds };
                console.log("Data loaded successfully.");
                renderShop();
            }
        }

        if (data.type === "spendResponse") {
            if (data.success && pendingPurchase && data.msgId === pendingPurchase.msgId) {
                applyPurchase(pendingPurchase.item);
                showMsg("Purchase Successful!", "#4CAF50");
                saveProgress();
                renderShop();
            } else {
                showMsg("Not enough SimgaBucks!", "#f44336");
            }
            pendingPurchase = null;
        }
    });

    function saveProgress() {
        window.parent.postMessage({
            type: "saveData",
            gameId: GAME_ID,
            data: saveData
        }, "*");
    }

    function loadProgress() {
        const loadMsgId = "load_" + Date.now();
        window.parent.postMessage({
            type: "loadData",
            gameId: GAME_ID,
            msgId: loadMsgId
        }, "*");
    }

    function addSimgaBucks(amount) {
        window.parent.postMessage({
            type: "addSimgaBucks",
            amount: amount
        }, "*");
        showMsg(`+${amount} SimgaBucks!`, "#FFD700");
    }

    function buyItem(itemId, cost, itemType, level = null) {
        if (pendingPurchase) return; // Prevent spam clicking

        const msgId = Math.random().toString(36);
        pendingPurchase = { msgId, item: { id: itemId, type: itemType, level: level } };

        window.parent.postMessage({
            type: "spendSimgaBucks",
            amount: cost,
            msgId: msgId
        }, "*");
    }

    function applyPurchase(item) {
        if (item.type === 'skin') {
            saveData.skins[item.id] = true;
            saveData.equippedSkin = item.id;
        } else if (item.type === 'bg') {
            saveData.backgrounds[item.id] = true;
            saveData.equippedBg = item.id;
        } else if (item.type === 'upgrade') {
            saveData.upgrades[item.id] = item.level;
        }
    }

    function equipItem(id, type) {
        if (type === 'skin') saveData.equippedSkin = id;
        if (type === 'bg') saveData.equippedBg = id;
        saveProgress();
        renderShop();
    }

    function showMsg(text, color) {
        const msgBox = document.getElementById("msg-box");
        msgBox.textContent = text;
        msgBox.style.color = color;
        msgBox.style.borderColor = color;
        msgBox.style.opacity = 1;
        setTimeout(() => { msgBox.style.opacity = 0; }, 2000);
    }

    /** ==========================================
     * SHOP DEFINITIONS & LOGIC
     * ========================================== */
    const SHOP_ITEMS = [
        { id: 'hitWindow', type: 'upgrade', title: 'Wider Block', desc: 'Increases the timing window for hitting logs.', levels: [ { cost: 15, val: 1 }, { cost: 40, val: 2 }, { cost: 100, val: 3 } ] },
        { id: 'chopPower', type: 'upgrade', title: 'Power Chop', desc: 'Deals extra damage to tough iron-banded logs.', levels: [ { cost: 20, val: 1 }, { cost: 50, val: 2 }, { cost: 120, val: 3 } ] },
        { id: 'golden', type: 'skin', title: 'Golden Axe', desc: 'A shiny, perfectly balanced golden axe.', cost: 50 },
        { id: 'neon', type: 'skin', title: 'Neon Edge', desc: 'A futuristic axe with a glowing laser edge.', cost: 150 },
        { id: 'mystic', type: 'bg', title: 'Mystic Woods', desc: 'Chop logs in a magical, glowing forest.', cost: 80 }
    ];

    function renderShop() {
        const container = document.getElementById('shop-content');
        container.innerHTML = '';

        SHOP_ITEMS.forEach(item => {
            const div = document.createElement('div');
            div.className = 'shop-item';
            let content = `<h3>${item.title}</h3><p>${item.desc}</p>`;
            let btnHtml = '';

            if (item.type === 'upgrade') {
                const currentLevel = saveData.upgrades[item.id];
                if (currentLevel < item.levels.length) {
                    const nextLevelInfo = item.levels[currentLevel];
                    content += `<div class="cost">💎 ${nextLevelInfo.cost} SB</div>`;
                    btnHtml = `<button class="btn btn-buy" onclick="buyItem('${item.id}', ${nextLevelInfo.cost}, 'upgrade', ${currentLevel + 1})">Upgrade (Lv ${currentLevel + 1})</button>`;
                } else {
                    content += `<div class="cost" style="color:#aaa;">MAX LEVEL</div>`;
                    btnHtml = `<button class="btn btn-buy" disabled>Maxed</button>`;
                }
            } else if (item.type === 'skin' || item.type === 'bg') {
                const category = item.type === 'skin' ? saveData.skins : saveData.backgrounds;
                const equipped = item.type === 'skin' ? saveData.equippedSkin : saveData.equippedBg;
                
                if (category[item.id]) {
                    if (equipped === item.id) {
                        btnHtml = `<button class="btn btn-buy" disabled>Equipped</button>`;
                    } else {
                        btnHtml = `<button class="btn btn-buy btn-blue" onclick="equipItem('${item.id}', '${item.type}')">Equip</button>`;
                    }
                } else {
                    content += `<div class="cost">💎 ${item.cost} SB</div>`;
                    btnHtml = `<button class="btn btn-buy" onclick="buyItem('${item.id}', ${item.cost}, '${item.type}')">Buy</button>`;
                }
            }

            div.innerHTML = content + btnHtml;
            container.appendChild(div);
        });
    }

    /** ==========================================
     * GAME ENGINE (CANVAS)
     * ========================================== */
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d', { alpha: false }); // Optimize for no transparency on base
    
    // Logical Resolution (Scale to fit)
    const LOGICAL_WIDTH = 1920;
    const LOGICAL_HEIGHT = 1080;
    let scaleRatio = 1;
    let offsetX = 0;
    let offsetY = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const scaleX = canvas.width / LOGICAL_WIDTH;
        const scaleY = canvas.height / LOGICAL_HEIGHT;
        
        scaleRatio = Math.max(scaleX, scaleY); // Fill screen
        
        offsetX = (canvas.width - (LOGICAL_WIDTH * scaleRatio)) / 2;
        offsetY = (canvas.height - (LOGICAL_HEIGHT * scaleRatio)) / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // Game State variables
    let isPlaying = false;
    let lastTime = 0;
    let lastMenuTime = 0;
    let screenShake = 0;
    
    let score = 0;
    let logsChoppedSession = 0;
    let lives = 3;
    let gameSpeedMulti = 1;
    let spawnTimer = 0;
    let currentWaveLogs = 0;

    let logs = [];
    let particles = [];
    let floatingTexts = [];
    let bgLayers = [];

    // Chopping Block Position
    const blockX = LOGICAL_WIDTH * 0.35;
    const blockY = LOGICAL_HEIGHT * 0.65; // moved up so stump is fully visible

    // Axe State (Pivot from hands to the left of block)
    const axe = {
        x: blockX - 250,
        y: blockY - 150,
        angle: -0.5, // Idle (-28 degrees)
        targetAngle: -0.5,
        state: 'idle', // idle, winding, striking, returning
        swingTimer: 0
    };
    
    /** ==========================================
     * CLASSES & ENTITIES
     * ========================================== */
    class Log {
        constructor() {
            this.radius = 60 + Math.random() * 20;
            this.width = 300 + Math.random() * 100;
            this.x = LOGICAL_WIDTH + this.width;
            this.y = blockY - this.radius * 0.8;
            this.speed = (600 + Math.random() * 300) * gameSpeedMulti;
            this.isTough = Math.random() > 0.85 && score > 5;
            this.hp = this.isTough ? 2 : 1;
            this.maxHp = this.hp;
            this.chopped = false;
            this.leftHalf = null;
            this.rightHalf = null;
            this.hitFlash = 0;
            // Pre-compute bark line jitter so they don't flicker each frame
            this.barkLines = Array.from({length: 5}, () => (Math.random() * 10 - 5));
        }

        update(dt) {
            if (this.chopped) {
                // Animate halves flying away
                this.leftHalf.x -= 400 * dt;
                this.leftHalf.y -= this.leftHalf.vy * dt;
                this.leftHalf.vy -= 1500 * dt; // Gravity
                this.leftHalf.angle -= 5 * dt;

                this.rightHalf.x += 400 * dt;
                this.rightHalf.y -= this.rightHalf.vy * dt;
                this.rightHalf.vy -= 1500 * dt;
                this.rightHalf.angle += 5 * dt;
                return;
            }

            this.x -= this.speed * dt;
            if (this.hitFlash > 0) this.hitFlash -= dt * 5;
        }

        draw(ctx) {
            if (this.chopped) {
                this.drawHalf(ctx, this.leftHalf, true);
                this.drawHalf(ctx, this.rightHalf, false);
                return;
            }

            ctx.save();
            ctx.translate(this.x, this.y);
            
            // Hit Flash effect
            if (this.hitFlash > 0) {
                ctx.globalAlpha = 0.5 + (this.hitFlash * 0.5);
                ctx.shadowBlur = 20;
                ctx.shadowColor = "#FFF";
            }

            this.drawCylinder(ctx, 0, 0, this.width, this.radius, this.isTough);
            
            ctx.restore();
        }

        drawCylinder(ctx, cx, cy, w, r, isTough) {
            // Draw Main Bark (Body)
            const barkGrad = ctx.createLinearGradient(cx - w/2, cy - r, cx - w/2, cy + r);
            if (isTough) {
                barkGrad.addColorStop(0, "#4a4e69");
                barkGrad.addColorStop(0.5, "#22223b");
                barkGrad.addColorStop(1, "#1a1a2e");
            } else {
                barkGrad.addColorStop(0, "#7f4f24");
                barkGrad.addColorStop(0.5, "#582f0e");
                barkGrad.addColorStop(1, "#331800");
            }

            ctx.fillStyle = barkGrad;
            ctx.beginPath();
            ctx.rect(cx - w/2, cy - r, w, r*2);
            ctx.fill();

            // Texture lines for bark
            ctx.strokeStyle = isTough ? "#1a1a2e" : "#331800";
            ctx.lineWidth = 2;
            for(let i=0; i<5; i++) {
                ctx.beginPath();
                let ly = cy - r + (r*2) * (i/5) + 5;
                ctx.moveTo(cx - w/2, ly);
                ctx.lineTo(cx + w/2, ly + this.barkLines[i]);
                ctx.stroke();
            }

            // Iron bands for tough log
            if (isTough) {
                ctx.fillStyle = "#8d99ae";
                ctx.fillRect(cx - w/4 - 10, cy - r, 20, r*2);
                ctx.fillRect(cx + w/4 - 10, cy - r, 20, r*2);
                // Rivets
                ctx.fillStyle = "#2b2d42";
                ctx.beginPath(); ctx.arc(cx - w/4, cy - r/2, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx - w/4, cy + r/2, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + w/4, cy - r/2, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(cx + w/4, cy + r/2, 4, 0, Math.PI*2); ctx.fill();
            }

            // Left End (Rings)
            ctx.fillStyle = "#dda15e";
            ctx.beginPath();
            ctx.ellipse(cx - w/2, cy, r * 0.4, r, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#bc6c25";
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Rings detail
            ctx.lineWidth = 1;
            for(let i=1; i<=3; i++) {
                ctx.beginPath();
                ctx.ellipse(cx - w/2, cy, r * 0.1 * i, r * 0.25 * i, 0, 0, Math.PI*2);
                ctx.stroke();
            }

            // Right End Curve
            ctx.fillStyle = barkGrad;
            ctx.beginPath();
            ctx.ellipse(cx + w/2, cy, r * 0.4, r, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        drawHalf(ctx, half, isLeft) {
            ctx.save();
            ctx.translate(half.x, half.y);
            ctx.rotate(half.angle);
            
            // Clip to draw only half
            ctx.beginPath();
            if (isLeft) {
                ctx.rect(-this.width, -this.radius*2, this.width, this.radius*4);
            } else {
                ctx.rect(0, -this.radius*2, this.width, this.radius*4);
            }
            ctx.clip();
            
            this.drawCylinder(ctx, 0, 0, this.width, this.radius, this.isTough);
            
            // Draw splintered inner wood at the cut
            ctx.fillStyle = "#fefae0";
            ctx.beginPath();
            // Jagged edge
            ctx.moveTo(0, -this.radius);
            ctx.lineTo((isLeft? 10 : -10), -this.radius/2);
            ctx.lineTo((isLeft? -5 : 5), 0);
            ctx.lineTo((isLeft? 15 : -15), this.radius/2);
            ctx.lineTo(0, this.radius);
            if (isLeft) {
                ctx.lineTo(-20, this.radius); ctx.lineTo(-20, -this.radius);
            } else {
                ctx.lineTo(20, this.radius); ctx.lineTo(20, -this.radius);
            }
            ctx.fill();

            ctx.restore();
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 800;
            this.vy = -400 - Math.random() * 600;
            this.life = 1.0;
            this.color = color;
            this.size = 5 + Math.random() * 10;
            this.angle = Math.random() * Math.PI * 2;
            this.va = (Math.random() - 0.5) * 10;
        }
        update(dt) {
            this.x += this.vx * dt;
            this.y += this.vy * dt;
            this.vy += 2000 * dt; // gravity
            this.life -= dt * 1.5;
            this.angle += this.va * dt;
        }
        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            ctx.globalAlpha = Math.max(0, this.life);
            ctx.fillStyle = this.color;
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
            ctx.restore();
        }
    }

    class FloatingText {
        constructor(x, y, text, color, size = 40) {
            this.x = x;
            this.y = y;
            this.text = text;
            this.color = color;
            this.life = 1.0;
            this.vy = -100;
            this.size = size;
        }
        update(dt) {
            this.y += this.vy * dt;
            this.life -= dt;
        }
        draw(ctx) {
            ctx.save();
            ctx.globalAlpha = Math.max(0, this.life);
            ctx.font = `900 ${this.size}px 'Lilita One', cursive`;
            ctx.fillStyle = this.color;
            ctx.strokeStyle = "black";
            ctx.lineWidth = 4;
            ctx.textAlign = "center";
            ctx.strokeText(this.text, this.x, this.y);
            ctx.fillText(this.text, this.x, this.y);
            ctx.restore();
        }
    }

    /** ==========================================
     * CORE LOGIC & INPUT
     * ========================================== */
    function startGame() {
        score = 0;
        lives = 3;
        logsChoppedSession = 0;
        gameSpeedMulti = 1;
        currentWaveLogs = 0;
        logs = [];
        particles = [];
        floatingTexts = [];
        
        // Setup Background
        setupBackgrounds();

        updateHUD();
        document.getElementById("score-display").innerText = score;
        
        showScreen('');
        document.getElementById("hud").classList.add("active");
        
        isPlaying = true;
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    }

    function gameOver() {
        isPlaying = false;
        document.getElementById("hud").classList.remove("active");
        
        if (score > saveData.highScore) {
            saveData.highScore = score;
        }
        saveProgress();
        
        document.getElementById("go-score").innerText = "Score: " + score;
        document.getElementById("go-high").innerText = "High Score: " + saveData.highScore;
        showScreen('gameover-screen');
    }

    function triggerChop() {
        if (!isPlaying || axe.state !== 'idle') return;
        
        axe.state = 'winding';
        axe.targetAngle = -1.2; // Pull back
        
        // Fast swing forward after tiny delay
        setTimeout(() => {
            if(!isPlaying) return;
            axe.state = 'striking';
            axe.targetAngle = 0.6; // Hit block
            
            // Check hit at the moment of strike impact (approx)
            setTimeout(checkHit, 50);

        }, 50);
    }

    function checkHit() {
        if (!isPlaying) return;
        
        screenShake = 10; // Base shake
        
        // Find front log
        if (logs.length === 0) {
            spawnParticles(blockX, blockY, "#582f0e", 5); // hit empty stump
            return;
        }
        
        const log = logs[0];
        
        // Base window + Upgrades
        const upgradeLevel = saveData.upgrades.hitWindow || 0;
        const hitTolerance = 80 + (upgradeLevel * 20); // 80, 100, 120, 140
        const perfectTolerance = 30 + (upgradeLevel * 5);
        
        const dist = Math.abs(log.x - blockX);
        
        if (dist < hitTolerance) {
            // Hit!
            let damage = 1;
            const powerLevel = saveData.upgrades.chopPower || 0;
            if (log.isTough && powerLevel > 0) damage += powerLevel * 0.5; // Power chop helps with tough logs

            log.hp -= damage;
            log.hitFlash = 1.0;
            
            if (log.hp <= 0) {
                // Destroy log
                log.chopped = true;
                log.leftHalf = { x: log.x, y: log.y, vy: 400, angle: 0 };
                // Adjust right half x so it originates roughly from cut
                log.rightHalf = { x: log.x, y: log.y, vy: 400, angle: 0 };
                
                screenShake = log.isTough ? 25 : 15;
                spawnParticles(blockX, log.y, log.isTough ? "#8d99ae" : "#dda15e", 15);
                
                // Score
                let isPerfect = dist < perfectTolerance;
                let pts = isPerfect ? 2 : 1;
                if (log.isTough) pts *= 2;
                score += pts;
                
                floatingTexts.push(new FloatingText(blockX, log.y - 100, isPerfect ? "PERFECT!" : "GOOD", isPerfect ? "#ffeb3b" : "#fff", isPerfect ? 50 : 35));
                if (log.isTough) {
                    floatingTexts.push(new FloatingText(blockX, log.y - 50, "HEAVY!", "#ff5722", 30));
                }
                
                updateHUD();
                handleEconomyRewards();
                
                // Remove logically, keep for animation briefly then clean up in loop
                setTimeout(() => {
                    const idx = logs.indexOf(log);
                    if(idx > -1) logs.splice(idx, 1);
                }, 1000);

            } else {
                // Hit but didn't destroy (Tough log)
                screenShake = 20;
                spawnParticles(blockX, log.y, "#ffeb3b", 10); // sparks
                floatingTexts.push(new FloatingText(blockX, log.y - 100, "CLANG!", "#ccc", 40));
                
                // Push back slightly
                log.x += 40; 
            }
            
        } else {
            // Missed timing
            spawnParticles(blockX, blockY, "#582f0e", 5);
        }
    }

    function handleEconomyRewards() {
        logsChoppedSession++;
        currentWaveLogs++;

        // Base reward: 1 SB every 10 logs (Fast initial reward)
        if (logsChoppedSession % 10 === 0) {
            addSimgaBucks(1);
        }

        // Wave reward: +3 SB every 25 logs
        if (currentWaveLogs >= 25) {
            currentWaveLogs = 0;
            addSimgaBucks(3);
            floatingTexts.push(new FloatingText(LOGICAL_WIDTH/2, 200, "WAVE CLEARED +3 SB!", "#4CAF50", 60));
            gameSpeedMulti += 0.15; // Increase difficulty
        }
    }

    function loseLife() {
        lives--;
        screenShake = 30;
        updateHUD();
        floatingTexts.push(new FloatingText(LOGICAL_WIDTH/2, LOGICAL_HEIGHT/2, "MISS!", "#f44336", 80));
        if (lives <= 0) {
            gameOver();
        }
    }

    // Input Events
    window.addEventListener('mousedown', triggerChop);
    window.addEventListener('touchstart', (e) => {
        if(e.target.tagName !== 'BUTTON') triggerChop();
    });
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') triggerChop();
    });


    /** ==========================================
     * DRAWING & ANIMATION
     * ========================================== */
    function setupBackgrounds() {
        bgLayers = [];
        const isMystic = saveData.equippedBg === 'mystic';

        // Layer 0: Sky/Gradient
        bgLayers.push({ type: 'sky', isMystic });

        // Layer 1: Distant Mountains/Trees
        let distant = [];
        for(let i=0; i<15; i++) {
            distant.push({ x: Math.random() * LOGICAL_WIDTH, w: 200 + Math.random()*200, h: 300 + Math.random()*300 });
        }
        bgLayers.push({ type: 'trees', speed: 20, items: distant, color: isMystic ? '#2b2d42' : '#2b4141' });

        // Layer 2: Mid Trees
        let mid = [];
        for(let i=0; i<10; i++) {
            mid.push({ x: Math.random() * LOGICAL_WIDTH, w: 150 + Math.random()*150, h: 400 + Math.random()*400 });
        }
        bgLayers.push({ type: 'trees', speed: 50, items: mid, color: isMystic ? '#14142b' : '#1e3838' });
        
        // Layer 3: Mist (Sine waves)
        bgLayers.push({ type: 'mist', speed: 100, isMystic });
    }

    function spawnParticles(x, y, color, count) {
        for(let i=0; i<count; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    // Pre-compute stump bark line jitter so they don't flicker
    const stumpBarkOffsets = Array.from({length: 20}, () => (Math.random() * 10 - 5));

    function drawStump(ctx) {
        const sx = blockX;
        const sy = blockY;
        const w = 240;
        const h = 280; // taller so base reaches ground at blockY+140

        ctx.save();
        // Body
        const grad = ctx.createLinearGradient(sx - w/2, sy, sx + w/2, sy);
        grad.addColorStop(0, "#3e2723");
        grad.addColorStop(0.5, "#4e342e");
        grad.addColorStop(1, "#212121");
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(sx, sy + h/2, w/2, 40, 0, 0, Math.PI*2); // bottom
        ctx.fill();

        ctx.fillRect(sx - w/2, sy, w, h/2);
        
        // Bark lines
        ctx.strokeStyle = "#1b110e";
        ctx.lineWidth = 3;
        let barkIdx = 0;
        for(let i=-w/2 + 20; i<w/2; i+=30) {
            ctx.beginPath();
            ctx.moveTo(sx + i, sy);
            ctx.lineTo(sx + i + stumpBarkOffsets[barkIdx++ % stumpBarkOffsets.length], sy + h/2 + 10);
            ctx.stroke();
        }

        // Top surface
        ctx.fillStyle = "#a1887f";
        ctx.beginPath();
        ctx.ellipse(sx, sy, w/2, 50, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = "#5d4037";
        ctx.lineWidth = 4;
        ctx.stroke();

        // Rings
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.ellipse(sx, sy, w*0.3, 30, 0, 0, Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(sx, sy, w*0.15, 15, 0, 0, Math.PI*2); ctx.stroke();
        
        // Chop mark
        ctx.fillStyle = "#3e2723";
        ctx.beginPath();
        ctx.moveTo(sx - 20, sy - 10);
        ctx.lineTo(sx, sy + 15);
        ctx.lineTo(sx + 15, sy - 5);
        ctx.fill();

        ctx.restore();
    }

    function drawAxe(ctx) {
        const skin = saveData.equippedSkin || 'iron';
        
        ctx.save();
        ctx.translate(axe.x, axe.y);
        ctx.rotate(axe.angle);

        // === HANDLE ===
        const handleLen = 300;
        const handleGrad = ctx.createLinearGradient(0, -12, 0, 12);
        handleGrad.addColorStop(0, "#8d6035");
        handleGrad.addColorStop(0.5, "#6b4423");
        handleGrad.addColorStop(1, "#3e2006");
        ctx.fillStyle = handleGrad;
        ctx.beginPath();
        ctx.roundRect(0, -12, handleLen, 24, 4);
        ctx.fill();

        // Grip wraps
        ctx.fillStyle = "#2c1a0e";
        for (let i = 0; i < 5; i++) {
            ctx.fillRect(i * 14 + 4, -13, 9, 26);
        }
        // Grip highlight
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        for (let i = 0; i < 5; i++) {
            ctx.fillRect(i * 14 + 4, -13, 3, 26);
        }

        // === AXE HEAD ===
        ctx.translate(handleLen - 5, 0);

        // Metal gradient for the head
        let headGrad;
        if (skin === 'neon') {
            ctx.shadowBlur = 25;
            ctx.shadowColor = "#00e5ff";
            headGrad = ctx.createLinearGradient(-10, -70, 80, 80);
            headGrad.addColorStop(0, "#1a1a2e");
            headGrad.addColorStop(0.5, "#0d0d20");
            headGrad.addColorStop(1, "#050510");
        } else if (skin === 'golden') {
            headGrad = ctx.createLinearGradient(-10, -70, 80, 80);
            headGrad.addColorStop(0, "#fff59d");
            headGrad.addColorStop(0.5, "#fbc02d");
            headGrad.addColorStop(1, "#e65100");
        } else {
            headGrad = ctx.createLinearGradient(-10, -70, 80, 80);
            headGrad.addColorStop(0, "#e8e8e8");
            headGrad.addColorStop(0.45, "#9e9e9e");
            headGrad.addColorStop(1, "#424242");
        }

        ctx.fillStyle = headGrad;

        // --- Poll spike (small, top-back) ---
        ctx.beginPath();
        ctx.moveTo(-12, -12);
        ctx.lineTo(-8, -58);
        ctx.lineTo(18, -14);
        ctx.closePath();
        ctx.fill();

        // --- Main blade body ---
        // Flat back (left), curved blade edge (right), sweeps from top to bottom
        ctx.beginPath();
        ctx.moveTo(-12, -12);   // upper back / joins poll
        ctx.lineTo(18, -14);    // upper shoulder
        ctx.lineTo(28, -22);    // blade heel (flares out at top)
        ctx.quadraticCurveTo(78, -5, 82, 15);    // upper blade edge curve
        ctx.quadraticCurveTo(78, 45, 50, 72);    // blade belly
        ctx.lineTo(20, 80);                       // lower tip of blade
        ctx.lineTo(-18, 60);                      // lower back corner
        ctx.lineTo(-12, 12);    // lower back / handle junction
        ctx.closePath();
        ctx.fill();

        // --- Blade edge highlight (bright cutting edge) ---
        ctx.shadowBlur = skin === 'neon' ? 18 : 0;
        if (skin === 'neon') {
            ctx.strokeStyle = "#00e5ff";
            ctx.lineWidth = 5;
        } else {
            ctx.strokeStyle = skin === 'golden' ? "rgba(255,255,220,0.75)" : "rgba(255,255,255,0.6)";
            ctx.lineWidth = 4;
        }
        ctx.beginPath();
        ctx.moveTo(28, -22);
        ctx.quadraticCurveTo(78, -5, 82, 15);
        ctx.quadraticCurveTo(78, 45, 50, 72);
        ctx.lineTo(20, 80);
        ctx.stroke();

        // Inner face shimmer
        if (skin !== 'neon') {
            ctx.strokeStyle = "rgba(255,255,255,0.18)";
            ctx.lineWidth = 7;
            ctx.beginPath();
            ctx.moveTo(20, -8);
            ctx.quadraticCurveTo(55, 20, 42, 58);
            ctx.stroke();
        }

        ctx.restore();
    }

    function drawBackground(ctx, dt) {
        bgLayers.forEach(layer => {
            if (layer.type === 'sky') {
                const grad = ctx.createLinearGradient(0, 0, 0, LOGICAL_HEIGHT);
                if (layer.isMystic) {
                    grad.addColorStop(0, "#0b001a");
                    grad.addColorStop(1, "#2e004d");
                } else {
                    grad.addColorStop(0, "#4a6984");
                    grad.addColorStop(1, "#86a8a1");
                }
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);
            } 
            else if (layer.type === 'trees') {
                ctx.fillStyle = layer.color;
                layer.items.forEach(t => {
                    t.x -= layer.speed * gameSpeedMulti * dt;
                    if (t.x < -t.w) t.x = LOGICAL_WIDTH + t.w;
                    
                    ctx.beginPath();
                    ctx.moveTo(t.x, LOGICAL_HEIGHT);
                    ctx.lineTo(t.x + t.w/2, LOGICAL_HEIGHT - t.h);
                    ctx.lineTo(t.x + t.w, LOGICAL_HEIGHT);
                    ctx.fill();
                });
            }
            else if (layer.type === 'mist') {
                const time = performance.now() / 1000;
                ctx.fillStyle = layer.isMystic ? "rgba(180, 0, 255, 0.1)" : "rgba(255, 255, 255, 0.1)";
                ctx.beginPath();
                ctx.moveTo(0, LOGICAL_HEIGHT);
                for(let x=0; x<=LOGICAL_WIDTH; x+=100) {
                    let y = LOGICAL_HEIGHT - 200 + Math.sin(x*0.005 + time) * 50;
                    ctx.lineTo(x, y);
                }
                ctx.lineTo(LOGICAL_WIDTH, LOGICAL_HEIGHT);
                ctx.fill();
            }
        });
    }

    function menuLoop(timestamp) {
        if (isPlaying) return;
        const dt = Math.min((timestamp - lastMenuTime) / 1000, 0.1);
        lastMenuTime = timestamp;

        ctx.fillStyle = "#1a0f00";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scaleRatio, scaleRatio);
        drawBackground(ctx, dt);
        const groundTop = blockY + 140;
        const groundGrad = ctx.createLinearGradient(0, groundTop, 0, groundTop + 200);
        groundGrad.addColorStop(0,    "#2d5a1b");
        groundGrad.addColorStop(0.12, "#4a2a08");
        groundGrad.addColorStop(0.55, "#2e1a04");
        groundGrad.addColorStop(1,    "#1a0f00");
        ctx.fillStyle = groundGrad;
        ctx.fillRect(0, groundTop, LOGICAL_WIDTH, LOGICAL_HEIGHT * 2);
        ctx.fillStyle = "#3a7a1e";
        ctx.fillRect(0, groundTop, LOGICAL_WIDTH, 14);
        drawStump(ctx);
        drawAxe(ctx);
        ctx.restore();

        requestAnimationFrame(menuLoop);
    }

    function gameLoop(timestamp) {
        if (!isPlaying) return;
        
        const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
        lastTime = timestamp;

        // --- UPDATE ---
        
        // Spawn Logs
        spawnTimer -= dt;
        if (spawnTimer <= 0) {
            logs.push(new Log());
            spawnTimer = (1.5 + Math.random() * 1.0) / gameSpeedMulti;
        }

        // Update Logs
        for (let i = logs.length - 1; i >= 0; i--) {
            const log = logs[i];
            log.update(dt);
            
            // Check missed logs
            if (!log.chopped && log.x + log.width/2 < blockX - 100) {
                logs.splice(i, 1);
                loseLife();
            }
            // Cleanup chopped parts offscreen
            else if (log.chopped && log.leftHalf.y > LOGICAL_HEIGHT + 200) {
                logs.splice(i, 1);
            }
        }

        // Update Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update(dt);
            if (particles[i].life <= 0) particles.splice(i, 1);
        }

        // Update Text
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            floatingTexts[i].update(dt);
            if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
        }

        // Axe Animation State Machine
        if (axe.state === 'winding') {
            axe.angle -= 10 * dt; // fast wind up
            if (axe.angle <= axe.targetAngle) {
                axe.angle = axe.targetAngle;
            }
        } else if (axe.state === 'striking') {
            axe.angle += 30 * dt; // Extremely fast strike down
            if (axe.angle >= axe.targetAngle) {
                axe.angle = axe.targetAngle;
                axe.state = 'returning';
                axe.targetAngle = -0.5; // Back to idle
            }
        } else if (axe.state === 'returning') {
            axe.angle -= 6 * dt; // Slow return
            if (axe.angle <= axe.targetAngle) {
                axe.angle = axe.targetAngle;
                axe.state = 'idle';
            }
        }

        // --- DRAW ---
        ctx.fillStyle = "#1a0f00";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        // Setup coordinate system
        ctx.translate(offsetX, offsetY);
        ctx.scale(scaleRatio, scaleRatio);
        
        // Screen Shake
        if (screenShake > 0) {
            const sx = (Math.random() - 0.5) * screenShake;
            const sy = (Math.random() - 0.5) * screenShake;
            ctx.translate(sx, sy);
            screenShake -= dt * 60;
            if(screenShake < 0) screenShake = 0;
        }

        // Render Layers
        drawBackground(ctx, dt);

        // Ground first so stump draws on top of it
        const groundTop = blockY + 140;
        const groundGrad = ctx.createLinearGradient(0, groundTop, 0, groundTop + 200);
        groundGrad.addColorStop(0,    "#2d5a1b");
        groundGrad.addColorStop(0.12, "#4a2a08");
        groundGrad.addColorStop(0.55, "#2e1a04");
        groundGrad.addColorStop(1,    "#1a0f00");
        ctx.fillStyle = groundGrad;
        ctx.fillRect(0, groundTop, LOGICAL_WIDTH, LOGICAL_HEIGHT * 2);
        ctx.fillStyle = "#3a7a1e";
        ctx.fillRect(0, groundTop, LOGICAL_WIDTH, 14);

        // Stump above ground
        drawStump(ctx);

        // Logs above stump
        logs.forEach(log => { if(!log.chopped) log.draw(ctx); });
        logs.forEach(log => { if(log.chopped) log.draw(ctx); });

        drawAxe(ctx);
        
        particles.forEach(p => p.draw(ctx));
        floatingTexts.forEach(t => t.draw(ctx));

        ctx.restore();

        requestAnimationFrame(gameLoop);
    }

    /** ==========================================
     * UI MANAGEMENT
     * ========================================== */
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => {
            s.classList.remove('active');
        });
        if (screenId) {
            document.getElementById(screenId).classList.add('active');
        }
        if (screenId === 'shop-screen') {
            renderShop();
        }
    }

    function updateHUD() {
        document.getElementById("score-display").innerText = score;
        const hearts = document.querySelectorAll(".life");
        hearts.forEach((heart, index) => {
            if (index < lives) {
                heart.classList.remove("lost");
            } else {
                heart.classList.add("lost");
            }
        });
    }

    // Init
    setupBackgrounds(); // Draw background immediately for title screen
    lastMenuTime = performance.now();
    requestAnimationFrame(menuLoop);
    loadProgress(); // Request load from platform on startup

</script>
</body>
