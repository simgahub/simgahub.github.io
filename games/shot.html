<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Shot - Arcade Golf</title>
    <style>
        :root {
            --bg-color: #050510;
            --primary: #00ffcc;
            --secondary: #ff00aa;
            --text-main: #ffffff;
            --panel-bg: rgba(10, 10, 25, 0.85);
            --border: rgba(0, 255, 204, 0.3);
            --ui-font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: var(--ui-font);
            color: var(--text-main);
        }

        /* Canvas & Background */
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #101025 0%, #020205 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* CRT/Scanline Overlay */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* UI Overlays */
        .ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .screen {
            display: none;
            pointer-events: auto;
            background: var(--panel-bg);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.1), inset 0 0 20px rgba(0, 255, 204, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            max-width: 90%;
            width: 400px;
            transform: scale(0.95);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            transform: scale(1);
            opacity: 1;
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary);
        }

        h2 {
            font-size: 1.5rem;
            margin: 0 0 20px 0;
            color: var(--secondary);
            text-shadow: 0 0 8px var(--secondary);
        }

        p { margin: 10px 0; color: #ccc; line-height: 1.5; }

        /* Buttons */
        .btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: inherit;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
            margin: 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        .btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
        }

        .btn:active { transform: scale(0.95); }

        .btn-secondary {
            border-color: var(--secondary);
            color: var(--secondary);
            box-shadow: 0 0 10px rgba(255, 0, 170, 0.2);
        }
        .btn-secondary:hover {
            background: var(--secondary);
            color: #fff;
            box-shadow: 0 0 20px var(--secondary);
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 20px; left: 20px; right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .hud-stat {
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 5px currentColor;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hud-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 4px;
            text-shadow: none;
        }

        #hud-level { color: var(--primary); }
        #hud-strokes { color: #fff; }

        /* HUD Buttons */
        .hud-buttons {
            pointer-events: auto;
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 44px; height: 44px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex; justify-content: center; align-items: center;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.1); }

        /* Shop Grid */
        .shop-container {
            max-height: 60vh;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }
        
        .shop-container::-webkit-scrollbar { width: 6px; }
        .shop-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 4px; }
        .shop-container::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

        .shop-item {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
            transition: all 0.2s;
        }
        .shop-item:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); }

        .item-info h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: #fff; }
        .item-info p { margin: 0; font-size: 0.8rem; color: #aaa; }
        
        .item-action {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .buy-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: transform 0.1s;
        }
        .buy-btn:active { transform: scale(0.9); }
        .buy-btn.equipped { background: #444; color: #888; cursor: default; }
        .buy-btn.equip { background: transparent; border: 1px solid #fff; color: #fff; }

        .price {
            font-size: 0.8rem;
            color: #ffd700;
            font-weight: bold;
            display: flex; align-items: center; gap: 4px;
        }

        /* Toast Notifications */
        #toast-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(10, 10, 20, 0.9);
            border-left: 4px solid var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease forwards, fadeOut 0.3s ease 2.5s forwards;
            display: flex; align-items: center; gap: 10px;
        }

        .toast.error { border-color: #ff3366; }
        .toast.reward { border-color: #ffd700; }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-20px); opacity: 0; }
        }

        /* Loader */
        #loader {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: var(--bg-color); z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(0,255,204,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="scanlines"></div>
    </div>

    <!-- Heads Up Display -->
    <div id="hud">
        <div class="hud-stat" id="hud-level">
            <span class="hud-label">Hole</span>
            <span id="level-val">1</span>
        </div>
        <div class="hud-stat" id="hud-strokes">
            <span class="hud-label">Shots</span>
            <span id="strokes-val">0</span>
        </div>
        <div class="hud-buttons">
            <button class="icon-btn" onclick="Game.showShop()">🛒</button>
            <button class="icon-btn" onclick="Game.quitToMenu()">⏸</button>
        </div>
    </div>

    <div class="ui-layer" id="ui-layer">
        
        <!-- Main Menu -->
        <div class="screen" id="screen-menu">
            <h1>Mini Shot</h1>
            <p>Drag to aim. Release to shoot.<br>Sink the ball in the vortex.</p>
            <div style="margin: 20px 0; color: #888; font-size: 0.9rem;">
                Best Streak: <span id="menu-highscore" style="color:var(--primary); font-weight:bold;">0</span> Holes
            </div>
            <button class="btn" onclick="Game.startRun()">Play Now</button>
            <button class="btn btn-secondary" onclick="Game.showShop()">Shop</button>
        </div>

        <!-- Shop Screen -->
        <div class="screen" id="screen-shop" style="width: 500px;">
            <h2>Upgrades & Skins</h2>
            <div class="shop-container" id="shop-items">
                <!-- Injected via JS -->
            </div>
            <button class="btn" onclick="Game.closeShop()">Back</button>
        </div>

        <!-- Level Complete Screen -->
        <div class="screen" id="screen-level-complete">
            <h1 id="lc-title">HOLE CLEARED!</h1>
            <p id="lc-stats" style="font-size: 1.2rem; margin-bottom: 30px;">Shots: 2</p>
            <button class="btn" onclick="Game.nextLevel()">Next Hole</button>
        </div>

        <!-- Game Over / Restart -->
        <div class="screen" id="screen-game-over">
            <h1 style="color: var(--secondary)">Out of Bounds</h1>
            <p>Your streak ended at Hole <span id="go-hole"></span></p>
            <button class="btn" onclick="Game.startRun()">Try Again</button>
            <button class="btn btn-secondary" onclick="Game.showMenu()">Menu</button>
        </div>

    </div>

    <div id="toast-container"></div>

    <div id="loader">
        <div class="spinner"></div>
        <div style="color: var(--primary); letter-spacing: 2px;">SYNCING DATA...</div>
    </div>

<script>
/**
 * MINI SHOT - HTML5 Canvas Physics Game
 * Parent Platform Integration & Game Logic
 */

const GAME_ID = "shot";

// --- PLATFORM API WRAPPER ---
const Platform = {
    callbacks: {},

    init() {
        window.addEventListener("message", (event) => {
            const data = event.data;
            if(!data) return;

            if (data.type === "loadResponse") {
                if (this.callbacks[data.msgId]) {
                    this.callbacks[data.msgId](data.data);
                    delete this.callbacks[data.msgId];
                }
            } else if (data.type === "spendResponse") {
                if (this.callbacks[data.msgId]) {
                    this.callbacks[data.msgId](data.success);
                    delete this.callbacks[data.msgId];
                }
            }
        });
    },

    addSimgaBucks(amount) {
        window.parent.postMessage({ type: "addSimgaBucks", amount: amount }, "*");
    },

    spendSimgaBucks(amount, callback) {
        const msgId = "spend_" + Math.random().toString(36).substr(2, 9);
        this.callbacks[msgId] = callback;
        window.parent.postMessage({ type: "spendSimgaBucks", amount: amount, msgId: msgId }, "*");
    },

    saveData(saveObject) {
        window.parent.postMessage({ type: "saveData", gameId: GAME_ID, data: saveObject }, "*");
    },

    loadData(callback) {
        const loadMsgId = "load_" + Date.now();
        this.callbacks[loadMsgId] = callback;
        window.parent.postMessage({ type: "loadData", gameId: GAME_ID, msgId: loadMsgId }, "*");
        
        // Failsafe if platform doesn't respond in local testing
        setTimeout(() => {
            if(this.callbacks[loadMsgId]) {
                console.warn("Load timeout, using default save.");
                this.callbacks[loadMsgId](null);
                delete this.callbacks[loadMsgId];
            }
        }, 1500);
    }
};

// --- GAME DATA & SHOP CONFIG ---
const THEMES = {
    'synthwave': { bg: ['#101025', '#020205'], grid: 'rgba(0, 255, 204, 0.1)', wall: '#ff00aa', wallGlow: '#ff00aa' },
    'cyberpunk': { bg: ['#0a0a0a', '#001100'], grid: 'rgba(255, 255, 0, 0.1)', wall: '#ffff00', wallGlow: '#ff0000' },
    'void':      { bg: ['#000000', '#000000'], grid: 'rgba(255, 255, 255, 0.05)', wall: '#ffffff', wallGlow: '#ffffff' }
};

const SHOP_CATALOG = [
    { id: 'skin_plasma', type: 'skin', name: 'Plasma Ball', desc: 'Cyan glowing core', cost: 10, value: '#00ffcc' },
    { id: 'skin_nova', type: 'skin', name: 'Supernova', desc: 'Hot pink energy', cost: 25, value: '#ff00aa' },
    { id: 'skin_gold', type: 'skin', name: 'Gold Fusion', desc: 'Pure wealth', cost: 50, value: '#ffd700' },
    { id: 'theme_cyber', type: 'theme', name: 'Cyberpunk Theme', desc: 'Yellow/Red aesthetics', cost: 30, value: 'cyberpunk' },
    { id: 'theme_void', type: 'theme', name: 'Void Theme', desc: 'Monochrome deep space', cost: 40, value: 'void' },
    { id: 'upg_power', type: 'upgrade', name: 'Power Core', desc: 'Increases max shot power', cost: 15, maxLevel: 3, value: 'power' },
    { id: 'upg_traj', type: 'upgrade', name: 'Aim Assist', desc: 'Shows shot trajectory', cost: 20, maxLevel: 3, value: 'traj' }
];

let Save = {
    highScore: 0,
    unlockedSkins: ['default'],
    equippedSkin: 'default',
    unlockedThemes: ['synthwave'],
    equippedTheme: 'synthwave',
    upgrades: { power: 0, traj: 0 }
};

// --- UTILS ---
const MathUtils = {
    dist: (x1, y1, x2, y2) => Math.sqrt((x2-x1)**2 + (y2-y1)**2),
    clamp: (val, min, max) => Math.max(min, Math.min(max, val)),
    lerp: (a, b, t) => a + (b - a) * t
};

function showToast(msg, type='info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    let icon = type === 'reward' ? '💎 ' : (type === 'error' ? '⚠️ ' : 'ℹ️ ');
    toast.innerHTML = icon + msg;
    container.appendChild(toast);
    setTimeout(() => { if(toast.parentElement) toast.remove(); }, 3000);
}

// --- ENGINE ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });

const WORLD_W = 800;
const WORLD_H = 1200;
let scale = 1;
let offsetX = 0;
let offsetY = 0;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const scaleX = canvas.width / WORLD_W;
    const scaleY = canvas.height / WORLD_H;
    scale = Math.min(scaleX, scaleY);
    offsetX = (canvas.width - (WORLD_W * scale)) / 2;
    offsetY = (canvas.height - (WORLD_H * scale)) / 2;
}
window.addEventListener('resize', resizeCanvas);

// --- ENTITIES ---
class Particle {
    constructor(x, y, vx, vy, life, color, size) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.life = life; this.maxLife = life;
        this.color = color; this.size = size;
    }
    update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.vx *= 0.95; this.vy *= 0.95;
        this.life -= dt;
    }
    draw(ctx) {
        const alpha = Math.max(0, this.life / this.maxLife);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

class Ball {
    constructor(x, y) {
        this.reset(x, y);
        this.radius = 12;
    }
    reset(x, y) {
        this.x = x; this.y = y;
        this.vx = 0; this.vy = 0;
        this.trail = [];
        this.state = 'idle'; // idle, moving, holed
        this.scale = 1;
    }
    getColor() {
        if(Save.equippedSkin === 'default') return '#ffffff';
        const skin = SHOP_CATALOG.find(s => s.id === Save.equippedSkin);
        return skin ? skin.value : '#ffffff';
    }
    update(dt) {
        if (this.state === 'holed') {
            this.scale = MathUtils.lerp(this.scale, 0, dt * 5);
            this.x = MathUtils.lerp(this.x, Game.hole.x, dt * 10);
            this.y = MathUtils.lerp(this.y, Game.hole.y, dt * 10);
            return;
        }

        // Sub-stepping for collision accuracy
        const steps = 3;
        const sdt = dt / steps;
        
        for(let i=0; i<steps; i++) {
            this.x += this.vx * sdt;
            this.y += this.vy * sdt;
            
            // Friction
            this.vx *= Math.pow(0.985, sdt * 60);
            this.vy *= Math.pow(0.985, sdt * 60);

            // Bounds collision (World boundaries)
            if(this.x - this.radius < 0) { this.x = this.radius; this.vx *= -0.8; Game.emitSparks(this.x, this.y, 1, 0); }
            if(this.x + this.radius > WORLD_W) { this.x = WORLD_W - this.radius; this.vx *= -0.8; Game.emitSparks(this.x, this.y, -1, 0); }
            if(this.y - this.radius < 0) { this.y = this.radius; this.vy *= -0.8; Game.emitSparks(this.x, this.y, 0, 1); }
            if(this.y + this.radius > WORLD_H) { 
                // Fell off bottom -> Game Over
                this.state = 'dead';
            }

            // Wall collisions
            for(let w of Game.walls) {
                this.collideWithRect(w);
            }
        }

        // Stop completely if slow (increased threshold from 0.5 to 15)
        if (this.state === 'moving' && Math.abs(this.vx) < 15 && Math.abs(this.vy) < 15) {
            this.vx = 0; this.vy = 0;
            this.state = 'idle';
        }

        // Trail logic
        if (this.state === 'moving' && (this.trail.length === 0 || MathUtils.dist(this.x, this.y, this.trail[0].x, this.trail[0].y) > 5)) {
            this.trail.unshift({x: this.x, y: this.y});
            if(this.trail.length > 15) this.trail.pop();
        } else if (this.state === 'idle') {
            if(this.trail.length > 0) this.trail.pop();
        }
    }

    collideWithRect(rect) {
        let testX = this.x;
        let testY = this.y;
        let nx = 0, ny = 0;

        if (this.x < rect.x) { testX = rect.x; nx = -1; }
        else if (this.x > rect.x + rect.w) { testX = rect.x + rect.w; nx = 1; }

        if (this.y < rect.y) { testY = rect.y; ny = -1; }
        else if (this.y > rect.y + rect.h) { testY = rect.y + rect.h; ny = 1; }

        let distX = this.x - testX;
        let distY = this.y - testY;
        let distance = Math.sqrt((distX*distX) + (distY*distY));

        if (distance <= this.radius) {
            // Repel
            let overlap = this.radius - distance;
            if(distance === 0) { nx = -Math.sign(this.vx); ny = -Math.sign(this.vy); distance = 1; } // safe fallback
            else { nx = distX/distance; ny = distY/distance; }
            
            this.x += nx * overlap;
            this.y += ny * overlap;

            // Reflect velocity (with bounciness)
            let dot = this.vx * nx + this.vy * ny;
            if (dot < 0) {
                const bounce = 0.8;
                this.vx -= (1 + bounce) * dot * nx;
                this.vy -= (1 + bounce) * dot * ny;
                Game.emitSparks(testX, testY, nx, ny);
            }
        }
    }

    draw(ctx) {
        const color = this.getColor();
        
        // Draw trail
        if(this.trail.length > 1) {
            ctx.beginPath();
            ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for(let i=1; i<this.trail.length; i++) {
                ctx.lineTo(this.trail[i].x, this.trail[i].y);
            }
            ctx.strokeStyle = color;
            ctx.lineWidth = this.radius;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.globalAlpha = 0.3;
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        if(this.scale <= 0.01) return;

        // Draw ball
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(this.scale, this.scale);
        
        ctx.globalCompositeOperation = 'lighter';
        
        // Fake glow
        let grad = ctx.createRadialGradient(0,0,0, 0,0, this.radius * 2.5);
        grad.addColorStop(0, color);
        grad.addColorStop(0.3, color);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, 0, this.radius * 2.5, 0, Math.PI*2);
        ctx.fill();

        // Core
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(0, 0, this.radius * 0.6, 0, Math.PI*2);
        ctx.fill();
        
        ctx.restore();
    }
}

class Hole {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.radius = 24;
        this.rot = 0;
    }
    update(dt) {
        this.rot += dt * 2;
        // Check win condition
        if (Game.ball.state === 'idle' || Game.ball.state === 'moving') {
            const d = MathUtils.dist(this.x, this.y, Game.ball.x, Game.ball.y);
            if (d < this.radius) {
                Game.ball.state = 'holed';
                Game.onHoleEnter();
            }
        }
    }
    draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);
        
        const theme = THEMES[Save.equippedTheme];
        
        ctx.globalCompositeOperation = 'lighter';
        let grad = ctx.createRadialGradient(0,0,0, 0,0, this.radius * 2);
        grad.addColorStop(0, '#000');
        grad.addColorStop(0.5, theme.wallGlow);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, 0, this.radius*2, 0, Math.PI*2);
        ctx.fill();

        // Inner vortex details
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.5;
        for(let i=0; i<4; i++) {
            ctx.beginPath();
            ctx.arc(0, 0, this.radius * 0.8, (i*Math.PI/2), (i*Math.PI/2) + Math.PI/3);
            ctx.stroke();
        }

        ctx.restore();
    }
}

class Star {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.radius = 15;
        this.active = true;
        this.bob = Math.random() * Math.PI * 2;
    }
    update(dt) {
        if(!this.active) return;
        this.bob += dt * 3;
        const d = MathUtils.dist(this.x, this.y, Game.ball.x, Game.ball.y);
        if (d < this.radius + Game.ball.radius) {
            this.active = false;
            Game.collectStar(this.x, this.y);
        }
    }
    draw(ctx) {
        if(!this.active) return;
        ctx.save();
        const drawY = this.y + Math.sin(this.bob) * 5;
        ctx.translate(this.x, drawY);
        
        ctx.globalCompositeOperation = 'lighter';
        let grad = ctx.createRadialGradient(0,0,0, 0,0, this.radius*2);
        grad.addColorStop(0, '#ffd700');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(0,0,this.radius*2,0,Math.PI*2); ctx.fill();

        // Star shape
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        for(let i=0; i<5; i++) {
            ctx.lineTo(Math.cos( (18+i*72)/180*Math.PI ) * this.radius,
                       -Math.sin( (18+i*72)/180*Math.PI ) * this.radius);
            ctx.lineTo(Math.cos( (54+i*72)/180*Math.PI ) * this.radius*0.4,
                       -Math.sin( (54+i*72)/180*Math.PI ) * this.radius*0.4);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
    }
}

// --- GAME CONTROLLER ---
const Game = {
    state: 'menu', // menu, playing, complete, gameover
    level: 1,
    strokes: 0,
    cameraShake: 0,
    
    ball: null,
    hole: null,
    walls: [],
    stars: [],
    particles: [],

    input: { isDragging: false, startX: 0, startY: 0, currentX: 0, currentY: 0 },
    lastTime: 0,

    init() {
        Platform.init();
        Platform.loadData((data) => {
            if(data) {
                Save = { ...Save, ...data };
                // ensure objects are structured if extending
                if(!Save.upgrades) Save.upgrades = { power:0, traj:0 };
            }
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                this.showMenu(); // Shows the main menu after loading
            }, 500);
        });

        // Setup input
        const bindInput = () => {
            canvas.addEventListener('mousedown', this.onInputDown.bind(this));
            canvas.addEventListener('mousemove', this.onInputMove.bind(this));
            window.addEventListener('mouseup', this.onInputUp.bind(this));
            
            canvas.addEventListener('touchstart', e => { e.preventDefault(); this.onInputDown(e.touches[0]); }, {passive: false});
            canvas.addEventListener('touchmove', e => { e.preventDefault(); this.onInputMove(e.touches[0]); }, {passive: false});
            window.addEventListener('touchend', e => this.onInputUp(e));
        };
        bindInput();

        requestAnimationFrame(this.loop.bind(this));
    },

    updateMenuStats() {
        document.getElementById('menu-highscore').innerText = Save.highScore || 0;
    },

    saveProgress() {
        Platform.saveData(Save);
    },

    showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(id) document.getElementById(id).classList.add('active');
        document.getElementById('ui-layer').style.pointerEvents = id ? 'auto' : 'none';
        
        if (id === 'screen-menu' || id === 'screen-shop') {
            document.getElementById('hud').style.opacity = '0';
        } else if (id === null) {
            document.getElementById('hud').style.opacity = '1';
        }
    },

    showMenu() {
        this.state = 'menu';
        this.updateMenuStats();
        this.showScreen('screen-menu');
        this.generateLevel(0); // background scenery
    },

    quitToMenu() {
        this.showMenu();
    },

    startRun() {
        this.level = 1;
        this.strokes = 0;
        this.state = 'playing';
        this.showScreen(null);
        this.generateLevel(this.level);
        this.updateHUD();
    },

    nextLevel() {
        this.level++;
        this.strokes = 0;
        this.state = 'playing';
        this.showScreen(null);
        this.generateLevel(this.level);
        this.updateHUD();
    },

    gameOver() {
        this.state = 'gameover';
        document.getElementById('go-hole').innerText = (this.level - 1);
        this.showScreen('screen-game-over');
    },

    generateLevel(lvl) {
        this.walls = [];
        this.stars = [];
        this.particles = [];
        
        // Spawn locations
        const startX = WORLD_W / 2;
        const startY = WORLD_H * 0.85;
        const holeX = WORLD_W / 2 + (Math.random() * 200 - 100);
        const holeY = WORLD_H * 0.15 + (Math.random() * 100 - 50);

        this.ball = new Ball(startX, startY);
        this.hole = new Hole(holeX, holeY);

        if (lvl === 0) return; // Menu background, no obstacles

        // Add bottom wall gap so player can fall off if they shoot down
        this.walls.push({x: 0, y: WORLD_H - 10, w: WORLD_W/2 - 100, h: 50});
        this.walls.push({x: WORLD_W/2 + 100, y: WORLD_H - 10, w: WORLD_W/2 - 100, h: 50});

        // Obstacles
        const numObstacles = Math.min(2 + Math.floor(lvl / 2), 7);
        for(let i=0; i<numObstacles; i++) {
            let w = 100 + Math.random() * 200;
            let h = 20 + Math.random() * 40;
            let x = 50 + Math.random() * (WORLD_W - w - 100);
            let y = WORLD_H * 0.3 + Math.random() * (WORLD_H * 0.4);
            
            // avoid start and hole
            if(Math.abs(y - startY) < 150) y -= 150;
            if(Math.abs(y - holeY) < 100) y += 100;

            this.walls.push({x, y, w, h});
        }

        // Stars
        let numStars = lvl === 1 ? 1 : (Math.random() > 0.5 ? 1 : 2);
        for(let i=0; i<numStars; i++) {
            let sx, sy;
            if(lvl === 1 && i === 0) {
                // Guaranteed easy first star to fulfill 20s reward criteria
                sx = startX; sy = startY - 200;
            } else {
                let attempts = 0;
                do {
                    sx = 100 + Math.random() * (WORLD_W - 200);
                    sy = WORLD_H * 0.2 + Math.random() * (WORLD_H * 0.5);
                    attempts++;
                } while (this.isInsideWall(sx, sy, 30) && attempts < 50);
            }
            this.stars.push(new Star(sx, sy));
        }
    },

    isInsideWall(x, y, padding = 0) {
        for(let w of this.walls) {
            if (x > w.x - padding && x < w.x + w.w + padding &&
                y > w.y - padding && y < w.y + w.h + padding) {
                return true;
            }
        }
        return false;
    },

    updateHUD() {
        document.getElementById('level-val').innerText = this.level;
        document.getElementById('strokes-val').innerText = this.strokes;
    },

    // --- INPUT ---
    getWorldPos(evt) {
        const rect = canvas.getBoundingClientRect();
        const clientX = evt.clientX !== undefined ? evt.clientX : (evt.touches ? evt.touches[0].clientX : 0);
        const clientY = evt.clientY !== undefined ? evt.clientY : (evt.touches ? evt.touches[0].clientY : 0);
        return {
            x: (clientX - rect.left - offsetX) / scale,
            y: (clientY - rect.top - offsetY) / scale
        };
    },

    onInputDown(evt) {
        if (this.state !== 'playing' || !this.ball || this.ball.state !== 'idle') return;
        const pos = this.getWorldPos(evt);
        
        // Touch target check
        if (MathUtils.dist(pos.x, pos.y, this.ball.x, this.ball.y) < 100) {
            this.input.isDragging = true;
            this.input.startX = this.ball.x; // anchor to ball
            this.input.startY = this.ball.y;
            this.input.currentX = pos.x;
            this.input.currentY = pos.y;
        }
    },

    onInputMove(evt) {
        if (!this.input.isDragging) return;
        const pos = this.getWorldPos(evt);
        this.input.currentX = pos.x;
        this.input.currentY = pos.y;
    },

    onInputUp(evt) {
        if (!this.input.isDragging) return;
        this.input.isDragging = false;

        let dx = this.input.startX - this.input.currentX;
        let dy = this.input.startY - this.input.currentY;
        
        // Max power scaling
        const powerLvl = Save.upgrades.power || 0;
        const maxPull = 300 + (powerLvl * 50);
        const powerMulti = 3.5 + (powerLvl * 0.5);

        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 10) {
            if (dist > maxPull) {
                dx = (dx/dist) * maxPull;
                dy = (dy/dist) * maxPull;
            }
            this.ball.vx = dx * powerMulti;
            this.ball.vy = dy * powerMulti;
            this.ball.state = 'moving';
            this.strokes++;
            this.updateHUD();
        }
    },

    // --- GAME LOGIC ---
    collectStar(x, y) {
        Platform.addSimgaBucks(1);
        showToast("+1 SimgaBuck", "reward");
        this.spawnBurst(x, y, '#ffd700', 15);
    },

    onHoleEnter() {
        this.state = 'complete';
        this.spawnBurst(this.hole.x, this.hole.y, THEMES[Save.equippedTheme].wall, 30);
        this.cameraShake = 15;

        // Rewards logic
        let reward = 2; // base for hole
        let msg = "Hole Cleared!";
        if(this.strokes === 1) {
            reward = 5;
            msg = "HOLE IN ONE!";
        }

        Platform.addSimgaBucks(reward);
        showToast(`+${reward} SimgaBucks!`, "reward");

        // High score logic
        if (this.level > Save.highScore) {
            Save.highScore = this.level;
        }
        this.saveProgress();

        setTimeout(() => {
            document.getElementById('lc-title').innerText = msg;
            document.getElementById('lc-stats').innerText = `Shots: ${this.strokes}`;
            this.showScreen('screen-level-complete');
        }, 1500);
    },

    emitSparks(x, y, nx, ny) {
        this.cameraShake = Math.max(this.cameraShake, 5);
        const color = THEMES[Save.equippedTheme].wallGlow;
        for(let i=0; i<8; i++) {
            let angle = Math.atan2(ny, nx) + (Math.random() - 0.5);
            let speed = 200 + Math.random() * 200;
            this.particles.push(new Particle(
                x, y, Math.cos(angle)*speed, Math.sin(angle)*speed,
                0.3 + Math.random()*0.3, color, 3
            ));
        }
    },

    spawnBurst(x, y, color, count) {
        for(let i=0; i<count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = 100 + Math.random() * 300;
            this.particles.push(new Particle(
                x, y, Math.cos(angle)*speed, Math.sin(angle)*speed,
                0.5 + Math.random()*0.5, color, 4
            ));
        }
    },

    // --- LOOP & DRAW ---
    loop(timestamp) {
        let dt = (timestamp - this.lastTime) / 1000;
        this.lastTime = timestamp;
        if(dt > 0.1) dt = 0.1; // cap

        this.update(dt);
        this.draw();

        requestAnimationFrame(this.loop.bind(this));
    },

    update(dt) {
        if(this.cameraShake > 0) this.cameraShake -= dt * 30;
        if(this.cameraShake < 0) this.cameraShake = 0;

        if(this.state === 'playing' || this.state === 'complete' || this.state === 'menu') {
            if(this.ball) {
                this.ball.update(dt);
                if(this.ball.state === 'dead' && this.state === 'playing') {
                    this.gameOver();
                }
            }
            if(this.hole) this.hole.update(dt);
            this.stars.forEach(s => s.update(dt));
        }

        // update particles
        for(let i=this.particles.length-1; i>=0; i--) {
            this.particles[i].update(dt);
            if(this.particles[i].life <= 0) this.particles.splice(i, 1);
        }
    },

    draw() {
        // Clear & BG
        const theme = THEMES[Save.equippedTheme];
        
        ctx.fillStyle = theme.bg[0];
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        
        // Transform Camera
        let cx = offsetX;
        let cy = offsetY;
        if(this.cameraShake > 0) {
            cx += (Math.random() - 0.5) * this.cameraShake;
            cy += (Math.random() - 0.5) * this.cameraShake;
        }
        ctx.translate(cx, cy);
        ctx.scale(scale, scale);

        // Draw World Background Gradient
        let bgGrad = ctx.createLinearGradient(0, 0, 0, WORLD_H);
        bgGrad.addColorStop(0, theme.bg[0]);
        bgGrad.addColorStop(1, theme.bg[1]);
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, WORLD_W, WORLD_H);

        // Draw Grid
        ctx.strokeStyle = theme.grid;
        ctx.lineWidth = 2;
        ctx.beginPath();
        for(let x=0; x<=WORLD_W; x+=100) { ctx.moveTo(x, 0); ctx.lineTo(x, WORLD_H); }
        for(let y=0; y<=WORLD_H; y+=100) { ctx.moveTo(0, y); ctx.lineTo(WORLD_W, y); }
        ctx.stroke();

        if (this.hole) this.hole.draw(ctx);
        this.stars.forEach(s => s.draw(ctx));

        // Draw Walls
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.strokeStyle = theme.wall;
        ctx.lineWidth = 3;
        for(let w of this.walls) {
            ctx.beginPath();
            ctx.rect(w.x, w.y, w.w, w.h);
            ctx.fill();
            ctx.stroke();

            // Inner glow line
            ctx.save();
            ctx.strokeStyle = theme.wallGlow;
            ctx.globalAlpha = 0.5;
            ctx.lineWidth = 8;
            ctx.globalCompositeOperation = 'lighter';
            ctx.stroke();
            ctx.restore();
        }

        if (this.ball && this.ball.state !== 'dead') {
            this.ball.draw(ctx);
        }

        this.particles.forEach(p => p.draw(ctx));

        // Draw Drag Trajectory UI
        if (this.input.isDragging && this.ball.state === 'idle') {
            this.drawTrajectory();
        }

        ctx.restore();
    },

    drawTrajectory() {
        let dx = this.input.startX - this.input.currentX;
        let dy = this.input.startY - this.input.currentY;
        
        const powerLvl = Save.upgrades.power || 0;
        const maxPull = 300 + (powerLvl * 50);
        let dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist > maxPull) {
            dx = (dx/dist) * maxPull;
            dy = (dy/dist) * maxPull;
        }

        // Trajectory Level
        const trajLvl = Save.upgrades.traj || 0;

        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 6;
        ctx.setLineDash([15, 10]);

        if (trajLvl === 0) {
            // Simple arrow opposite to drag
            ctx.beginPath();
            ctx.moveTo(this.ball.x, this.ball.y);
            ctx.lineTo(this.ball.x + dx * 2, this.ball.y + dy * 2);
            ctx.stroke();
        } else {
            // Physics prediction
            const powerMulti = 3.5 + (powerLvl * 0.5);
            let simX = this.ball.x;
            let simY = this.ball.y;
            let simVx = dx * powerMulti;
            let simVy = dy * powerMulti;
            
            const steps = trajLvl === 1 ? 40 : (trajLvl === 2 ? 80 : 150);
            const simDt = 0.033; // 30fps simulation steps
            
            ctx.beginPath();
            ctx.moveTo(simX, simY);

            for(let i=0; i<steps; i++) {
                simX += simVx * simDt;
                simY += simVy * simDt;
                simVx *= Math.pow(0.985, simDt * 60);
                simVy *= Math.pow(0.985, simDt * 60);

                // Simple wall bounce prediction (point based)
                for(let w of this.walls) {
                    if(simX > w.x && simX < w.x+w.w && simY > w.y && simY < w.y+w.h) {
                        // Very rough prediction reflection
                        simVx *= -0.8; simVy *= -0.8; 
                        simX += simVx * simDt; simY += simVy * simDt;
                    }
                }
                // Bounds
                if(simX < 0 || simX > WORLD_W) simVx *= -0.8;
                if(simY < 0) simVy *= -0.8;

                ctx.lineTo(simX, simY);
                if(Math.abs(simVx) < 0.5 && Math.abs(simVy) < 0.5) break;
            }
            ctx.stroke();
        }

        ctx.restore();
    },

    // --- SHOP LOGIC ---
    showShop() {
        this.showScreen('screen-shop');
        this.renderShop();
    },

    closeShop() {
        if(this.state === 'playing') this.showScreen(null);
        else this.showMenu();
    },

    renderShop() {
        const container = document.getElementById('shop-items');
        container.innerHTML = '';

        SHOP_CATALOG.forEach(item => {
            const el = document.createElement('div');
            el.className = 'shop-item';
            
            let statusHTML = '';
            let isMaxed = false;

            if (item.type === 'skin' || item.type === 'theme') {
                const unlocked = (item.type === 'skin' ? Save.unlockedSkins : Save.unlockedThemes).includes(item.id);
                const equipped = (item.type === 'skin' ? Save.equippedSkin : Save.equippedTheme) === item.id;
                
                if (equipped) {
                    statusHTML = `<button class="buy-btn equipped">Equipped</button>`;
                } else if (unlocked) {
                    statusHTML = `<button class="buy-btn equip" onclick="Game.equipItem('${item.type}', '${item.id}')">Equip</button>`;
                } else {
                    statusHTML = `<div class="price">SB ${item.cost}</div>
                                  <button class="buy-btn" onclick="Game.buyItem('${item.id}')">Buy</button>`;
                }
            } else if (item.type === 'upgrade') {
                const currentLvl = Save.upgrades[item.value] || 0;
                isMaxed = currentLvl >= item.maxLevel;
                const cost = Math.floor(item.cost * Math.pow(1.5, currentLvl));

                if (isMaxed) {
                    statusHTML = `<button class="buy-btn equipped">Max Level</button>`;
                } else {
                    statusHTML = `<div style="color:#aaa; font-size:0.8rem; text-align:right;">Lv ${currentLvl}/${item.maxLevel}</div>
                                  <div class="price">SB ${cost}</div>
                                  <button class="buy-btn" onclick="Game.buyItem('${item.id}')">Upgrade</button>`;
                }
            }

            el.innerHTML = `
                <div class="item-info">
                    <h3 style="color:${item.type==='skin'?item.value:'white'}">${item.name}</h3>
                    <p>${item.desc}</p>
                </div>
                <div class="item-action">
                    ${statusHTML}
                </div>
            `;
            container.appendChild(el);
        });
    },

    buyItem(id) {
        const item = SHOP_CATALOG.find(i => i.id === id);
        if(!item) return;

        let cost = item.cost;
        if (item.type === 'upgrade') {
            const currentLvl = Save.upgrades[item.value] || 0;
            cost = Math.floor(item.cost * Math.pow(1.5, currentLvl));
        }

        Platform.spendSimgaBucks(cost, (success) => {
            if (success) {
                if (item.type === 'skin') {
                    Save.unlockedSkins.push(item.id);
                    Save.equippedSkin = item.id;
                } else if (item.type === 'theme') {
                    Save.unlockedThemes.push(item.id);
                    Save.equippedTheme = item.id;
                } else if (item.type === 'upgrade') {
                    Save.upgrades[item.value] = (Save.upgrades[item.value] || 0) + 1;
                }
                this.saveProgress();
                this.renderShop();
                showToast(`Unlocked ${item.name}!`, 'reward');
            } else {
                showToast("Not enough SimgaBucks", 'error');
            }
        });
    },

    equipItem(type, id) {
        if (type === 'skin') Save.equippedSkin = id;
        else if (type === 'theme') Save.equippedTheme = id;
        this.saveProgress();
        this.renderShop();
    }
};

// Start
window.onload = () => {
    resizeCanvas();
    Game.init();
};
