<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Energy Grid</title>
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #bc13fe;
            --bg-color: #05050a;
            --text-glow: 0 0 10px rgba(0, 243, 255, 0.8);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, rgba(5, 5, 10, 0.4) 0%, rgba(5, 5, 10, 0.9) 100%);
            backdrop-filter: blur(4px);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .title {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(188, 19, 254, 0.5));
            text-align: center;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #aaa;
            margin-bottom: 40px;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
            text-align: center;
        }

        .btn {
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            padding: 15px 40px;
            color: white;
            font-size: 1.2rem;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
            transition: all 0.2s ease;
            margin: 10px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.7);
        }
        
        .btn:active {
            transform: scale(0.95);
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
        }

        .hud-item {
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: var(--text-glow);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid rgba(0, 243, 255, 0.3);
        }

        /* Shop UI */
        .shop-container {
            background: rgba(15, 15, 25, 0.95);
            border: 2px solid var(--secondary);
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            width: 90%;
            max-height: 85%;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.2);
            position: relative;
        }

        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .shop-title {
            font-size: 2.5rem;
            color: var(--primary);
            text-shadow: var(--text-glow);
            margin: 0;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-btn:hover {
            color: #ff3366;
            transform: scale(1.1);
        }

        .upgrades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .upgrade-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .upgrade-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .upgrade-title {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .upgrade-desc {
            font-size: 0.9rem;
            color: #aaa;
            flex-grow: 1;
            margin-bottom: 15px;
        }

        .upgrade-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .level-dots {
            display: flex;
            gap: 5px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #333;
        }

        .dot.active {
            background: var(--primary);
            box-shadow: 0 0 8px var(--primary);
        }

        .buy-btn {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .buy-btn:hover:not(:disabled) {
            background: var(--primary);
            color: #000;
        }

        .buy-btn:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
        }
        
        .buy-btn.maxed {
            border-color: var(--secondary);
            color: var(--secondary);
        }

        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            pointer-events: none;
        }

        .toast {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--primary);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            animation: slideUp 0.3s ease forwards, fadeOut 0.5s ease 2.5s forwards;
            text-align: center;
        }

        .toast.error {
            border-color: #ff3366;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
        }
        
        .toast.reward {
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="hud" id="hud" style="display: none;">
        <div class="hud-item">Score: <span id="scoreDisplay">0</span></div>
        <div class="hud-item">Wave: <span id="waveDisplay">1</span></div>
        <div class="hud-item" style="color: #ff3366; border-color: rgba(255,51,102,0.3);">Energy: <span id="energyDisplay">100</span>%</div>
    </div>

    <!-- Main Menu -->
    <div class="overlay active" id="menuOverlay">
        <div class="title">Energy Grid</div>
        <div class="subtitle">Connect the nodes before they destabilize.</div>
        <button class="btn" onclick="startGame()">Start Game</button>
        <button class="btn" style="background: linear-gradient(45deg, #444, #666);" onclick="openShop()">Upgrades Shop</button>
    </div>

    <!-- Game Over Menu -->
    <div class="overlay" id="gameOverOverlay">
        <div class="title" style="font-size: 3rem; color: #ff3366;">Grid Collapsed</div>
        <div class="subtitle">
            Final Score: <span id="finalScore" style="color: #fff; font-weight: bold;">0</span><br>
            High Score: <span id="bestScore" style="color: var(--primary); font-weight: bold;">0</span>
        </div>
        <button class="btn" onclick="startGame()">Play Again</button>
        <button class="btn" style="background: linear-gradient(45deg, #444, #666);" onclick="openShop()">Upgrades Shop</button>
    </div>

    <!-- Shop Overlay -->
    <div class="overlay" id="shopOverlay">
        <div class="shop-container">
            <div class="shop-header">
                <h2 class="shop-title">Grid Enhancements</h2>
                <button class="close-btn" onclick="closeShop()">×</button>
            </div>
            <div class="upgrades-grid" id="upgradesGrid">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

<script>
/**
 * ENERGY GRID - Game Logic & Platform Integration
 */

const GAME_ID = "energy";
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d", { alpha: false });

// Game State
let gameState = "MENU"; // MENU, PLAYING, GAMEOVER, SHOP
let lastTime = 0;
let score = 0;
let highScore = 0;
let wave = 1;
let energy = 100;
let nodesCleared = 0;
let totalSessionSimgaBucks = 0;
let screenShake = 0;

// Platform Save Data
let upgrades = {
    assist: 0,     // 0-2: Connection radius tolerance
    lifespan: 0,   // 0-2: Node lifetime multiplier
    lightning: 0,  // 0-2: Visual connection effects
    skin: 0        // 0-2: Node aesthetic styles
};

const UPGRADE_DATA = {
    assist: { 
        title: "Magnetic Links", 
        desc: "Increases the snapping radius when connecting nodes.",
        levels: [{cost: 20, val: 30}, {cost: 50, val: 50}], 
        baseVal: 15 
    },
    lifespan: { 
        title: "Capacitor Boost", 
        desc: "Nodes take longer to destabilize and expire.",
        levels: [{cost: 20, val: 1.25}, {cost: 60, val: 1.6}], 
        baseVal: 1.0 
    },
    lightning: { 
        title: "Plasma Arcs", 
        desc: "Upgrades your connection lines with stunning visual lightning.",
        levels: [{cost: 30, val: 1}, {cost: 80, val: 2}], 
        baseVal: 0 
    },
    skin: { 
        title: "Node Aesthetics", 
        desc: "Unlocks beautiful new core colors for your energy grid.",
        levels: [{cost: 40, val: 1}, {cost: 100, val: 2}], 
        baseVal: 0 
    }
};

let pendingPurchase = null; 
let loadMsgId = null;

// Game Entities
let nodes = [];
let particles = [];
let floatingTexts = [];
let bgParticles = [];

// Input
let isPointerDown = false;
let pointerX = 0;
let pointerY = 0;
let activeChain = [];

// Initialization
function init() {
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    setupInput();
    createBackgroundParticles();
    
    // Load data from platform
    requestLoadData();
    
    requestAnimationFrame(gameLoop);
}

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

// ----------------------------------------------------
// PLATFORM COMMUNICATION
// ----------------------------------------------------

function requestLoadData() {
    loadMsgId = "load_" + Date.now();
    window.parent.postMessage({
        type: "loadData",
        gameId: GAME_ID,
        msgId: loadMsgId
    }, "*");
}

function saveData() {
    const saveObject = {
        upgrades: upgrades,
        highScore: highScore
    };
    window.parent.postMessage({
        type: "saveData",
        gameId: GAME_ID,
        data: saveObject
    }, "*");
}

function rewardSimgaBucks(amount) {
    if (amount <= 0) return;
    totalSessionSimgaBucks += amount;
    window.parent.postMessage({
        type: "addSimgaBucks",
        amount: amount
    }, "*");
    showToast(`+${amount} SimgaBucks!`, 'reward');
}

function requestPurchase(upgradeType, targetLevel, cost) {
    if (pendingPurchase) return; // Prevent double taps

    const msgId = Math.random().toString(36);
    pendingPurchase = { type: upgradeType, level: targetLevel, cost: cost, msgId: msgId };
    
    window.parent.postMessage({
        type: "spendSimgaBucks",
        amount: cost,
        msgId: msgId
    }, "*");
}

window.addEventListener("message", (event) => {
    const data = event.data;

    if (data.type === "loadResponse" && data.msgId === loadMsgId) {
        if (data.data) {
            upgrades = data.data.upgrades || upgrades;
            highScore = data.data.highScore || 0;
        }
    }

    if (data.type === "spendResponse" && pendingPurchase && data.msgId === pendingPurchase.msgId) {
        if (data.success) {
            upgrades[pendingPurchase.type] = pendingPurchase.level;
            saveData();
            renderShop();
            showToast("Upgrade acquired successfully!");
        } else {
            showToast("Not enough SimgaBucks", "error");
        }
        pendingPurchase = null;
    }
});

// ----------------------------------------------------
// UI & SHOP
// ----------------------------------------------------

function showToast(message, type = 'normal') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
    }, 3000);
}

function updateHUD() {
    document.getElementById('scoreDisplay').textContent = score;
    document.getElementById('waveDisplay').textContent = wave;
    document.getElementById('energyDisplay').textContent = Math.max(0, Math.floor(energy));
}

function setOverlay(id) {
    document.querySelectorAll('.overlay').forEach(el => el.classList.remove('active'));
    if (id) document.getElementById(id).classList.add('active');
}

function openShop() {
    gameState = "SHOP";
    setOverlay("shopOverlay");
    renderShop();
}

function closeShop() {
    if (score > 0 && energy <= 0) {
        setOverlay("gameOverOverlay");
    } else {
        setOverlay("menuOverlay");
    }
}

function renderShop() {
    const grid = document.getElementById("upgradesGrid");
    grid.innerHTML = "";

    for (const [key, data] of Object.entries(UPGRADE_DATA)) {
        const currentLevel = upgrades[key] || 0;
        const maxLevel = data.levels.length;
        const isMaxed = currentLevel >= maxLevel;
        const nextUpgrade = !isMaxed ? data.levels[currentLevel] : null;
        
        let dotsHtml = "";
        for (let i = 0; i < maxLevel; i++) {
            dotsHtml += `<div class="dot ${i < currentLevel ? 'active' : ''}"></div>`;
        }

        let btnHtml = "";
        if (isMaxed) {
            btnHtml = `<button class="buy-btn maxed" disabled>MAXED</button>`;
        } else {
            btnHtml = `<button class="buy-btn" onclick="requestPurchase('${key}', ${currentLevel + 1}, ${nextUpgrade.cost})">Buy (${nextUpgrade.cost} SB)</button>`;
        }

        const card = document.createElement("div");
        card.className = "upgrade-card";
        card.innerHTML = `
            <div class="upgrade-title">${data.title}</div>
            <div class="upgrade-desc">${data.desc}</div>
            <div class="upgrade-status">
                <div class="level-dots">${dotsHtml}</div>
                ${btnHtml}
            </div>
        `;
        grid.appendChild(card);
    }
}

// ----------------------------------------------------
// GAMEPLAY MECHANICS
// ----------------------------------------------------

function startGame() {
    gameState = "PLAYING";
    setOverlay(null);
    document.getElementById('hud').style.display = "flex";
    
    score = 0;
    wave = 1;
    energy = 100;
    nodesCleared = 0;
    nodes = [];
    particles = [];
    floatingTexts = [];
    activeChain = [];
    totalSessionSimgaBucks = 0;
    
    lastTime = performance.now();
    spawnNode();
    spawnNode();
    spawnNode();
}

function gameOver() {
    gameState = "GAMEOVER";
    document.getElementById('hud').style.display = "none";
    document.getElementById('finalScore').textContent = score;
    
    if (score > highScore) {
        highScore = score;
    }
    document.getElementById('bestScore').textContent = highScore;
    
    setOverlay("gameOverOverlay");
    saveData();
}

// Entity Classes
class Node {
    constructor() {
        this.radius = 20;
        this.x = this.radius * 2 + Math.random() * (canvas.width - this.radius * 4);
        this.y = this.radius * 2 + Math.random() * (canvas.height - this.radius * 4);
        
        // Lifespan based on wave and upgrade
        const baseLife = Math.max(2000, 5000 - (wave * 200));
        const lifespanMult = UPGRADE_DATA.lifespan.levels[upgrades.lifespan - 1]?.val || UPGRADE_DATA.lifespan.baseVal;
        this.maxLife = baseLife * lifespanMult;
        this.life = this.maxLife;
        
        this.pulsePhase = Math.random() * Math.PI * 2;
        this.id = Math.random().toString(36);
    }

    getColor() {
        // Colors change based on Skin upgrade
        const lifePct = this.life / this.maxLife;
        let hue;
        
        if (upgrades.skin === 0) { // Default: Cyan to Red
            hue = lifePct * 180; // 180 is cyan, 0 is red
        } else if (upgrades.skin === 1) { // Gold/Fire
            hue = lifePct * 60; // 60 is yellow, 0 is red
        } else { // Prismatic
            hue = (performance.now() / 10 + this.x) % 360;
        }

        // Flash white when very low
        if (this.life < 1000 && Math.floor(performance.now() / 100) % 2 === 0) {
            return `hsl(0, 100%, 100%)`;
        }

        return `hsl(${hue}, 100%, ${50 + (1-lifePct)*10}%)`;
    }

    update(dt) {
        this.life -= dt;
        this.pulsePhase += dt * 0.005;
        
        if (this.life <= 0) {
            return false; // dead
        }
        return true;
    }

    draw(ctx, isActive) {
        const color = this.getColor();
        const pulse = Math.sin(this.pulsePhase) * 3;
        const currentRadius = this.radius + (isActive ? 5 + pulse : pulse);

        ctx.beginPath();
        ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
        
        ctx.shadowBlur = isActive ? 25 : 15;
        ctx.shadowColor = color;
        ctx.fillStyle = "#000";
        ctx.fill();

        ctx.lineWidth = isActive ? 4 : 2;
        ctx.strokeStyle = color;
        ctx.stroke();

        // Inner core
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius * 0.4, 0, Math.PI * 2);
        ctx.fillStyle = isActive ? "#fff" : color;
        ctx.fill();
        
        ctx.shadowBlur = 0; // reset
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1.0;
        this.decay = Math.random() * 0.02 + 0.02;
        this.color = color;
        this.size = Math.random() * 3 + 1;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
        return this.life > 0;
    }
    draw(ctx) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

class FloatingText {
    constructor(x, y, text, color) {
        this.x = x;
        this.y = y;
        this.text = text;
        this.color = color;
        this.life = 1.0;
    }
    update(dt) {
        this.y -= dt * 0.05;
        this.life -= dt * 0.001;
        return this.life > 0;
    }
    draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.font = "bold 20px 'Segoe UI'";
        ctx.textAlign = "center";
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fillText(this.text, this.x, this.y);
        ctx.globalAlpha = 1.0;
        ctx.shadowBlur = 0;
    }
}

function spawnNode() {
    nodes.push(new Node());
}

function createExplosion(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color));
    }
}

// ----------------------------------------------------
// INPUT HANDLING
// ----------------------------------------------------

function setupInput() {
    const handleDown = (e) => {
        if (gameState !== "PLAYING") return;
        isPointerDown = true;
        updatePointerPos(e);
        checkNodeSnap();
    };

    const handleMove = (e) => {
        if (gameState !== "PLAYING") return;
        if (e.cancelable) e.preventDefault(); // Stop scrolling
        updatePointerPos(e);
        if (isPointerDown) {
            checkNodeSnap();
        }
    };

    const handleUp = (e) => {
        if (gameState !== "PLAYING") return;
        isPointerDown = false;
        resolveChain();
    };

    canvas.addEventListener('mousedown', handleDown);
    canvas.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleUp);

    canvas.addEventListener('touchstart', (e) => handleDown(e.touches[0]), {passive: false});
    canvas.addEventListener('touchmove', (e) => handleMove(e.touches[0]), {passive: false});
    window.addEventListener('touchend', handleUp);
}

function updatePointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    pointerX = e.clientX - rect.left;
    pointerY = e.clientY - rect.top;
}

function checkNodeSnap() {
    const snapRadius = UPGRADE_DATA.assist.levels[upgrades.assist - 1]?.val || UPGRADE_DATA.assist.baseVal;
    
    for (let node of nodes) {
        const dx = pointerX - node.x;
        const dy = pointerY - node.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist < node.radius + snapRadius) {
            // Check if not already in chain
            if (!activeChain.includes(node)) {
                activeChain.push(node);
                // Mini pulse
                createExplosion(node.x, node.y, node.getColor(), 5);
                
                // Add tiny screen shake on connect
                screenShake = 2;
            }
            break;
        }
    }
}

function resolveChain() {
    if (activeChain.length >= 2) {
        // Successful connection
        const chainLength = activeChain.length;
        const baseScore = chainLength * 50;
        const comboMultiplier = chainLength - 1;
        const points = baseScore * comboMultiplier;
        
        score += points;
        energy = Math.min(100, energy + chainLength * 5);
        
        // Remove connected nodes
        nodes = nodes.filter(n => !activeChain.includes(n));
        nodesCleared += chainLength;
        
        // Visuals
        const lastNode = activeChain[activeChain.length - 1];
        floatingTexts.push(new FloatingText(lastNode.x, lastNode.y - 30, `+${points}`, "#00f3ff"));
        
        for (let node of activeChain) {
            createExplosion(node.x, node.y, node.getColor(), 15);
        }
        screenShake = chainLength * 2;

        // Reward logic
        if (chainLength >= 3) {
            // Quick small rewards for chains
            let sbReward = Math.floor(chainLength / 3);
            rewardSimgaBucks(sbReward);
            floatingTexts.push(new FloatingText(lastNode.x, lastNode.y - 60, `+${sbReward} SB`, "#ffd700"));
        }

        // Level Up logic
        if (nodesCleared >= wave * 10) {
            wave++;
            rewardSimgaBucks(3); // Major wave clear reward
            floatingTexts.push(new FloatingText(canvas.width/2, canvas.height/2, `WAVE ${wave} CLEARED!`, "#bc13fe"));
        }

        // Replenish nodes
        for (let i = 0; i < chainLength; i++) {
            setTimeout(spawnNode, i * 200);
        }
    } else {
        // Failed chain / single click
        activeChain = [];
    }
    
    activeChain = [];
}

// ----------------------------------------------------
// RENDERING & LOOP
// ----------------------------------------------------

function createBackgroundParticles() {
    bgParticles = [];
    for(let i=0; i<50; i++) {
        bgParticles.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            size: Math.random() * 2,
            speedY: Math.random() * 0.5 + 0.1
        });
    }
}

function drawBackground() {
    // Deep background color
    ctx.fillStyle = "#05050a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Grid lines (subtle)
    ctx.strokeStyle = "rgba(0, 243, 255, 0.03)";
    ctx.lineWidth = 1;
    const timeOffset = (performance.now() / 50) % 50;
    
    ctx.beginPath();
    for (let x = 0; x < canvas.width; x += 50) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
    }
    for (let y = timeOffset; y < canvas.height; y += 50) {
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
    }
    ctx.stroke();

    // Floating particles
    ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
    for (let p of bgParticles) {
        p.y += p.speedY;
        if (p.y > canvas.height) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawLightning(x1, y1, x2, y2, displace, detail) {
    if (detail < 1) {
        ctx.lineTo(x2, y2);
        return;
    }
    const midX = (x1 + x2) / 2 + (Math.random() - 0.5) * displace;
    const midY = (y1 + y2) / 2 + (Math.random() - 0.5) * displace;
    drawLightning(x1, y1, midX, midY, displace / 2, detail - 1);
    drawLightning(midX, midY, x2, y2, displace / 2, detail - 1);
}

function drawConnections() {
    if (activeChain.length === 0) return;

    const lightningLvl = upgrades.lightning;

    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    // Draw lines between established chain
    for (let i = 0; i < activeChain.length - 1; i++) {
        const n1 = activeChain[i];
        const n2 = activeChain[i+1];
        
        ctx.beginPath();
        ctx.moveTo(n1.x, n1.y);
        
        if (lightningLvl > 0) {
            const detail = lightningLvl === 1 ? 2 : 4;
            const displace = lightningLvl === 1 ? 15 : 30;
            drawLightning(n1.x, n1.y, n2.x, n2.y, displace, detail);
        } else {
            ctx.lineTo(n2.x, n2.y);
        }

        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 3;
        ctx.shadowBlur = 20;
        ctx.shadowColor = n1.getColor();
        ctx.stroke();
    }

    // Draw line from last node to pointer
    if (isPointerDown) {
        const lastNode = activeChain[activeChain.length - 1];
        ctx.beginPath();
        ctx.moveTo(lastNode.x, lastNode.y);
        
        if (lightningLvl > 0) {
            const detail = lightningLvl === 1 ? 2 : 4;
            drawLightning(lastNode.x, lastNode.y, pointerX, pointerY, 15, detail);
        } else {
            ctx.lineTo(pointerX, pointerY);
        }

        ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
        ctx.lineWidth = 2;
        ctx.shadowBlur = 10;
        ctx.shadowColor = lastNode.getColor();
        ctx.stroke();
    }
    
    ctx.restore();
}

function gameLoop(timestamp) {
    const dt = timestamp - lastTime;
    lastTime = timestamp;

    ctx.save();
    
    // Screen shake application
    if (screenShake > 0) {
        const sx = (Math.random() - 0.5) * screenShake;
        const sy = (Math.random() - 0.5) * screenShake;
        ctx.translate(sx, sy);
        screenShake *= 0.9;
        if (screenShake < 0.5) screenShake = 0;
    }

    drawBackground();

    if (gameState === "PLAYING") {
        
        // Ensure minimum nodes
        while (nodes.length < Math.min(8, 3 + Math.floor(wave/2))) {
            spawnNode();
        }

        // Update & Draw Nodes
        for (let i = nodes.length - 1; i >= 0; i--) {
            const n = nodes[i];
            const alive = n.update(dt);
            
            if (!alive) {
                // Node exploded! Penalty.
                createExplosion(n.x, n.y, "#ff0000", 30);
                floatingTexts.push(new FloatingText(n.x, n.y, "OVERLOAD", "#ff3366"));
                energy -= 15;
                screenShake = 10;
                
                // Remove if it was in chain
                activeChain = activeChain.filter(cn => cn !== n);
                nodes.splice(i, 1);
            } else {
                n.draw(ctx, activeChain.includes(n));
            }
        }

        drawConnections();

        // Update & Draw Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            if (!p.update()) {
                particles.splice(i, 1);
            } else {
                p.draw(ctx);
            }
        }

        // Update & Draw Floating Text
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            const ft = floatingTexts[i];
            if (!ft.update(dt)) {
                floatingTexts.splice(i, 1);
            } else {
                ft.draw(ctx);
            }
        }

        updateHUD();

        if (energy <= 0) {
            gameOver();
        }
    }

    ctx.restore();
    requestAnimationFrame(gameLoop);
}

// Start rendering idle background immediately
window.onload = () => {
    init();
};

</script>
