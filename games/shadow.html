<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Chase</title>
    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #ff003c;
            --bg-dark: #050510;
            --text-light: #e0eaff;
            --panel-bg: rgba(10, 15, 30, 0.85);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlays */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1), inset 0 0 20px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            backdrop-filter: blur(10px);
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        h1 {
            color: var(--text-light);
            font-size: 3rem;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--primary);
        }

        h2 {
            color: var(--primary);
            font-size: 1.8rem;
            margin: 0 0 20px 0;
        }

        p {
            color: #a0b0d0;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .btn {
            background: linear-gradient(45deg, #0055ff, #00f3ff);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
            margin: 10px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.7);
        }

        .btn.secondary {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: none;
        }

        .btn.secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #hud.active {
            opacity: 1;
        }

        .hud-stat {
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--primary);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid rgba(0, 243, 255, 0.3);
        }

        #score-display {
            color: #00f3ff;
        }

        /* Shop Grid */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        .shop-item {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .shop-item:hover {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .item-title {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .item-desc {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .buy-btn {
            background: #2a2a40;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            width: 100%;
        }

        .buy-btn:hover:not(:disabled) {
            background: #00f3ff;
            color: #000;
            border-color: #00f3ff;
            box-shadow: 0 0 10px #00f3ff;
        }

        .buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .buy-btn.equipped {
            background: #00ff88;
            color: #000;
            border-color: #00ff88;
        }

        /* Custom Scrollbar for Shop */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 243, 255, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 243, 255, 0.8); }

        /* Loading Overlay */
        #loader {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--primary);
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="hud">
        <div class="hud-stat">Time: <span id="score-display">0</span>s</div>
        <div class="hud-stat" style="font-size:1.1rem; border-color:rgba(255,0,60,0.3); color:#ffaa00;" id="dash-status">Dash: Ready</div>
    </div>

    <div id="ui-layer">
        <!-- Main Menu -->
        <div id="menu-screen" class="screen">
            <h1>Shadow Chase</h1>
            <p>A dark entity is hunting you.<br>Weave through the crystal obstacles.<br>Survive as long as you can.</p>
            <button class="btn" onclick="startGame()">Start Survival</button>
            <button class="btn secondary" onclick="openShop()">Open Shop</button>
            <p style="margin-top:20px; font-size:0.9rem;">High Score: <span id="high-score-display">0</span>s</p>
        </div>

        <!-- Shop Screen -->
        <div id="shop-screen" class="screen" style="max-width: 800px; width: 90%;">
            <h2>Upgrades & Skins</h2>
            <div class="shop-grid" id="shop-container">
                <!-- Injected via JS -->
            </div>
            <button class="btn secondary" onclick="closeShop()">Back to Menu</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen">
            <h1 style="color: var(--secondary); text-shadow: 0 0 10px var(--secondary);">Consumed</h1>
            <p>You survived for <strong id="final-score" style="color:#fff; font-size:1.5rem;">0</strong> seconds.</p>
            <p id="reward-text" style="color:#00ff88; display:none;"></p>
            <button class="btn" onclick="startGame()">Play Again</button>
            <button class="btn secondary" onclick="openShop()">Shop</button>
            <button class="btn secondary" onclick="showMenu()">Menu</button>
        </div>
    </div>

    <!-- Initial Loading Block -->
    <div id="loader">Syncing...</div>

<script>
    /* =====================================================================
       1. GAME CONFIGURATION & PLATFORM INTEGRATION
       ===================================================================== */
    const GAME_ID = "shadow";
    
    // Default Save Data Structure
    let saveData = {
        highScore: 0,
        upgrades: {
            speedLevel: 0,
            dashUnlocked: false
        },
        unlockedItems: ["skin_default", "shadow_default"],
        equippedSkin: "skin_default",
        equippedShadow: "shadow_default"
    };

    // Shop Configuration
    const SHOP_ITEMS = [
        { id: "skin_plasma", type: "skin", title: "Plasma Pink", desc: "Player Skin", cost: 20 },
        { id: "skin_gold", type: "skin", title: "Golden Orb", desc: "Player Skin", cost: 50 },
        { id: "shadow_crimson", type: "shadow", title: "Crimson Terror", desc: "Shadow Skin", cost: 30 },
        { id: "upg_speed1", type: "upgrade", title: "Speed Boost I", desc: "+10% Max Speed", cost: 15, req: null },
        { id: "upg_speed2", type: "upgrade", title: "Speed Boost II", desc: "+20% Max Speed", cost: 30, req: "upg_speed1" },
        { id: "upg_dash", type: "upgrade", title: "Escape Dash", desc: "Double Click to Dash!", cost: 40, req: null }
    ];

    let currentPendingPurchase = null;

    // -- Platform Communication --

    function saveGame() {
        window.parent.postMessage({
            type: "saveData",
            gameId: GAME_ID,
            data: saveData
        }, "*");
    }

    function addSimgaBucks(amount) {
        window.parent.postMessage({
            type: "addSimgaBucks",
            amount: amount
        }, "*");
    }

    function requestPurchase(item) {
        const msgId = Math.random().toString(36);
        currentPendingPurchase = { item: item, msgId: msgId };
        
        window.parent.postMessage({
            type: "spendSimgaBucks",
            amount: item.cost,
            msgId: msgId
        }, "*");

        // Disable UI buttons temporarily
        renderShop(); 
    }

    // Initialize Game & Load Data
    function initGamePlatform() {
        const loadMsgId = "load_" + Date.now();
        let loaded = false;

        // Fallback if platform doesn't respond in 1.5 seconds
        const fallbackTimer = setTimeout(() => {
            if (!loaded) {
                console.log("No response from platform, proceeding with default save.");
                finishLoading();
            }
        }, 1500);

        window.parent.postMessage({
            type: "loadData",
            gameId: GAME_ID,
            msgId: loadMsgId
        }, "*");

        window.addEventListener("message", (event) => {
            const data = event.data;

            // Handle Load
            if (data.type === "loadResponse" && data.msgId === loadMsgId) {
                loaded = true;
                clearTimeout(fallbackTimer);
                if (data.data) {
                    // Merge loaded data with defaults
                    saveData = { ...saveData, ...data.data };
                    if (data.data.upgrades) saveData.upgrades = { ...saveData.upgrades, ...data.data.upgrades };
                    if (data.data.unlockedItems) saveData.unlockedItems = [...data.data.unlockedItems];
                }
                finishLoading();
            }

            // Handle Spend Response
            if (data.type === "spendResponse" && currentPendingPurchase && data.msgId === currentPendingPurchase.msgId) {
                if (data.success) {
                    applyPurchase(currentPendingPurchase.item);
                } else {
                    alert("Not enough SimgaBucks to purchase this item!");
                }
                currentPendingPurchase = null;
                renderShop();
            }
        });
    }

    function applyPurchase(item) {
        if (item.type === "skin" || item.type === "shadow") {
            saveData.unlockedItems.push(item.id);
            if (item.type === "skin") saveData.equippedSkin = item.id;
            if (item.type === "shadow") saveData.equippedShadow = item.id;
        } else if (item.type === "upgrade") {
            saveData.unlockedItems.push(item.id);
            if (item.id.startsWith("upg_speed")) saveData.upgrades.speedLevel++;
            if (item.id === "upg_dash") saveData.upgrades.dashUnlocked = true;
        }
        saveGame();
    }

    function finishLoading() {
        document.getElementById("loader").style.opacity = 0;
        setTimeout(() => {
            document.getElementById("loader").style.display = "none";
            showMenu();
        }, 500);
    }

    // Call init
    initGamePlatform();


    /* =====================================================================
       2. CANVAS ENGINE & RENDER LOOP
       ===================================================================== */
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    
    let cw, ch;
    function resize() {
        cw = canvas.width = window.innerWidth;
        ch = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Game State
    const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2, SHOP: 3 };
    let currentState = STATE.MENU;
    let frameCount = 0;
    let lastTime = 0;
    let shakeAmount = 0;

    // Entities
    let player, shadow, obstacles, particles, floatingDust;
    
    // Gameplay Stats
    let timeAlive = 0;
    let sbEarnedThisSession = 0;

    // Inputs
    let mouse = { x: cw/2, y: ch/2, down: false };
    let lastClickTime = 0;

    // Event Listeners for Input
    canvas.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
    canvas.addEventListener('touchmove', (e) => {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
    }, {passive: false});
    
    function handleActionPress() {
        mouse.down = true;
        const now = Date.now();
        // Check for double click/tap for dash
        if (now - lastClickTime < 300 && saveData.upgrades.dashUnlocked && currentState === STATE.PLAYING) {
            player.attemptDash();
        }
        lastClickTime = now;
    }
    canvas.addEventListener('mousedown', handleActionPress);
    canvas.addEventListener('touchstart', (e) => {
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
        handleActionPress();
    }, {passive: false});
    canvas.addEventListener('mouseup', () => mouse.down = false);
    canvas.addEventListener('touchend', () => mouse.down = false);


    /* =====================================================================
       3. ENTITY CLASSES (POLISHED VISUALS)
       ===================================================================== */

    // Math Utility
    const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);
    const lerp = (a, b, t) => a + (b - a) * t;

    class Particle {
        constructor(x, y, color, speed, life, size) {
            this.x = x; this.y = y;
            const angle = Math.random() * Math.PI * 2;
            const s = Math.random() * speed;
            this.vx = Math.cos(angle) * s;
            this.vy = Math.sin(angle) * s;
            this.color = color;
            this.life = life;
            this.maxLife = life;
            this.size = size;
            this.friction = 0.95;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vx *= this.friction;
            this.vy *= this.friction;
            this.life--;
        }
        draw(ctx) {
            const alpha = Math.max(0, this.life / this.maxLife);
            ctx.globalAlpha = alpha;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }
    }

    class Dust {
        constructor() {
            this.x = Math.random() * cw;
            this.y = Math.random() * ch;
            this.vy = (Math.random() - 0.5) * 0.5;
            this.size = Math.random() * 2;
            this.alpha = Math.random() * 0.5;
        }
        update() {
            this.y += this.vy;
            if (this.y < 0) this.y = ch;
            if (this.y > ch) this.y = 0;
        }
        draw(ctx) {
            ctx.fillStyle = `rgba(0, 243, 255, ${this.alpha})`;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class Player {
        constructor() {
            this.x = cw / 2;
            this.y = ch / 4;
            this.radius = 12;
            this.baseSpeed = 5 + (saveData.upgrades.speedLevel * 0.5);
            this.vx = 0;
            this.vy = 0;
            this.angle = 0;
            
            // Dash Mechanics
            this.isDashing = false;
            this.dashCooldown = 0;
            this.dashTime = 0;

            // Visuals based on skin
            this.color = "#00f3ff";
            if (saveData.equippedSkin === "skin_plasma") this.color = "#ff00e6";
            if (saveData.equippedSkin === "skin_gold") this.color = "#ffdd00";
            
            this.trail = [];
        }

        attemptDash() {
            if (this.dashCooldown <= 0) {
                this.isDashing = true;
                this.dashTime = 12; // frames
                this.dashCooldown = 180; // 3 seconds cooldown
                screenShake(5);
                spawnParticles(this.x, this.y, this.color, 20, 10, 3);
            }
        }

        update() {
            // Update Dash status UI
            if (saveData.upgrades.dashUnlocked) {
                const status = document.getElementById("dash-status");
                if (this.dashCooldown > 0) {
                    this.dashCooldown--;
                    status.innerText = `Dash: ${(this.dashCooldown/60).toFixed(1)}s`;
                    status.style.color = "#888";
                } else {
                    status.innerText = "Dash: READY";
                    status.style.color = "#00ff88";
                }
            } else {
                document.getElementById("dash-status").style.display = "none";
            }

            // Movement logic
            let currentSpeed = this.baseSpeed;
            if (this.isDashing) {
                currentSpeed = this.baseSpeed * 4;
                this.dashTime--;
                if (this.dashTime <= 0) this.isDashing = false;
                spawnParticles(this.x, this.y, this.color, 1, 2, 2); // Dash sparks
            }

            // Move towards mouse
            let d = dist(this.x, this.y, mouse.x, mouse.y);
            if (d > currentSpeed) {
                this.vx = ((mouse.x - this.x) / d) * currentSpeed;
                this.vy = ((mouse.y - this.y) / d) * currentSpeed;
                this.angle += 0.1; // Spin effect
            } else {
                this.vx *= 0.5;
                this.vy *= 0.5;
            }

            // Apply friction from obstacles unless dashing
            if (!this.isDashing) {
                let inObstacle = false;
                for (let obs of obstacles) {
                    if (obs.solid && dist(this.x, this.y, obs.x, obs.y) < obs.size + this.radius) {
                        inObstacle = true;
                        break;
                    }
                }
                if (inObstacle) {
                    this.vx *= 0.3;
                    this.vy *= 0.3;
                    // Visual feedback
                    if(frameCount % 5 === 0) spawnParticles(this.x, this.y, "#ff0000", 1, 2, 1);
                }
            }

            this.x += this.vx;
            this.y += this.vy;

            // Bounds
            this.x = Math.max(this.radius, Math.min(cw - this.radius, this.x));
            this.y = Math.max(this.radius, Math.min(ch - this.radius, this.y));

            // Trail
            this.trail.push({x: this.x, y: this.y});
            if (this.trail.length > 15) this.trail.shift();
        }

        draw(ctx) {
            // Draw Trail
            if (this.trail.length > 1) {
                ctx.beginPath();
                ctx.moveTo(this.trail[0].x, this.trail[0].y);
                for (let i = 1; i < this.trail.length; i++) {
                    ctx.lineTo(this.trail[i].x, this.trail[i].y);
                }
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 4;
                ctx.lineCap = "round";
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.globalAlpha = 0.5;
                ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }

            // Draw Core
            ctx.save();
            ctx.translate(this.x, this.y);
            
            // Outer rotating ring
            ctx.rotate(this.angle);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2;
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
            ctx.setLineDash([10, 5]);
            ctx.beginPath();
            ctx.arc(0, 0, this.radius + 6, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);

            // Inner solid core
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fill();

            // Dash shield visual
            if (this.isDashing) {
                ctx.beginPath();
                ctx.arc(0, 0, this.radius + 15, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, 0.3)`;
                ctx.fill();
            }

            ctx.restore();
        }
    }

    class Shadow {
        constructor(px, py) {
            // Spawns far away initially
            this.x = px;
            this.y = ch + 200;
            this.baseSpeed = 3.5;
            
            this.color = "#8b00ff"; // Default Dark Purple
            this.coreColor = "#000000";
            if (saveData.equippedShadow === "shadow_crimson") {
                this.color = "#ff003c";
                this.coreColor = "#300000";
            }

            this.history = []; // For tentacles
            this.tentacleCount = 5;
        }

        update(px, py, time) {
            // Speed increases over time
            let currentSpeed = this.baseSpeed + (time * 0.05);
            // Cap speed so it doesn't become literally impossible instantly, but eventually outruns
            if(currentSpeed > player.baseSpeed * 1.5) currentSpeed = player.baseSpeed * 1.5;

            let d = dist(this.x, this.y, px, py);
            if (d > 0) {
                this.x += ((px - this.x) / d) * currentSpeed;
                this.y += ((py - this.y) / d) * currentSpeed;
            }

            // Save history for fluid tentacles
            this.history.unshift({x: this.x, y: this.y});
            if (this.history.length > 40) this.history.pop();

            // Emit ambient dark particles
            if (Math.random() < 0.3) {
                spawnParticles(this.x + (Math.random()-0.5)*30, this.y + (Math.random()-0.5)*30, this.color, 1, 30, 4);
            }
        }

        draw(ctx) {
            // Draw Tentacles
            ctx.lineCap = "round";
            ctx.shadowBlur = 20;
            ctx.shadowColor = this.color;
            
            for (let t = 0; t < this.tentacleCount; t++) {
                ctx.beginPath();
                let offset = (t / this.tentacleCount) * Math.PI * 2;
                
                for (let i = 0; i < this.history.length; i+=2) {
                    let pt = this.history[i];
                    // Wiggle effect
                    let waveX = Math.sin(frameCount * 0.1 + i * 0.1 + offset) * (i * 0.5);
                    let waveY = Math.cos(frameCount * 0.1 + i * 0.1 + offset) * (i * 0.5);
                    
                    let drawX = pt.x + waveX;
                    let drawY = pt.y + waveY;

                    if (i === 0) ctx.moveTo(drawX, drawY);
                    else ctx.lineTo(drawX, drawY);
                }
                ctx.strokeStyle = `rgba(${this.hexToRgb(this.color)}, 0.6)`;
                ctx.lineWidth = 15 - (t*2);
                ctx.stroke();
            }

            // Central Mass
            ctx.beginPath();
            ctx.arc(this.x, this.y, 25, 0, Math.PI * 2);
            ctx.fillStyle = this.coreColor;
            ctx.fill();
            
            // Glowing Aura
            ctx.beginPath();
            ctx.arc(this.x, this.y, 30, 0, Math.PI * 2);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        
        hexToRgb(hex) {
            let r = parseInt(hex.slice(1, 3), 16),
                g = parseInt(hex.slice(3, 5), 16),
                b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }
    }

    class Obstacle {
        constructor() {
            this.x = Math.random() * (cw - 100) + 50;
            this.y = -100; // Spawn slightly above
            this.targetY = Math.random() * (ch - 100) + 50;
            
            // Try not to spawn directly on player
            if (currentState === STATE.PLAYING && dist(this.x, this.targetY, player.x, player.y) < 150) {
                this.targetY = player.y > ch/2 ? 100 : ch - 100;
            }

            this.size = Math.random() * 30 + 30;
            this.points = Math.floor(Math.random() * 3) + 4; // Hexagons, diamonds, etc.
            this.angle = 0;
            this.rotSpeed = (Math.random() - 0.5) * 0.05;
            
            this.state = 'warning'; // warning -> rising -> solid -> fading
            this.timer = 0;
            this.solid = false;
            this.alpha = 0;
        }

        update() {
            this.timer++;
            this.angle += this.rotSpeed;

            if (this.state === 'warning') {
                this.alpha = Math.min(0.5, this.timer / 30);
                if (this.timer > 60) {
                    this.state = 'rising';
                    this.timer = 0;
                    screenShake(2);
                    spawnParticles(this.x, this.targetY, "#00f3ff", 5, 20, 2);
                }
            } else if (this.state === 'rising') {
                this.alpha = Math.min(1, this.timer / 15);
                this.y = lerp(this.y, this.targetY, 0.2);
                if (this.timer > 15) {
                    this.state = 'solid';
                    this.solid = true;
                    this.timer = 0;
                }
            } else if (this.state === 'solid') {
                // Stays solid for a duration based on size
                if (this.timer > 300) {
                    this.state = 'fading';
                    this.solid = false;
                    this.timer = 0;
                }
            } else if (this.state === 'fading') {
                this.alpha = Math.max(0, 1 - (this.timer / 30));
            }
        }

        draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.state === 'warning' ? this.targetY : this.y);
            ctx.rotate(this.angle);
            ctx.globalAlpha = this.alpha;
            
            if (this.state === 'warning') {
                // Draw warning reticle
                ctx.strokeStyle = "#ff003c";
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                let shrinkRadius = this.size + (60 - this.timer);
                ctx.arc(0, 0, Math.max(this.size, shrinkRadius), 0, Math.PI * 2);
                ctx.stroke();
            } else {
                // Draw Solid Shape
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#00f3ff";
                ctx.strokeStyle = "#00f3ff";
                ctx.fillStyle = `rgba(0, 20, 40, ${this.alpha})`;
                ctx.lineWidth = 3;
                ctx.setLineDash([]);

                ctx.beginPath();
                for (let i = 0; i < this.points; i++) {
                    let a = (i / this.points) * Math.PI * 2;
                    let px = Math.cos(a) * this.size;
                    let py = Math.sin(a) * this.size;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Inner detail
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 0.3, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.restore();
        }
    }

    function spawnParticles(x, y, color, count, speed, size) {
        for (let i = 0; i < count; i++) {
            particles.push(new Particle(x, y, color, speed, 20 + Math.random()*20, size));
        }
    }

    function screenShake(amt) {
        shakeAmount = Math.max(shakeAmount, amt);
    }

    /* =====================================================================
       4. GAME LOGIC & LOOPS
       ===================================================================== */
    
    function resetGame() {
        player = new Player();
        shadow = new Shadow(player.x, player.y);
        obstacles = [];
        particles = [];
        floatingDust = [];
        for(let i=0; i<50; i++) floatingDust.push(new Dust());
        
        timeAlive = 0;
        sbEarnedThisSession = 0;
        frameCount = 0;
        lastTime = performance.now();
        document.getElementById("score-display").innerText = "0";
    }

    function startGame() {
        document.getElementById("menu-screen").classList.remove("active");
        document.getElementById("game-over-screen").classList.remove("active");
        document.getElementById("hud").classList.add("active");
        
        resetGame();
        currentState = STATE.PLAYING;
    }

    function endGame() {
        currentState = STATE.GAMEOVER;
        document.getElementById("hud").classList.remove("active");
        document.getElementById("game-over-screen").classList.add("active");
        
        const finalTime = Math.floor(timeAlive);
        document.getElementById("final-score").innerText = finalTime;
        
        if (finalTime > saveData.highScore) {
            saveData.highScore = finalTime;
            saveGame();
        }

        const rt = document.getElementById("reward-text");
        if (sbEarnedThisSession > 0) {
            rt.style.display = "block";
            rt.innerText = `Earned ${sbEarnedThisSession} SimgaBucks!`;
        } else {
            rt.style.display = "none";
        }

        screenShake(20);
        spawnParticles(player.x, player.y, player.color, 100, 15, 4);
    }

    // Economy Logic during gameplay
    function checkEconomyRewards() {
        const t = Math.floor(timeAlive);
        let earnedNow = 0;

        // Give reward at 15s (1 SB)
        if (t === 15 && sbEarnedThisSession < 1) earnedNow = 1;
        // Give reward at 30s (2 SB)
        if (t === 30 && sbEarnedThisSession < 3) earnedNow = 2;
        // Give reward at 60s (4 SB)
        if (t === 60 && sbEarnedThisSession < 7) earnedNow = 4;
        // Every 30s after 60s gives 3 SB
        if (t > 60 && t % 30 === 0 && frameCount % 60 === 0) earnedNow = 3; 

        if (earnedNow > 0) {
            sbEarnedThisSession += earnedNow;
            addSimgaBucks(earnedNow);
            // Visual feedback
            const scoreEl = document.getElementById("score-display");
            scoreEl.style.color = "#00ff88";
            scoreEl.style.textShadow = "0 0 20px #00ff88";
            setTimeout(() => {
                scoreEl.style.color = "#00f3ff";
                scoreEl.style.textShadow = "0 0 10px #00f3ff";
            }, 1000);
        }
    }

    // Main Update Loop
    function update(dt) {
        if (currentState === STATE.PLAYING) {
            frameCount++;
            timeAlive += dt / 1000;
            document.getElementById("score-display").innerText = Math.floor(timeAlive);

            checkEconomyRewards();

            // Spawn Obstacles (faster over time)
            let spawnRate = Math.max(30, 90 - (timeAlive * 0.5));
            if (frameCount % Math.floor(spawnRate) === 0) {
                obstacles.push(new Obstacle());
            }

            player.update();
            shadow.update(player.x, player.y, timeAlive);

            // Check Game Over Collision (Shadow caught player)
            // If dashing, immune to shadow catch temporarily
            if (!player.isDashing && dist(player.x, player.y, shadow.x, shadow.y) < player.radius + 20) {
                endGame();
            }

            // Update entities
            obstacles.forEach(o => o.update());
            obstacles = obstacles.filter(o => o.state !== 'fading' || o.alpha > 0);
            
            particles.forEach(p => p.update());
            particles = particles.filter(p => p.life > 0);
            
            floatingDust.forEach(d => d.update());
        } else if (currentState === STATE.GAMEOVER) {
            particles.forEach(p => p.update());
            particles = particles.filter(p => p.life > 0);
        }
        
        if (shakeAmount > 0) shakeAmount *= 0.9;
    }

    // Main Draw Loop
    function draw() {
        // Clear background with slight trail effect
        ctx.fillStyle = "rgba(5, 5, 16, 0.8)";
        ctx.fillRect(0, 0, cw, ch);

        ctx.save();
        if (shakeAmount > 0.5) {
            let dx = (Math.random() - 0.5) * shakeAmount;
            let dy = (Math.random() - 0.5) * shakeAmount;
            ctx.translate(dx, dy);
        }

        // Draw Parallax Grid (Moves slightly based on player position to give depth)
        ctx.strokeStyle = "rgba(0, 243, 255, 0.05)";
        ctx.lineWidth = 1;
        let pOffsetX = currentState === STATE.PLAYING ? (player.x / cw) * 50 : 0;
        let pOffsetY = currentState === STATE.PLAYING ? (player.y / ch) * 50 : 0;
        
        ctx.beginPath();
        for(let x = 0; x < cw + 100; x += 50) {
            ctx.moveTo(x - pOffsetX, 0); ctx.lineTo(x - pOffsetX, ch);
        }
        for(let y = 0; y < ch + 100; y += 50) {
            ctx.moveTo(0, y - pOffsetY); ctx.lineTo(cw, y - pOffsetY);
        }
        ctx.stroke();

        // Draw Dust
        if(floatingDust) floatingDust.forEach(d => d.draw(ctx));

        // Draw Game Entities
        if (currentState === STATE.PLAYING) {
            // Draw Warning indicators underneath everything
            obstacles.filter(o => o.state === 'warning').forEach(o => o.draw(ctx));
            
            shadow.draw(ctx);
            player.draw(ctx);
            
            // Solid obstacles on top
            obstacles.filter(o => o.state !== 'warning').forEach(o => o.draw(ctx));
        }

        // Draw Particles
        if (particles) particles.forEach(p => p.draw(ctx));

        ctx.restore();
    }

    function gameLoop(time) {
        let dt = time - lastTime;
        lastTime = time;
        if (dt > 100) dt = 16; // Prevent massive jumps if tab is inactive

        update(dt);
        draw();
        requestAnimationFrame(gameLoop);
    }


    /* =====================================================================
       5. UI & SHOP MENUS
       ===================================================================== */
    
    function showMenu() {
        currentState = STATE.MENU;
        document.getElementById("game-over-screen").classList.remove("active");
        document.getElementById("shop-screen").classList.remove("active");
        document.getElementById("menu-screen").classList.add("active");
        document.getElementById("high-score-display").innerText = saveData.highScore || 0;
        
        // Setup initial background visuals for menu
        resetGame();
        player.x = cw/2; player.y = ch/2;
    }

    function openShop() {
        currentState = STATE.SHOP;
        document.getElementById("menu-screen").classList.remove("active");
        document.getElementById("game-over-screen").classList.remove("active");
        document.getElementById("shop-screen").classList.add("active");
        renderShop();
    }

    function closeShop() {
        showMenu();
    }

    function renderShop() {
        const container = document.getElementById("shop-container");
        container.innerHTML = "";

        SHOP_ITEMS.forEach(item => {
            const isUnlocked = saveData.unlockedItems.includes(item.id);
            let isEquipped = false;
            if (item.type === "skin" && saveData.equippedSkin === item.id) isEquipped = true;
            if (item.type === "shadow" && saveData.equippedShadow === item.id) isEquipped = true;
            
            // Check prerequisites
            let reqMet = true;
            if (item.req && !saveData.unlockedItems.includes(item.req)) reqMet = false;

            const div = document.createElement("div");
            div.className = "shop-item";
            
            let btnHtml = "";
            let btnClass = "buy-btn";
            let btnDisabled = "";
            let btnText = `${item.cost} SB`;

            if (currentPendingPurchase) {
                btnDisabled = "disabled";
                if (currentPendingPurchase.item.id === item.id) btnText = "Purchasing...";
            } else if (isEquipped) {
                btnClass += " equipped";
                btnText = "EQUIPPED";
                btnDisabled = "disabled";
            } else if (isUnlocked && (item.type === "skin" || item.type === "shadow")) {
                btnText = "EQUIP";
            } else if (isUnlocked && item.type === "upgrade") {
                btnClass += " equipped";
                btnText = "MAXED";
                btnDisabled = "disabled";
            } else if (!reqMet) {
                btnDisabled = "disabled";
                btnText = "LOCKED";
            }

            div.innerHTML = `
                <div class="item-title">${item.title}</div>
                <div class="item-desc">${item.desc}</div>
                <button class="${btnClass}" ${btnDisabled} onclick="handleShopClick('${item.id}')">${btnText}</button>
            `;
            container.appendChild(div);
        });
    }

    window.handleShopClick = function(id) {
        const item = SHOP_ITEMS.find(i => i.id === id);
        const isUnlocked = saveData.unlockedItems.includes(id);

        if (isUnlocked) {
            // Equip logic
            if (item.type === "skin") saveData.equippedSkin = id;
            if (item.type === "shadow") saveData.equippedShadow = id;
            saveGame();
            renderShop();
        } else {
            // Purchase logic
            requestPurchase(item);
        }
    }

    // Start background animation loop immediately
    requestAnimationFrame(gameLoop);

</script>
