<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Spiral</title>
    <style>
        :root {
            --ui-bg: rgba(10, 15, 30, 0.85);
            --ui-border: rgba(0, 255, 255, 0.4);
            --text-main: #e0f7fa;
            --text-glow: 0 0 10px rgba(0, 255, 255, 0.8);
            --btn-bg: linear-gradient(180deg, #1a2a4a 0%, #0d1526 100%);
            --btn-hover: linear-gradient(180deg, #2a4070 0%, #15264a 100%);
            --btn-border: #00ffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body, html {
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
            touch-action: none;
        }

        #gameCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Let clicks pass to canvas if needed */
        }

        .ui-layer.hidden { display: none !important; }
        
        .panel {
            background: var(--ui-bg);
            border: 2px solid var(--ui-border);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            pointer-events: auto;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,255,255,0.1);
            max-width: 90%;
            width: 400px;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: var(--text-glow);
        }

        h2 { font-size: 1.5rem; margin-bottom: 20px; color: #aaa; font-weight: normal; }

        button {
            background: var(--btn-bg);
            color: #fff;
            border: 1px solid var(--btn-border);
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        button:hover:not(:disabled) {
            background: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,255,255,0.2);
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #555;
        }

        /* HUD */
        #hud {
            justify-content: flex-start;
            padding: 20px;
        }
        
        .hud-top {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: var(--text-glow);
        }

        .score-box { display: flex; align-items: center; gap: 8px; }
        .score-icon { color: #ffd700; text-shadow: 0 0 10px #ffaa00; }

        /* Shop Items */
        .shop-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-bottom: 20px;
            max-height: 50vh;
            overflow-y: auto;
            padding-right: 5px;
        }

        .shop-grid::-webkit-scrollbar { width: 6px; }
        .shop-grid::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .shop-grid::-webkit-scrollbar-thumb { background: var(--btn-border); border-radius: 3px; }

        .shop-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .shop-item-info { text-align: left; }
        .shop-item-title { font-weight: bold; font-size: 1.1rem; }
        .shop-item-desc { font-size: 0.8rem; color: #aaa; margin-top: 4px; }
        
        .shop-btn {
            margin: 0;
            padding: 8px 16px;
            font-size: 0.9rem;
            min-width: 90px;
        }

        /* Notifications */
        #msg-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translate(-50%, -20px);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid;
            padding: 15px 30px;
            border-radius: 8px;
            z-index: 100;
            font-weight: bold;
            text-align: center;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            opacity: 0;
        }

        .msg-success { border-color: #00ff00; color: #00ff00; text-shadow: 0 0 8px rgba(0,255,0,0.5); }
        .msg-error { border-color: #ff0055; color: #ff0055; text-shadow: 0 0 8px rgba(255,0,85,0.5); }
        .msg-info { border-color: #00ffff; color: #00ffff; text-shadow: 0 0 8px rgba(0,255,255,0.5); }
        
        .floating-text {
            position: absolute;
            pointer-events: none;
            font-weight: bold;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            animation: floatUp 1s ease-out forwards;
            z-index: 50;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.2); opacity: 0; }
        }

        /* Controls hint */
        .controls-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- UI Layers -->
    <div id="ui-main-menu" class="ui-layer">
        <div class="panel">
            <h1>Coin Spiral</h1>
            <h2>Climb the Tower</h2>
            <p style="margin-bottom: 20px; color: #aaa; font-size: 0.9rem;">
                <span style="color:#ffd700">★ High Score: <span id="menu-highscore">0</span></span>
            </p>
            <button onclick="startGame()">PLAY NOW</button>
            <button onclick="openShop()">UPGRADES</button>
        </div>
        <div class="controls-hint">Tap Left/Right or use Arrow Keys to Rotate</div>
    </div>

    <div id="ui-hud" class="ui-layer hidden" style="pointer-events: none;">
        <div class="hud-top">
            <div class="score-box">
                <span class="score-icon">★</span>
                <span id="hud-score">0</span>
            </div>
            <div class="score-box" style="font-size: 1rem; color: #aaa;">
                Level: <span id="hud-level" style="color: #fff;">1</span>
            </div>
        </div>
    </div>

    <div id="ui-game-over" class="ui-layer hidden">
        <div class="panel">
            <h1 style="color: #ff0055; text-shadow: 0 0 10px rgba(255,0,85,0.8);">SYSTEM FAILURE</h1>
            <h2 id="go-reason">Hit a trap!</h2>
            <div style="margin: 20px 0; font-size: 1.2rem;">
                Score: <span id="go-score" style="color:#ffd700; font-weight:bold;">0</span><br>
                High Score: <span id="go-highscore" style="color:#ffd700; font-weight:bold;">0</span>
            </div>
            <button onclick="startGame()">TRY AGAIN</button>
            <button onclick="showMenu()">MAIN MENU</button>
        </div>
    </div>

    <div id="ui-shop" class="ui-layer hidden">
        <div class="panel" style="width: 500px;">
            <h1>Upgrades</h1>
            <h2>Enhance your systems</h2>
            
            <div class="shop-grid" id="shop-container">
                <!-- Populated by JS -->
            </div>

            <button onclick="showMenu()" style="margin-top: 20px; width: 80%;">BACK</button>
        </div>
    </div>

    <div id="msg-box">Message</div>

<script>
    /* ==========================================================================
       PLATFORM INTEGRATION & STATE MANAGEMENT
       ========================================================================== */
    const GAME_ID = "spiral";
    let pendingPurchaseMsgId = null;
    let pendingPurchaseItem = null;

    // Save Data Structure
    let saveData = {
        highScore: 0,
        upgrades: {
            magnet: 0, // 0 = off, 1 = radius 40, 2 = radius 80
            warning: false
        },
        unlockedSkins: ['cyan'],
        currentSkin: 'cyan',
        unlockedThemes: ['cyberpunk'],
        currentTheme: 'cyberpunk'
    };

    // Shop Configuration
    const SHOP_ITEMS = [
        { id: 'magnet_1', type: 'upgrade', title: 'Coin Magnet Lvl 1', desc: 'Attract nearby coins.', cost: 15, req: (s) => s.upgrades.magnet === 0 },
        { id: 'magnet_2', type: 'upgrade', title: 'Coin Magnet Lvl 2', desc: 'Increased attraction radius.', cost: 30, req: (s) => s.upgrades.magnet === 1 },
        { id: 'warning', type: 'upgrade', title: 'Trap Warning System', desc: 'Highlights path ahead if a trap is coming.', cost: 20, req: (s) => !s.upgrades.warning },
        { id: 'skin_magenta', type: 'skin', title: 'Core: Magenta', desc: 'A vivid pink energy core.', cost: 10, req: (s) => !s.unlockedSkins.includes('magenta') },
        { id: 'skin_gold', type: 'skin', title: 'Core: Solar Gold', desc: 'A blazing golden core.', cost: 25, req: (s) => !s.unlockedSkins.includes('gold') },
        { id: 'theme_neon', type: 'theme', title: 'Theme: Neon Forest', desc: 'Vibrant greens and pinks.', cost: 40, req: (s) => !s.unlockedThemes.includes('neon') },
        { id: 'theme_lava', type: 'theme', title: 'Theme: Obsidian Magma', desc: 'Scorching reds and dark rock.', cost: 40, req: (s) => !s.unlockedThemes.includes('lava') }
    ];

    // Theme Data
    const THEMES = {
        cyberpunk: { bg1: '#0a0512', bg2: '#1a0b2e', towerLine: 'rgba(0, 255, 255, 0.3)', path: 'rgba(255, 0, 255, 0.15)', coinGlow: '#00ffff' },
        neon: { bg1: '#02120b', bg2: '#0b2e1a', towerLine: 'rgba(0, 255, 100, 0.3)', path: 'rgba(255, 50, 200, 0.15)', coinGlow: '#ff32c8' },
        lava: { bg1: '#120502', bg2: '#3e0f05', towerLine: 'rgba(255, 100, 0, 0.3)', path: 'rgba(255, 0, 0, 0.15)', coinGlow: '#ffaa00' }
    };

    // Skin Data
    const SKINS = {
        cyan: { core: '#fff', glow: '#00ffff' },
        magenta: { core: '#fff', glow: '#ff00ff' },
        gold: { core: '#fff', glow: '#ffcc00' }
    };

    function saveGameData() {
        window.parent.postMessage({
            type: "saveData",
            gameId: GAME_ID,
            data: saveData
        }, "*");
    }

    function loadGameData() {
        const loadMsgId = "load_" + Date.now();
        window.parent.postMessage({
            type: "loadData",
            gameId: GAME_ID,
            msgId: loadMsgId
        }, "*");
        return loadMsgId; // Keep track if needed
    }

    function requestPurchase(item) {
        if (pendingPurchaseMsgId) return; // Prevent spam
        
        pendingPurchaseMsgId = Math.random().toString(36);
        pendingPurchaseItem = item;

        // Visual lock on buttons
        renderShop();
        
        window.parent.postMessage({
            type: "spendSimgaBucks",
            amount: item.cost,
            msgId: pendingPurchaseMsgId
        }, "*");
    }

    function addSimgaBucks(amount) {
        window.parent.postMessage({
            type: "addSimgaBucks",
            amount: amount
        }, "*");
        showMessage(`+${amount} SimgaBucks!`, 'info');
        spawnFloatingText(`+${amount} SB`, player.screenX, player.screenY - 50, '#00ffff');
    }

    window.addEventListener("message", (event) => {
        const data = event.data;
        
        if (data.type === "loadResponse" && data.data) {
            // Merge loaded data
            saveData = { ...saveData, ...data.data };
            // Ensure nested objects exist if adding new features later
            if(!saveData.upgrades) saveData.upgrades = {magnet:0, warning:false};
            if(!saveData.unlockedSkins) saveData.unlockedSkins = ['cyan'];
            if(!saveData.unlockedThemes) saveData.unlockedThemes = ['cyberpunk'];
            
            document.getElementById('menu-highscore').innerText = saveData.highScore;
            updateTheme();
        }

        if (data.type === "spendResponse") {
            if (data.success && pendingPurchaseItem) {
                applyUpgrade(pendingPurchaseItem);
                showMessage("Upgrade acquired!", "success");
                saveGameData();
            } else {
                showMessage("Not enough SimgaBucks", "error");
            }
            pendingPurchaseMsgId = null;
            pendingPurchaseItem = null;
            if (gameState === 'SHOP') renderShop();
        }
    });

    function applyUpgrade(item) {
        if (item.id === 'magnet_1') saveData.upgrades.magnet = 1;
        if (item.id === 'magnet_2') saveData.upgrades.magnet = 2;
        if (item.id === 'warning') saveData.upgrades.warning = true;
        
        if (item.type === 'skin') {
            saveData.unlockedSkins.push(item.id.replace('skin_', ''));
            saveData.currentSkin = item.id.replace('skin_', '');
        }
        if (item.type === 'theme') {
            saveData.unlockedThemes.push(item.id.replace('theme_', ''));
            saveData.currentTheme = item.id.replace('theme_', '');
            updateTheme();
        }
    }

    // UI Helpers
    function showUI(id) {
        document.querySelectorAll('.ui-layer').forEach(el => el.classList.add('hidden'));
        if (id) document.getElementById(id).classList.remove('hidden');
    }

    function showMessage(text, type) {
        const box = document.getElementById('msg-box');
        box.innerText = text;
        box.className = `msg-${type}`;
        box.style.opacity = 1;
        box.style.transform = 'translate(-50%, 0)';
        
        setTimeout(() => {
            box.style.opacity = 0;
            box.style.transform = 'translate(-50%, -20px)';
        }, 2500);
    }

    function spawnFloatingText(text, x, y, color) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = text;
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        if (color) {
            el.style.color = color;
            el.style.textShadow = `0 0 10px ${color}`;
        }
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    function updateTheme() {
        const t = THEMES[saveData.currentTheme] || THEMES.cyberpunk;
        // Update CSS vars if needed, or just logic
    }

    /* ==========================================================================
       GAME ENGINE & LOGIC
       ========================================================================== */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false }); // Optimize

    let cw, ch, cx, cy;
    let gameState = 'MENU'; // MENU, PLAYING, SHOP, GAMEOVER
    let lastTime = 0;
    
    // Game Variables
    let towerY = 0;
    let towerRotation = 0;
    let targetRotation = 0;
    let baseSpeed = 200; // units per second
    let currentSpeed = 0;
    let score = 0;
    let level = 1;
    let coinsCollectedThisRun = 0;
    let towerRadius = 150;
    
    // Entities
    let objects = []; // Coins, Traps
    let particles = [];
    let bgStars = [];
    
    // Screen Shake
    let shakeAmount = 0;

    // Inputs
    const keys = { left: false, right: false };
    let touchX = null;

    // The Player
    const player = {
        yOffset: 120, // Distance from bottom of screen
        angle: Math.PI * 1.5, // Fixed at front center (Math.PI * 1.5 forces projection to near side)
        history: [], // For trails
        screenX: 0,
        screenY: 0
    };

    function resize() {
        cw = canvas.width = window.innerWidth;
        ch = canvas.height = window.innerHeight;
        cx = cw / 2;
        cy = ch / 2 + 100; // Look down slightly
        towerRadius = Math.min(cw * 0.35, 250);
        
        // Re-init stars if empty
        if (bgStars.length === 0) {
            for(let i=0; i<100; i++) {
                bgStars.push({
                    x: Math.random() * cw,
                    y: Math.random() * ch,
                    s: Math.random() * 2 + 0.5,
                    a: Math.random()
                });
            }
        }
    }
    window.addEventListener('resize', resize);
    resize();

    // Input Handling
    window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
    });
    window.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    });
    window.addEventListener('touchstart', (e) => {
        touchX = e.touches[0].clientX;
        handleTouch();
    }, {passive: false});
    window.addEventListener('touchmove', (e) => {
        touchX = e.touches[0].clientX;
        handleTouch();
    }, {passive: false});
    window.addEventListener('touchend', () => {
        keys.left = false;
        keys.right = false;
        touchX = null;
    });
    window.addEventListener('mousedown', (e) => {
        touchX = e.clientX;
        handleTouch();
    });
    window.addEventListener('mousemove', (e) => {
        if(touchX !== null) {
            touchX = e.clientX;
            handleTouch();
        }
    });
    window.addEventListener('mouseup', () => {
        keys.left = false;
        keys.right = false;
        touchX = null;
    });

    function handleTouch() {
        if (touchX === null || gameState !== 'PLAYING') return;
        if (touchX < cw / 2) { keys.left = true; keys.right = false; }
        else { keys.right = true; keys.left = false; }
    }

    // Math: 3D Cylinder Projection
    // Returns 2D coords and depth scale
    function project(objAngle, objY) {
        // Apply world rotation
        let a = objAngle + towerRotation;
        
        // Normalize angle 0 to 2PI
        a = a % (Math.PI * 2);
        if (a < 0) a += Math.PI * 2;

        // 3D coordinates relative to center
        let x = Math.cos(a) * towerRadius;
        let z = Math.sin(a) * towerRadius; // z is depth. -radius is front, +radius is back.
        
        // Relative height (Player is at y = 0 visually, moving tower down)
        let relY = objY - towerY;

        // Perspective scaling (fake)
        // Back is smaller, front is larger
        let zNorm = (z + towerRadius) / (towerRadius * 2); // 0 (front) to 1 (back)
        let scale = 1.2 - (zNorm * 0.5); // 1.2 at front, 0.7 at back
        
        // Tilt the cylinder
        const tilt = 0.25; 
        
        // Calculate screen coordinates
        // Base screen Y offsets relative to center
        let sy = cy - (relY * scale) + (z * tilt);
        let sx = cx + (x * scale);

        return { sx, sy, scale, zDepth: z, isFront: z < 0, angleWorld: a };
    }

    // World Generation
    let lastSpawnY = 500; // Start spawning ahead
    
    function spawnChunk() {
        const chunkType = Math.random();
        const startY = lastSpawnY;
        const length = 800 + Math.random() * 800; // length of chunk
        let currentAngle = Math.random() * Math.PI * 2; // start angle
        
        // Decide path drift
        const drift = (Math.random() - 0.5) * 0.005;

        for (let y = startY; y < startY + length; y += 100) {
            currentAngle += drift * 100;
            
            // Spawn Coin
            if (Math.random() > 0.2) {
                objects.push({
                    type: 'coin',
                    y: y,
                    angle: currentAngle + (Math.random() * 0.4 - 0.2),
                    collected: false,
                    phase: Math.random() * Math.PI * 2
                });
            }

            // Spawn Trap (probability increases with level)
            let trapProb = 0.1 + (level * 0.02);
            if (Math.random() < trapProb && y > startY + 200) {
                // Spawn trap slightly off the main coin path to force dodging
                let offset = (Math.random() > 0.5 ? 1 : -1) * (0.5 + Math.random() * 0.5);
                objects.push({
                    type: 'trap',
                    y: y,
                    angle: currentAngle + offset,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }
        lastSpawnY = startY + length;
    }

    // Particle System
    function createExplosion(x, y, color, type = 'coin') {
        const count = type === 'trap' ? 30 : 10;
        const speed = type === 'trap' ? 8 : 4;
        
        for (let i = 0; i < count; i++) {
            const ang = Math.random() * Math.PI * 2;
            const spd = Math.random() * speed;
            particles.push({
                x: x, y: y,
                vx: Math.cos(ang) * spd,
                vy: Math.sin(ang) * spd - (type==='trap'?2:1), // initial upward burst
                life: 1.0,
                decay: Math.random() * 0.03 + 0.02,
                color: color,
                size: Math.random() * 4 + 2
            });
        }
    }

    function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.1; // gravity
            p.life -= p.decay;
            if (p.life <= 0) particles.splice(i, 1);
        }
    }

    // Angular distance helper
    function getAngleDiff(a1, a2) {
        let diff = Math.abs((a1 % (Math.PI*2)) - (a2 % (Math.PI*2)));
        if (diff > Math.PI) diff = Math.PI * 2 - diff;
        return diff;
    }

    // Main update loop
    function update(dt) {
        if (gameState !== 'PLAYING') return;

        // Difficulty scaling
        currentSpeed = baseSpeed + (towerY * 0.015);
        level = Math.floor(towerY / 2000) + 1;
        document.getElementById('hud-level').innerText = level;

        // Move tower
        towerY += currentSpeed * dt;

        // Rotate tower
        const rotSpeed = 3.5 * dt;
        if (keys.left) targetRotation += rotSpeed;
        if (keys.right) targetRotation -= rotSpeed;
        
        // Smooth rotation
        towerRotation += (targetRotation - towerRotation) * 0.3;

        // Update player absolute Y (for projection math)
        let playerAbsoluteY = towerY + player.yOffset;

        // Spawn generation
        if (lastSpawnY - towerY < 2500) {
            spawnChunk();
        }

        // Screen Shake
        if (shakeAmount > 0) {
            shakeAmount -= dt * 30;
            if (shakeAmount < 0) shakeAmount = 0;
        }

        // Magnet Logic
        const magLevel = saveData.upgrades.magnet;
        const magRadius = magLevel === 1 ? 0.6 : (magLevel === 2 ? 1.2 : 0); // angular distance

        // Process objects
        for (let i = objects.length - 1; i >= 0; i--) {
            let obj = objects[i];
            
            // Remove passed objects
            if (obj.y < towerY - 500) {
                objects.splice(i, 1);
                continue;
            }

            obj.phase += dt * 3;

            // Collision / Interaction
            if (!obj.collected && Math.abs(obj.y - playerAbsoluteY) < 60) {
                let angleDiff = getAngleDiff(player.angle - towerRotation, obj.angle);
                
                // Magnet pull
                if (obj.type === 'coin' && magRadius > 0 && angleDiff < magRadius) {
                    // Pull towards player
                    let targetAngle = player.angle - towerRotation;
                    // Shortest path rotation
                    let diff = (targetAngle - obj.angle) % (Math.PI*2);
                    if(diff !== diff % Math.PI) {
                        diff = diff < 0 ? diff + Math.PI*2 : diff - Math.PI*2;
                    }
                    obj.angle += diff * 10 * dt;
                    obj.y += (playerAbsoluteY - obj.y) * 5 * dt;
                }

                // Hard Collision
                let hitCoin = obj.type === 'coin' && angleDiff < 0.35 && Math.abs(obj.y - playerAbsoluteY) < 40;
                let hitTrap = obj.type === 'trap' && angleDiff < 0.20 && Math.abs(obj.y - playerAbsoluteY) < 25;

                if (hitCoin || hitTrap) {
                    let p = project(obj.angle, obj.y);
                    
                    if (obj.type === 'coin') {
                        obj.collected = true;
                        score += 10;
                        document.getElementById('hud-score').innerText = score;
                        createExplosion(p.sx, p.sy, THEMES[saveData.currentTheme].coinGlow, 'coin');
                        
                        coinsCollectedThisRun++;
                        if (coinsCollectedThisRun % 10 === 0) {
                            addSimgaBucks(1);
                        }
                    } else if (obj.type === 'trap') {
                        gameOver(p.sx, p.sy);
                        return; // Stop update
                    }
                }
            }
        }

        // Update background stars
        bgStars.forEach(s => {
            s.y += (currentSpeed * dt * 0.2) * s.s;
            if (s.y > ch) { s.y = 0; s.x = Math.random() * cw; }
        });

        updateParticles(dt);
    }

    // Main draw loop
    function draw() {
        const theme = THEMES[saveData.currentTheme] || THEMES.cyberpunk;
        const skin = SKINS[saveData.currentSkin] || SKINS.cyan;

        // Draw Background
        let grad = ctx.createLinearGradient(0, 0, 0, ch);
        grad.addColorStop(0, theme.bg1);
        grad.addColorStop(1, theme.bg2);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, cw, ch);

        // Shake
        ctx.save();
        if (shakeAmount > 0) {
            ctx.translate((Math.random()-0.5)*shakeAmount, (Math.random()-0.5)*shakeAmount);
        }

        // Stars
        ctx.fillStyle = '#fff';
        bgStars.forEach(s => {
            ctx.globalAlpha = s.a;
            ctx.fillRect(s.x, s.y, s.s, s.s);
        });
        ctx.globalAlpha = 1;

        // TOWER RENDERING
        ctx.lineWidth = 2;
        ctx.strokeStyle = theme.towerLine;
        
        // Draw vertical tower struts (Back)
        const strutCount = 12;
        for(let i=0; i<strutCount; i++) {
            let angle = (i / strutCount) * Math.PI * 2;
            let pTop = project(angle, towerY + 3000);
            let pBot = project(angle, towerY - 500);
            
            if (!pTop.isFront) {
                ctx.beginPath();
                ctx.moveTo(pBot.sx, pBot.sy);
                ctx.lineTo(pTop.sx, pTop.sy);
                ctx.stroke();
            }
        }

        // Prepare Render List for Z-Sorting
        let renderList = [];
        
        let playerAbsoluteY = towerY + player.yOffset;
        let pPlayer = project(player.angle - towerRotation, playerAbsoluteY);
        player.screenX = pPlayer.sx;
        player.screenY = pPlayer.sy;

        renderList.push({
            type: 'player',
            z: pPlayer.zDepth,
            draw: () => drawPlayer(pPlayer, skin)
        });

        // Objects
        objects.forEach(obj => {
            if (obj.collected) return;
            let p = project(obj.angle, obj.y);
            renderList.push({
                type: obj.type,
                z: p.zDepth,
                draw: () => {
                    if (obj.type === 'coin') drawCoin(p, theme, obj.phase);
                    if (obj.type === 'trap') drawTrap(p, theme, obj.phase);
                }
            });
        });

        // Warning Line Logic
        if (saveData.upgrades.warning) {
            // Find next trap in front of player
            let imminentTrap = objects.find(o => o.type === 'trap' && o.y > playerAbsoluteY && o.y < playerAbsoluteY + 1200);
            if (imminentTrap) {
                let aDiff = getAngleDiff(player.angle - towerRotation, imminentTrap.angle);
                if (aDiff < 0.5) {
                    // Draw warning beam
                    ctx.strokeStyle = 'rgba(255, 0, 0, 0.4)';
                    ctx.lineWidth = 4;
                    ctx.setLineDash([10, 10]);
                    let pTrap = project(imminentTrap.angle, imminentTrap.y);
                    renderList.push({
                        type: 'warning', z: (pPlayer.zDepth + pTrap.zDepth)/2,
                        draw: () => {
                            ctx.beginPath();
                            ctx.moveTo(pPlayer.sx, pPlayer.sy);
                            ctx.lineTo(pTrap.sx, pTrap.sy);
                            ctx.stroke();
                            ctx.setLineDash([]);
                        }
                    });
                }
            }
        }

        // Sort by Depth (Back to Front)
        renderList.sort((a, b) => b.z - a.z);

        // Draw Everything
        ctx.globalCompositeOperation = 'lighter'; // Additive blending for glow
        renderList.forEach(item => item.draw());
        ctx.globalCompositeOperation = 'source-over';

        // Draw vertical tower struts (Front)
        ctx.strokeStyle = theme.towerLine;
        for(let i=0; i<strutCount; i++) {
            let angle = (i / strutCount) * Math.PI * 2;
            let pTop = project(angle, towerY + 3000);
            let pBot = project(angle, towerY - 500);
            
            if (pTop.isFront) {
                ctx.beginPath();
                ctx.moveTo(pBot.sx, pBot.sy);
                ctx.lineTo(pTop.sx, pTop.sy);
                ctx.stroke();
            }
        }

        // Particles
        ctx.globalCompositeOperation = 'lighter';
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';

        ctx.restore(); // Restore shake
    }

    // Specific Drawing Routines
    function drawPlayer(p, skin) {
        // Trail
        player.history.push({x: p.sx, y: p.sy, s: p.scale});
        if (player.history.length > 15) player.history.shift();

        ctx.beginPath();
        for(let i=0; i<player.history.length; i++) {
            let h = player.history[i];
            ctx.lineTo(h.x, h.y);
        }
        ctx.strokeStyle = skin.glow;
        ctx.lineWidth = 10 * p.scale;
        ctx.lineCap = 'round';
        ctx.globalAlpha = 0.5;
        ctx.stroke();
        ctx.globalAlpha = 1;

        // Main Orb
        ctx.shadowBlur = 20;
        ctx.shadowColor = skin.glow;
        ctx.fillStyle = skin.core;
        
        ctx.beginPath();
        ctx.arc(p.sx, p.sy, 12 * p.scale, 0, Math.PI*2);
        ctx.fill();
        
        ctx.fillStyle = skin.glow;
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        ctx.arc(p.sx, p.sy, 18 * p.scale, 0, Math.PI*2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
    }

    function drawCoin(p, theme, phase) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = theme.coinGlow;
        ctx.strokeStyle = theme.coinGlow;
        ctx.lineWidth = 3 * p.scale;
        
        let widthX = Math.abs(Math.cos(phase)) * 12 * p.scale + 2;
        
        ctx.beginPath();
        ctx.ellipse(p.sx, p.sy, widthX, 12 * p.scale, 0, 0, Math.PI*2);
        ctx.stroke();
        
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(p.sx, p.sy, 3 * p.scale, 0, Math.PI*2);
        ctx.fill();
        
        ctx.shadowBlur = 0;
    }

    function drawTrap(p, theme, phase) {
        let trapColor = '#ff0033';
        if (theme.bg1 === '#120502') trapColor = '#330000'; // Lava theme dark rock
        
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff0000';
        ctx.fillStyle = trapColor;
        
        // Spike ball
        ctx.beginPath();
        ctx.arc(p.sx, p.sy, 14 * p.scale, 0, Math.PI*2);
        ctx.fill();
        
        // Spikes pulsating
        ctx.strokeStyle = '#ff0000';
        ctx.lineWidth = 2 * p.scale;
        let spikePulse = Math.sin(phase * 2) * 4 * p.scale;
        
        for(let i=0; i<8; i++) {
            let ang = (i/8) * Math.PI*2 + phase;
            let nx = Math.cos(ang) * (18 * p.scale + spikePulse);
            let ny = Math.sin(ang) * (18 * p.scale + spikePulse);
            ctx.beginPath();
            ctx.moveTo(p.sx, p.sy);
            ctx.lineTo(p.sx + nx, p.sy + ny);
            ctx.stroke();
        }
        
        // Core
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(p.sx, p.sy, 4 * p.scale, 0, Math.PI*2);
        ctx.fill();
        
        ctx.shadowBlur = 0;
    }

    // Loop Control
    function gameLoop(time) {
        let dt = (time - lastTime) / 1000;
        if (dt > 0.1) dt = 0.1; // Cap dt for lag spikes
        lastTime = time;

        update(dt);
        draw();

        requestAnimationFrame(gameLoop);
    }

    /* ==========================================================================
       GAME FLOW & UI
       ========================================================================== */

    function init() {
        loadGameData();
        // Start background animation even in menu
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    }

    function startGame() {
        gameState = 'PLAYING';
        showUI('ui-hud');
        
        // Reset Logic
        towerY = 0;
        towerRotation = 0;
        targetRotation = 0;
        score = 0;
        level = 1;
        coinsCollectedThisRun = 0;
        objects = [];
        particles = [];
        player.history = [];
        lastSpawnY = 500;
        
        document.getElementById('hud-score').innerText = '0';
        document.getElementById('hud-level').innerText = '1';
    }

    function gameOver(x, y) {
        gameState = 'GAMEOVER';
        shakeAmount = 20;
        createExplosion(x, y, '#ff0000', 'trap');
        
        // Check Highscore
        let isNewHigh = false;
        if (score > saveData.highScore) {
            saveData.highScore = score;
            isNewHigh = true;
            saveGameData();
        }

        setTimeout(() => {
            showUI('ui-game-over');
            document.getElementById('go-score').innerText = score;
            document.getElementById('go-highscore').innerText = saveData.highScore;
            if(isNewHigh) document.getElementById('go-highscore').innerText += " (NEW!)";
        }, 1000);
    }

    function showMenu() {
        gameState = 'MENU';
        showUI('ui-main-menu');
        document.getElementById('menu-highscore').innerText = saveData.highScore;
    }

    // Shop UI Logic
    function openShop() {
        gameState = 'SHOP';
        showUI('ui-shop');
        renderShop();
    }

    function renderShop() {
        const container = document.getElementById('shop-container');
        container.innerHTML = '';

        SHOP_ITEMS.forEach(item => {
            // Check visibility/unlock logic
            let isPurchased = false;
            let isAvailable = item.req(saveData);

            if (item.type === 'upgrade') {
                if (item.id === 'magnet_1' && saveData.upgrades.magnet >= 1) isPurchased = true;
                if (item.id === 'magnet_2' && saveData.upgrades.magnet >= 2) isPurchased = true;
                if (item.id === 'warning' && saveData.upgrades.warning) isPurchased = true;
            } else if (item.type === 'skin') {
                isPurchased = saveData.unlockedSkins.includes(item.id.replace('skin_', ''));
            } else if (item.type === 'theme') {
                isPurchased = saveData.unlockedThemes.includes(item.id.replace('theme_', ''));
            }

            // Only show next available tier
            if (!isPurchased && !isAvailable) return;

            const div = document.createElement('div');
            div.className = 'shop-item';
            
            let btnHtml = '';
            if (isPurchased) {
                if (item.type === 'skin') {
                    let isActive = saveData.currentSkin === item.id.replace('skin_','');
                    btnHtml = `<button class="shop-btn" onclick="equipSkin('${item.id.replace('skin_','')}')" ${isActive?'disabled':''}>${isActive?'EQUIPPED':'EQUIP'}</button>`;
                } else if (item.type === 'theme') {
                    let isActive = saveData.currentTheme === item.id.replace('theme_','');
                    btnHtml = `<button class="shop-btn" onclick="equipTheme('${item.id.replace('theme_','')}')" ${isActive?'disabled':''}>${isActive?'EQUIPPED':'EQUIP'}</button>`;
                } else {
                    btnHtml = `<span style="color:#00ff00; font-weight:bold; font-size:0.9rem;">OWNED</span>`;
                }
            } else {
                let isPending = pendingPurchaseItem && pendingPurchaseItem.id === item.id;
                btnHtml = `<button class="shop-btn" onclick='buyItem("${item.id}")' ${pendingPurchaseMsgId ? 'disabled' : ''}>${isPending ? '...' : item.cost + ' SB'}</button>`;
            }

            div.innerHTML = `
                <div class="shop-item-info">
                    <div class="shop-item-title" style="color: ${isPurchased ? '#88ff88' : '#fff'}">${item.title}</div>
                    <div class="shop-item-desc">${item.desc}</div>
                </div>
                <div>${btnHtml}</div>
            `;
            container.appendChild(div);
        });
    }

    function buyItem(id) {
        const item = SHOP_ITEMS.find(i => i.id === id);
        if (item) requestPurchase(item);
    }

    function equipSkin(id) {
        saveData.currentSkin = id;
        saveGameData();
        renderShop();
    }

    function equipTheme(id) {
        saveData.currentTheme = id;
        saveGameData();
        updateTheme();
        renderShop();
    }

    // Start
    window.onload = init;

</script>
